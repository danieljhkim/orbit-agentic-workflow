# ---- content ----
title: 'Fix store divergence: commit_task_changes must read from worktree orbit store'
description: |-
  ## Root Cause

  The `job_task_pipeline` fails at the `commit_task_changes` step with:

  ```
  execution failed: task '<id>' must have a non-empty execution_summary before commit_task_changes
  ```

  even though the `implement_change` agent correctly wrote an execution summary.

  **Why it fails:** `implement_change` runs in the task worktree. Its `orbit.task.update` call writes to the worktree's `.orbit/tasks/` store. `commit_task_changes` is an engine automation and validates `execution_summary` via `host.get_task()`, which reads from the main repo orbit store — which never received the update.

  **Fix direction:** Stop reading agent-produced content from the store. Use the pipeline's own step outputs instead:

  - `commit_task_changes` — validate and use `summary` from `implement_change`'s output, already present in `current_input` when the commit step runs
  - `open_pr_from_task` — build the PR body from `commit_message` + `changed_files` passed forward from `commit_task_changes`'s output

  This removes the store-divergence dependency entirely. Both automations already have everything they need in their inputs.

  ## Observed Impact

  Pipeline fails at commit step; worktree changes cannot be committed without manual intervention. (jrun-20260316-050235 was the first observed failure.)
