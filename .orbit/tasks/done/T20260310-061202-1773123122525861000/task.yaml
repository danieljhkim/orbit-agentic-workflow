title: Build orbit job run --task-id, named job IDs, and manual schedule support
description: |-
  # Job System Prerequisites for Task Dispatch

  Three CLI capabilities are needed before a dispatcher activity can delegate work to a specific task via a stable job reference. Two require new code; one is already in source but not compiled.

  ## 1. orbit job run --task-id (code exists, binary stale)

  `JobRunArgs` in `orbit-cli/src/command/job.rs` already has `task_id: Option<String>` at line 172 and routes to `run_job_now_with_input`. The compiled binary does not expose this flag. A rebuild is required, and the flag needs a `#[arg(long)]` annotation verified.

  ## 2. orbit job add --job-id (missing)

  Job IDs are auto-generated timestamps. There is no way to create a job with a stable, human-readable ID. Dispatcher activities and documentation cannot reference a portable job handle across installs. An optional `--job-id` flag on `orbit job add` is needed.

  ## 3. orbit job add --schedule manual (missing)

  All jobs require a cron or interval schedule. There is no way to register a job that only fires on explicit `orbit job run` calls. A `manual` schedule sentinel is needed that creates a job in `disabled` state and is never claimed by the due-claim tick.
