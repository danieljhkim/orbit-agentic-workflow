# ---- content ----
title: 'Refactor: standardize task YAML field names from camelCase to snake_case'
description: |-
  Task YAML files are the only YAML type in the codebase that still use camelCase field names. All other YAML categories (jobs, activities, identities, config) already use snake_case exclusively. The inconsistency exists within individual task files — fields like `contextFiles`, `assignedTo`, `proposalApprovedBy`, `activityId`, and `workspacePath` are camelCase even though the rest of the codebase has standardized on snake_case.

  Backward compatibility is no longer required for historical task artifacts because the task bundles under `done`, `archived`, and `rejected` have already been removed. Treat this as a hard cut-over: update the task serialization code to snake_case only, and manually rewrite the remaining live task bundles under `backlog`, `in_progress`, and `proposed` so they continue to load after the format change.
