# ---- content ----
title: 'Add missing orbit tools: task.add, task.approve, task.reject, identity.list, identity.show, job_run.list, job_run.show, job_run.archive'
description: |-
  Eight Orbit CLI operations are only accessible via direct CLI commands, not as registered tools. This blocks agents from using them via `orbit tool run`, and means skills must document two different invocation patterns. Adding these as built-in tools in `orbit-tools` will give agents a single consistent mechanism for all orbit operations.

  **Missing tools:**
  - `orbit.task.add` → `orbit task add ...`
  - `orbit.task.approve` → `orbit task approve <id> --by ... --note ...`
  - `orbit.task.reject` → `orbit task reject <id> --by ... --note ...`
  - `orbit.identity.list` → `orbit identity list [--role ...]`
  - `orbit.identity.show` → `orbit identity show <id>`
  - `orbit.job_run.list` → `orbit job-run list [--status ...]`
  - `orbit.job_run.show` → `orbit job-run show <id>`
  - `orbit.job_run.archive` → `orbit job-run archive <id>`
