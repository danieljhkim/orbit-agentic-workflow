title: Clarify task status naming to prevent in_progress CLI mistakes
description: |-
  ## Problem
  Agents repeatedly try `orbit task update --status in_progress`, but the CLI only accepts `in-progress`. Orbit also exposes `in_progress` in internal representations and some lifecycle guidance, which makes the mismatch easy to reproduce.

  ## Goal
  Reduce repeated agent and human failures by making the accepted task status spelling unambiguous at the CLI and in Orbit guidance.

  ## Done Criteria
  - User-facing task status guidance clearly distinguishes the canonical CLI spelling from any internal persisted representation.
  - The CLI experience mitigates this exact mistake, either by accepting the common alias or by returning a clearer, more directive error/help path.
  - Regression tests cover the chosen mitigation so the confusion does not reappear.
