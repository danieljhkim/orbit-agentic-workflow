id: T20260310-070917-1773126557809340000
title: orbit job run fails on manual-schedule jobs with invalid cron error
description: |-
  When `orbit job run <job-id>` (or the scheduled due-claim path) completes execution of a job whose `schedule` field is `"manual"`, the runtime crashes with:

  ```
  error: job validation failed: invalid cron expression (expected 5 fields): manual
  ```

  **Root cause:** `execute_activity_with_retries` in `orbit-core/src/command/job.rs` calls `compute_next_run_at(&job.schedule, Utc::now())` unconditionally at line 370–371 (post-execution, to schedule the next run). `compute_next_run_at` only accepts valid 5-field cron expressions and rejects the literal string `"manual"`.

  The same guard (`schedule == "manual" → use far-future sentinel`) is already present in both `add_job` (line 124) and `resume_job` (line 189), but was not applied in the post-execution path.

  **Impact:** Any job added with `--schedule manual` (including all default seeded jobs such as `job-resolve-backlogged-task`) cannot be triggered with `orbit job run`. The agent produces `JOB_RUN_VALIDATION_FAILED` and the run is counted as failed. Observed in live run `jrun-1773126145227508000`.
