title: Add orbit activity update command
description: |-
  # Missing Activity Update Command

  `orbit activity` supports add/list/show/run/delete but has no update subcommand. Changing any attribute of an existing activity—description, instruction, artifact_path_template, skill_refs, identity, or assigned_to—currently requires deleting and recreating the activity entirely.

  This is destructive: delete-and-recreate loses the original `created_at` timestamp and any history. Activities are configuration objects and should be updatable in place, consistent with how `orbit task update` works.

  ## Scope

  Add `orbit activity update <id>` with optional flags for all mutable fields:
  - `--description`
  - `--instruction`
  - `--artifact-path-template` (empty string clears)
  - `--skill-refs` (comma-separated, replaces current list)
  - `--identity` (empty string clears)
  - `--assigned-to` (empty string clears)
  - `--active` / `--inactive` (toggle active state)

  Omitting a flag means no change to that field (patch semantics, not replace-all).
