# ---- content ----
title: Refactor orbit skills into reference and workflow layers
description: |-
  Orbit skills currently duplicate content that activities already carry in their `instruction` fields.
  When an agent runs an activity, the activity instruction guides it — loading a full skill on top
  burns redundant tokens. But standalone agents (no driving activity) need enough context to orient
  themselves and choose the right skill.

  **Goal:** Split skills into two layers:

  - **`orbit-reference`** (new, always small): CLI syntax, lifecycle states, key concepts, skill index.
    Loaded by activity-driven agents when they need CLI facts without full workflow guidance.
  - **Full skills** (existing, trimmed): Strip content that activities already cover. Keep only what
    a standalone agent needs that activities don't provide.

  This reduces token burn for activity-driven runs while keeping standalone agents fully functional.
