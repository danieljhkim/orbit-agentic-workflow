schema_version: 4
id: T20260315-031147
title: Reorder and annotate task.yaml with section comments
description: |-
  `task.yaml` currently serializes fields in struct declaration order with no visual grouping. The desired format organizes fields into named sections with YAML comments for readability:

  ```yaml
  schema_version: 4

  # ---- identity ----
  id: T20260315-025432
  type: feature
  priority: medium

  # ---- content ----
  title: '...'
  description: |-
    ...
  acceptanceCriteria: []

  # ---- context ----
  contextFiles: [...]
  workspacePath: /Users/daniel/workspace/repos/orbit

  # ---- ownership ----
  createdBy: Claude
  assignedTo: null

  # ---- proposal workflow ----
  proposedBy: daniel
  proposalApprovedBy: null
  proposalRejectedBy: null
  proposalDecisionNote: null

  # ---- implementation ----
  branch: null
  prNumber: null

  # ---- review workflow ----
  reviewApprovedBy: null
  reviewRejectedBy: null
  reviewDecisionNote: null

  # ---- execution references ----
  activityId: null
  jobId: null
  jobRunId: null

  # ---- timestamps ----
  createdAt: 2026-03-15T02:54:32.018413Z
  updatedAt: 2026-03-15T02:54:32.018413Z

  # ---- audit trail ----
  history:
    - at: ...
  comments: []
  ```

  `serde_yaml::to_string` cannot emit YAML comments. The serializer must be replaced with a manual string builder that writes each field using `serde_yaml::to_value` for proper escaping, inserting section headers between groups.

  Deserialization via `serde_yaml::from_str` is unaffected — YAML comments are ignored on read.
