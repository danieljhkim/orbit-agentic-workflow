title: orbit task update <short-id> gives 'task not found' with no hint that full ID is required
description: |-
  Task and job-run IDs currently include a full unix nanosecond timestamp suffix (e.g. T20260314-041715-1773461835307716000). This suffix is unnecessary in the common case and makes IDs unwieldy to copy, type, and reference in plans and execution summaries.

  The simpler approach: drop the unix timestamp entirely. Use only the date-time prefix (e.g. T20260314-041715). When a collision occurs within the same second, append a short numeric suffix: -2, -3, etc.

  Same issue applies to job-run IDs (jrun- prefix).
