# ---- content ----
title: 'Feat: add default_input to Job type so pipeline steps receive baseline values without --input flags'
description: |-
  The `job_task_pipeline` requires `base` (the git branch to start from) as input to the `create_branch` step, but no previous step produces it and there is no way to bake default inputs into a job definition. Operators must pass `--input base=main` manually every time, which breaks scheduled/autonomous runs.

  Implement a `default_input` map on the `Job` struct that is applied as the initial `current_input` when a job run starts (before any step executes). CLI `--input` flags override defaults. Update `create_branch` to make `base` optional in its JSON schema with a default of `"main"` as a documentation hint, and set `default_input: {base: main}` in `job_task_pipeline.yaml`.
acceptanceCriteria: []

