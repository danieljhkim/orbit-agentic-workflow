title: Remove orbit job archive and move deleted jobs to disabled/ subdir
description: |-
  Two related cleanup items for the job CLI:

  1. **Remove `orbit job archive`** — this subcommand archives a job run but is a duplicate of `orbit job-run delete`. It should be removed from `JobSubcommand` entirely.

  2. **Revise `orbit job delete <job-id>`** — instead of marking the job's YAML with `state: disabled` in-place, physically move the file to a `disabled/` subdirectory under the jobs activities directory (`.orbit/jobs/jobs/disabled/<job-id>.yaml`). This gives a clear, inspectable on-disk separation between active and deleted jobs.
