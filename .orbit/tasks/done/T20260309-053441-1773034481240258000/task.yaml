title: Support --comment appends on task add/update/approve/reject
description: |-
  # Task comment append support

  Add a `--comment <comment>` option to `orbit task add`, `orbit task update`, `orbit task approve`, and `orbit task reject`. When provided, the command should append a new entry to the task's existing `comments` collection instead of replacing prior entries.

  This proposal is intentionally grounded in the current Orbit architecture. Task persistence is file-backed today, and the file task bundle already contains a `comments` collection, so this feature should extend the shared task contract, runtime mutation API, CLI wiring, and file task store behavior. It should not introduce or depend on a separate SQLite task persistence path.

  This task supersedes archived proposal `T20260309-051248-1773033168088020000`, which was rejected because its implementation plan was not aligned with the current task-storage architecture.

  Open design point to resolve during implementation: `approve` and `reject` already carry an explicit actor via `--by`, while `add` and `update` rely on other attribution fields. Comment authorship should stay explicit and deterministic within the existing task model and command contracts.
