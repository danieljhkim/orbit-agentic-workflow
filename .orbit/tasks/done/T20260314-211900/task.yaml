id: T20260314-211900
title: Seed default jobs from asset YAML files instead of hardcoded constants
description: |-
  ## Problem

  `seed_default_jobs` in `orbit-core/src/command/job.rs` hardcodes job parameters as a const array of `(job_id, target_id)` tuples with additional fields (`agent_cli`, `timeout_seconds`, `env_extra`) fixed inline.

  However, `orbit-core/assets/jobs/` already contains full YAML definitions for each default job (one file per job, e.g. `job-triage-and-dispatch-task.yaml`). These files carry the same data the code hardcodes. This creates a dual source of truth: changes to the YAML asset files have no effect on what gets seeded, because the seeder ignores them.

  ## Goal

  Refactor `seed_default_jobs` to parse its job definitions from the asset YAML files using `include_str!`, exactly as `seed_default_activities` does for activities.

  ## Scope

  - Modify `orbit-core/src/command/job.rs` only.
  - Remove the `DEFAULT_NAMED_JOBS` const.
  - Add a `DEFAULT_JOB_FILES` const using `include_str!` for each file under `orbit-core/assets/jobs/`.
  - Add a `DefaultJobFileSpec` serde struct matching the YAML schema: `{ schemaVersion: u32, job: DefaultJobEntry }`.
  - Parse each spec file, validate job_id matches the expected key, then call `add_job` with parsed data.
  - Preserve skip-if-exists behavior.
  - Add unit tests verifying that all bundled job specs parse successfully, just like the analogous activity test.
contextFiles:
