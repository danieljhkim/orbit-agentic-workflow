title: Make orbit init always refresh default skills and identities without full force reset
description: |-
  ## Problem
  Right now, recovering Orbit skills and identities to their default state often requires manually deleting skill and identity directories under `.orbit/` and linked skill directories under `.agents/`, then rerunning `orbit init`. Using `orbit init --force` is too destructive for this workflow because it resets the entire Orbit root, including task and job artifacts that should be preserved.

  ## Goal
  Change `orbit init` so it always reinitializes the default Orbit identities and default Orbit skills in place, including repairing the linked skill roots, without requiring `--force` and without wiping tasks, jobs, or other runtime artifacts.

  ## Done Criteria
  - Plain `orbit init` rewrites or refreshes the shipped default identity files and shipped default skill files under `.orbit` to the current built-in versions.
  - Plain `orbit init` repairs the linked skill roots used by agents, such as `.agents/skills` and `.claude/skills`, so manual directory deletion is no longer required for a clean re-seed.
  - `orbit init --force` remains the explicit destructive reset path, but normal init no longer requires it for identities/skills refresh.
  - Regression tests cover non-destructive reinitialization behavior and confirm that task/job artifacts are preserved.
