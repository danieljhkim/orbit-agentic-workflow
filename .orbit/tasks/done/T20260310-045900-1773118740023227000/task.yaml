title: Add simple task_id argument for resolve-backlogged-task job runs
description: |-
  # Simpler task-specific job run input

  Improve the ergonomics of manually running the existing resolve-backlogged-task activity by allowing callers to provide a single task identifier directly, instead of requiring a full JSON object payload each time.

  The goal is to support targeted execution of resolve-backlogged-task for a specific task in a way that feels natural from the CLI while preserving Orbit architecture boundaries and the current job and activity execution model. This should be scoped to the existing resolve-backlogged-task workflow rather than redesigning the full job target model.

  The implementation should define a clear CLI contract for passing task_id, update the underlying activity input contract as needed, and keep validation and error messages precise when task_id is missing or invalid.
