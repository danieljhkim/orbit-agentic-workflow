title: Increase default job timeout to 20 minutes
description: |-
  # Raise Default Job Timeout

  Increase Orbit's default job timeout from 15 minutes to 20 minutes to reduce Codex job-run timeouts on longer agent executions.

  Motivation:
  - a recent Codex job-run timed out before producing the required JSON stdout envelope
  - the current default timeout for `orbit job add` is 15 minutes (900 seconds)
  - built-in named jobs seeded by Orbit also currently use 900-second timeouts

  Scope:
  - change the default timeout for new jobs from `15m` to `20m`
  - update built-in seeded manual jobs to use 1200 seconds
  - update tests and docs that currently assert or describe the 15-minute default

  Out of scope:
  - changing direct `orbit activity run` timeout defaults unless separately justified
  - changing retry behavior, stale-run grace periods, or agent protocol handling
  - retroactively editing historical job-run records

  Assumptions:
  - the desired new default is exactly 20 minutes (1200 seconds)
  - increasing the default is sufficient for the timeout symptom without changing the agent protocol
  - existing jobs may need explicit updates or reseeding only where the repo intentionally tracks seeded defaults

  Risks:
  - tests currently hard-code 900 seconds and will fail until updated
  - checked-in seeded job YAMLs under `.orbit/jobs/jobs/` currently encode 900 seconds
  - longer timeouts can delay failure visibility for truly stuck jobs, so the change should stay limited to the default
