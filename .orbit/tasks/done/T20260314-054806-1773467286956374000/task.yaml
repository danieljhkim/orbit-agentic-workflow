title: orbit job list should show last-run status inline
description: |-
  The 'orbit job list' table shows job_id, target_type, target_id, and state (enabled/disabled). It does not show anything about recent execution history. To know whether a job last succeeded or failed, you must run 'orbit job history <id>' for each job individually.

  Adding a LAST_RUN column (success/failed/never, plus timestamp) would make job health visible at a glance — essential for operational monitoring without a separate dashboard.
