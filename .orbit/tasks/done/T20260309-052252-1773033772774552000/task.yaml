title: Create Claude skill symlinks during orbit init
description: |-
  # Create Claude skill symlinks during orbit init

  `orbit init` currently seeds default skills under `.orbit/skills` and creates per-skill symlinks under `.agents/skills`. Extend initialization so the same per-skill symlink layout is also created under `.claude/skills`.

  This should preserve current initialization behavior, keep the operation idempotent, and treat `.claude/skills` with the same repair/migration semantics already applied to `.agents/skills` where that behavior is appropriate. Avoid changing CLI responsibilities or introducing side effects outside the existing init flow.
