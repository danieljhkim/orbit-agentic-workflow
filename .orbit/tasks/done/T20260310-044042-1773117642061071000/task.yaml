description: |-
  # CEO-style Orbit product assessment

  Ask Steve (CEO) to review the current Orbit behavior, command surface, workflows, and overall product experience, then produce a concise recommendations report focused on product coherence, usability improvements, strategic simplifications, and high-value new features.

  This task is analysis-only. The deliverable is a markdown report at .orbit/agents/reports/2026-03-09/ceo_suggestions.md. The report should evaluate the product from a user and operator perspective, identify rough edges or unnecessary complexity, and recommend concrete improvements or new feature ideas with rationale and expected impact.

  The task should favor clear judgment over exhaustive cataloging. Suggestions should be prioritized and should distinguish between quick wins, structural improvements, and bigger feature bets.
