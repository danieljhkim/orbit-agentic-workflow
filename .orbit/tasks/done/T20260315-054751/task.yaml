# ---- content ----
title: Normalize built-in activity and job naming to snake_case
description: |-
  ## Summary

  Orbit currently mixes naming conventions for built-in activities and jobs. Activities are already mostly snake_case while built-in jobs are still kebab-case, which creates avoidable inconsistency in asset filenames, embedded IDs, and operator expectations.

  Decision: standardize built-in activity and job naming on `snake_case` across the product. Because Orbit validates bundled file keys against embedded `id` / `job_id`, this work must update both filenames and identifiers together, plus any built-in references that point at the old names.
acceptanceCriteria: []

