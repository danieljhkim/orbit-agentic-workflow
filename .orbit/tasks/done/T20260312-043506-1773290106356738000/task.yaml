title: Resolve unused hydrated_allowlist_env warning in orbit-core
description: |-
  # Resolve unused execution env helper warning

  `orbit-core` currently emits a `dead_code` warning because `ExecutionEnvPolicy::hydrated_allowlist_env` in `orbit-core/src/config/runtime.rs` is no longer referenced. The extras-aware variant is used by job execution, but the no-argument wrapper appears to be leftover API surface.

  This task should decide whether the wrapper should be removed or reintroduced through a legitimate caller, and leave the crate building without this warning.
