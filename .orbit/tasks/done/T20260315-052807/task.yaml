title: Clarify runtime config path terminology in docs and task text
description: |-
  ## Summary

  While executing `T20260315-050413`, I found wording drift around the runtime config file name. The implementation uses `<data_root>/config.toml`, which is typically `.orbit/config.toml` in a repo-local workspace, but some task text implied a separate file literally named `orbit.toml`.

  That mismatch is small, but it creates avoidable confusion when reviewing or executing config-related work because it is not obvious whether a plan is describing a user-facing alias or the real on-disk path.
