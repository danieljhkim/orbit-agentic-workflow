title: Let Orbit perform git commits from agent-selected files and message
description: |-
  ## Problem

  Orbit's current approval workflow expects a commit when code changes were accepted, but relying on the agent itself to run `git commit` is a poor fit for Orbit's non-interactive execution model and Codex sandboxing. Even when the agent knows the correct commit message and which files to include, the final repository mutation is better handled by Orbit itself.

  ## Goal

  Implement a simple first version of Orbit-owned commits where the agent decides:

  - the commit message
  - the exact file paths to stage

  and Orbit performs the actual `git add -- <files...>` and `git commit -m <message>` step after validating the request.

  ## Scope

  In scope for v1:

  - define a minimal commit-request payload produced by the agent
  - thread that payload through the job/agent execution path
  - add typed git-related commands to `orbit-tools` for staging and committing
  - validate message + file list before invoking those tools
  - cover the new behavior with focused tests

  Out of scope for v1:

  - partial-hunk selection
  - multi-commit planning
  - automatic commit message generation by Orbit
  - a generic "run arbitrary git" escape hatch
  - advanced policy beyond basic file/message validation and repository scoping

  ## Proposed Direction

  Keep the agent responsible for deciding intent, but move the privileged action into Orbit-owned typed tools. A simple implementation is:

  1. agent returns a structured commit request (`message`, `files[]`)
  2. Orbit validates the request against the workspace/repo root
  3. Orbit invokes narrow `orbit-tools` git commands to stage only those files and create the commit

  This keeps repository mutation in one audited Orbit-controlled path, makes tool usage trackable, and creates a reusable foundation for future git-aware workflows without opening a broad arbitrary command surface.

  ## Key Constraints

  - Only files inside the current workspace git repository may be staged.
  - Empty commit messages or empty file lists must be rejected.
  - Orbit should stage only the explicitly listed files.
  - The git tooling should remain typed and narrow rather than generic.
  - The design should stay intentionally small and auditable for v1.
