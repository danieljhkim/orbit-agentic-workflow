title: Remove implicit ~/.orbit home fallback; make repo-local .orbit the default
description: |-
  Orbit currently resolves its data root with a HOME-level fallback: if no explicit override or repo-local config is found, it defaults to $HOME/.orbit and bootstraps a home-level config there. This behavior should be removed.

  Orbit must use a repo-local .orbit directory by default. When running inside a git repo, .orbit is placed at the repo root. When running outside a git repo, .orbit is placed in the current working directory. The $HOME/.orbit fallback and any bootstrap behavior targeting the home directory must be eliminated.

  **Current resolution order** (orbit-core/src/runtime/mod.rs resolve_initialize_data_root):
  1. CLI --root flag
  2. ORBIT_ROOT env var
  3. Git repo root .orbit/config.toml (root field or directory presence)
  4. $HOME/.orbit/config.toml (fallback)
  5. $HOME/.orbit (final default)

  **Target resolution order:**
  1. CLI --root flag
  2. ORBIT_ROOT env var
  3. Git repo root .orbit (with or without config.toml)
  4. CWD/.orbit (no HOME fallback)

  **Out of scope:**
  - Migrating existing ~/.orbit data
  - Changing explicit --root override behavior
  - Changing persistence backends beyond root location
