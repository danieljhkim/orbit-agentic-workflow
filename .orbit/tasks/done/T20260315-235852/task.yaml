# ---- content ----
title: Adopt isolated worktree execution for task implementation
description: |-
  Orbit's current task pipeline creates a branch in the main repository checkout and then runs implementation work against ambient agent context. That makes it too easy for agent work to mutate the development checkout directly, which is noisy and hard to trust while a task is in flight.

  We want to change strategy: task execution should use a dedicated git worktree instead of reusing the main checkout. The human-facing development branch and checkout should stay stable while the agent works in its own isolated directory.

  Desired behavior:
  - when a task pipeline starts implementation, Orbit creates or selects a dedicated worktree for that task branch
  - agent execution, tests, file edits, and git operations run inside that worktree
  - the main checkout remains on the human's branch without in-place churn from the agent
  - cleanup and lifecycle expectations for task worktrees are explicit

  This should replace the current branch-in-place strategy for task execution paths such as `job_task_pipeline` and related implementation flows.
