title: Reconcile orphaned running job runs when no process is alive
description: |-
  # Finalize job runs to failed when execution errors after marking them running

  We inspected job run `jrun-20260315-212834` for `job_task_pipeline` on March 15, 2026. Orbit reported it as `state: "running"` with `steps: []`, but there was no matching local process.

  After tracing the runtime, the more likely root cause is not missing process liveness detection but an exception path in `execute_activity_with_retries()`. The runtime marks a run as `running` before step execution begins, then performs several fallible operations with `?` before any failure finalization happens. If one of those operations errors, the function returns early and leaves the persisted run stuck in `running`.

  This specific orphaned run is consistent with that path:
  - the run had no completed steps
  - `job_task_pipeline` previously passed `base` into `dispatch_task`
  - `build_execution_context_for_step()` validates the activity input schema before step execution
  - a schema mismatch there would return early after the run was already marked `running`, leaving `steps: []` and no failed finalization

  This issue should make job execution exception-safe: once a run has been marked `running`, any later error path during setup or step orchestration must finalize it to `failed` with a clear error message instead of returning early and leaving it active.

  Out of scope:
  - Redesigning the full job execution model
  - Adding process supervision or distributed liveness tracking as the primary fix
  - Changing successful timeout-based stale recovery unless needed as secondary hardening
