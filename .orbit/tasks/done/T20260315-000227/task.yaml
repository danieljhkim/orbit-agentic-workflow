schema_version: 4
id: T20260315-000227
title: 'Refactor activity artifact schema: snake_case, envelope wrapper, remove assigned_to and artifact_path_template, add tools'
description: |-
  Refactor all activity artifacts and the full activity pipeline to adopt a new canonical schema.

  ## New YAML file format (on-disk)

  ```yaml
  schema_version: 1
  created_by: system
  identity_id: grace
  created_at: <rfc3339>
  updated_at: <rfc3339>
  activity:
      id: resolve-backlogged-task
      spec_type: task
      description: ...
      instruction: ...
      input_schema_json:
          type: object
          properties: {}
          additional_properties: false
      output_schema_json:
          type: object
          properties: {}
          additional_properties: false
      skill_refs: ["orbit-skills"]
      tools: ["fs.read", "fs.write"]
  ```

  ## What changes

  1. All field names are snake_case (previously camelCase in YAML).
  2. Top-level envelope fields: `schema_version`, `created_by`, `identity_id`, `created_at`, `updated_at`.
  3. Activity spec lives under the `activity:` key.
  4. `assigned_to` is removed from the entire codebase (types, store, core, CLI, YAML).
  5. `artifact_path_template` is removed from the entire codebase.
  6. `tools: Vec<String>` is added to the `Activity` type and stored in the spec block. Semantics are deferred — it is stored but not enforced by the runtime.
  7. Existing `.orbit/activities/active/*.yaml` files are deleted (start clean — `orbit init` re-seeds them).
