title: Extract engine and executors into a new orbit-engine crate
description: |-
  # Extract the job engine into its own crate

  **Goal:** Move the runtime execution engine out of `orbit-core` into a new `orbit-engine` crate so the product has a cleaner separation between command/bootstrap concerns and job/activity execution concerns.

  **Why now:**
  - Phase 1 established the internal seam by extracting `orbit-core/src/engine/*` and `orbit-core/src/executor/*` away from the command layer.
  - `orbit-core/src/command/job.rs` is now much thinner, which makes the crate boundary realistic without a big-bang rewrite.
  - Keeping the engine in `orbit-core` any longer will continue to blur the line between runtime orchestration and app/bootstrap concerns.

  **Target architecture:**
  - New crate: `orbit-engine`
  - `orbit-engine` owns job-run orchestration, activity dispatch, and executor implementations
  - `orbit-core` remains the composition root that wires stores, config, runtime services, audit/mutation boundaries, and CLI-facing command handlers
  - `orbit-engine` depends on narrow service traits rather than directly on `OrbitRuntime` internals

  **In scope:**
  - new `orbit-engine` crate setup and workspace wiring
  - extraction of shared engine types, runner logic, and executors from `orbit-core`
  - service trait boundary between `orbit-core` and `orbit-engine`
  - validation that the existing job/activity behavior still works after the move

  **Out of scope:**
  - broader runtime redesign beyond the engine boundary
  - new product behavior for jobs, activities, or providers
  - removing the direct `orbit agent run` CLI surface unless it naturally overlaps with the extraction

  **Risks:**
  - extracting too much concrete runtime state instead of a clean trait seam could create a fake boundary
  - circular dependencies are easy to introduce if engine code still reaches back into `OrbitRuntime` or command modules
  - shared types may need careful placement so `orbit-core`, `orbit-engine`, and existing crates do not form awkward dependency chains
