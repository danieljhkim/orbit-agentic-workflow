title: Simplify task attribution by deriving actors and using history
description: |-
  # Simplify task attribution by deriving actors and using history

  **Goal:** Replace redundant task actor and decision metadata with a simpler contract where Orbit derives task actors from execution context and records approval/rejection details in history instead of duplicating them on the task record.

  **Supersedes:** Rejected task `T20260314-054456-1773467096795909000`. The new direction is intentionally simpler than “canonical identity refs everywhere”.

  **Problem:**
  - Task records currently persist top-level decision fields like `review_decision_note`, `review_rejected_by`, `review_approved_by`, `proposal_decision_note`, `proposal_rejected_by`, and `proposal_approved_by`, even though approval/rejection is already an eventful workflow that should be traceable in history.
  - Task creation and lifecycle commands still accept manual identity-bearing inputs such as `--by`, `--created-by`, `--assigned-to`, and the current required `proposed_by`, which creates redundant operator work and inconsistent provenance.
  - Orbit already has execution context that should drive attribution automatically: activity-based execution already carries `identity_id` on the activity artifact, and task operations invoked through `orbit tool run ...` are known to be agent-driven while non-tool CLI usage should be treated as human-driven.
  - The current model mixes stored task metadata, comments, and audit/history responsibilities in a way that makes the product harder to understand and the CLI harder to use.

  **Requested improvement:**
  - Remove redundant task decision fields from the task model and storage: `review_decision_note`, `review_rejected_by`, `review_approved_by`, `proposal_decision_note`, `proposal_rejected_by`, `proposal_approved_by`.
  - Persist proposal/review approvals and rejections as history or audit-trail entries that Orbit fills automatically with actor and note data.
  - Make Orbit determine `created_by` and `assigned_to` automatically instead of accepting them as routine manual CLI inputs.
  - Remove redundant identity-related CLI arguments from task commands, especially any manual actor flags where Orbit already knows the actor from execution context.
  - Revisit the task-creation attribution contract holistically so proposal/task ownership is inferred where possible instead of remaining a required manual identity string.

  **Scope:**
  - Task type definitions, persistence contracts, and file storage for attribution/decision metadata
  - Task add/update/approve/reject runtime behavior and actor inference
  - Tool/runtime plumbing needed to distinguish agent-driven `orbit tool run ...` task operations from human-driven CLI operations
  - Activity-based attribution paths that should use `identity_id` when Orbit executes on behalf of a known activity identity
  - Task CLI/help output, JSON output, skill guidance, and tests

  **Out of scope:**
  - Redesigning Orbit's full identity system beyond the task-attribution boundary
  - Reworking unrelated activity/job metadata unless needed to support the attribution source of truth
  - Removing useful auditability; the goal is to move decision provenance into history, not to discard it

  **Risks:**
  - Existing persisted tasks and downstream consumers may still expect the removed task fields, so compatibility and migration behavior need to be deliberate.
  - Inferring human vs agent provenance too loosely could create surprising attribution if the runtime boundary is not defined precisely.
  - If history/audit output is not surfaced clearly in `task show` or JSON responses, removing the top-level fields could make reviews feel less visible before the UX is updated.
