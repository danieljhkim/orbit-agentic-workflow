title: Add --ops signal-tier output to task, job, and activity list commands
description: |-
  # Token Bloat: Signal-Tier Output for Agent Operations

  Agent activity sessions consume ~14k tokens per run. The dominant cause is list commands returning full objects—plan, execution_summary, description, context_files—when agents only need operational signals to make routing decisions.

  Execution summaries are already stored as per-task files; they do not need to move. The immediate fix is additive: a `--ops` flag on list commands that returns a minimal signal-only JSON object.

  ## Scope

  Add `--ops` to three list commands:
  1. `orbit task list --ops` — returns `id`, `title`, `type`, `status`, `priority`
  2. `orbit job list --ops` — returns `job_id`, `target_id`, `state`, `next_run_at`
  3. `orbit activity list --ops` — returns `id`, `type`, `description`, `is_active`

  `--ops` implies JSON output. Existing `--json` behavior is unchanged. No changes to storage, domain types, or task file layout.

  ## Expected Impact

  Token usage per agent list query drops from ~11k to ~150 tokens. No breaking changes.
