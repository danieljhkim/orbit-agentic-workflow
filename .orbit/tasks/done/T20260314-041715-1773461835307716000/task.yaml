title: Remove job scheduler; jobs are manually triggered only
description: |-
  Orbit jobs currently support cron and interval schedules, a daemon (orbit job serve), a single-tick command (orbit job tick), and pause/resume lifecycle. All of this scheduling machinery should be removed. Jobs will only execute when explicitly triggered via orbit job run <id>.

  **What is removed:**
  - schedule field on Job (cron, interval, manual strings all gone)
  - next_run_at field on Job
  - JobScheduleState::Paused (no scheduler = no pause concept; keep Enabled/Disabled for active vs deleted)
  - orbit job serve command (scheduler daemon)
  - orbit job tick command (single scheduler cycle)
  - orbit job pause and orbit job resume commands
  - Cron parser, interval alias parser, compute_next_run_at (orbit-core/src/job/state_machine.rs — delete file)
  - due_jobs(), next_due_job_time(), claim_due_jobs(), update_job_next_run() from the job store backend trait and implementations
  - JobTickResult type and tick_once()/run_forever() in orbit-core/src/job/runtime.rs

  **What is kept:**
  - orbit job add (schedule and next_run_at args removed)
  - orbit job list, show, history, delete
  - orbit job run <id> (manual trigger, unchanged semantics)
  - retry_max_attempts and retry_backoff_strategy — retries happen synchronously within the job run invocation, not scheduled for the future
  - state: Enabled | Disabled (no Paused)

  **Decision to confirm before implementing:**
  - Retry scheduling currently sets next_run_at to retry after a delay. Without a scheduler, retries must either be (a) synchronous within the same invocation with a sleep, or (b) removed. Implementer should confirm approach with the proposer.
