title: Default manual jobs are hidden from orbit job list
description: |-
  ## Problem
  `orbit init` now seeds the default named jobs, but they do not appear in a plain `orbit job list` result. That makes it look like initialization failed even though the jobs exist and can be shown individually or via `orbit job list --all`.

  ## Root Cause
  The default jobs are seeded in `seed_default_jobs()` with `schedule: manual`. Manual jobs are created in `add_job()` with `JobScheduleState::Disabled`. The default `orbit job list` path calls `runtime.list_jobs(false)`, and both file and SQLite job stores exclude disabled jobs unless `--all` is passed.

  ## Impact
  Users cannot discover the seeded default jobs with the normal list command, which is the first place they look after initialization. This creates confusion, makes init appear broken, and hides an important part of the default runtime configuration.

  ## Done Criteria
  - The intended UX for seeded default manual jobs is made explicit and implemented consistently.
  - After `orbit init`, users can discover the default jobs through the standard job-listing workflow without needing insider knowledge.
  - Regression coverage proves the expected `orbit job list` behavior for seeded default jobs.
