title: Investigate job run stuck in running state after agent success
description: |-
  # Job-run completion detection bug

  A scheduled Orbit job can complete successfully from the agent's perspective, but Orbit leaves the corresponding job-run in `running` state and the terminal appears to hang instead of returning cleanly.

  Observed evidence from the session log:
  - the agent emitted a final JSON success envelope
  - Orbit recorded a `task_complete` event with the same `last_agent_message`
  - the job-run YAML still reported the run as `running` afterward

  Impact:
  - operators see a hung terminal even though the agent finished
  - the scheduler may treat the run as still active and block follow-up executions
  - operational reports become misleading because agent completion and persisted run state diverge
