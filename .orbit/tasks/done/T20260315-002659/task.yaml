id: T20260315-002659
title: 'feat: extend activity spec_type to support agent_invoke, cli_command, and api variants'
description: |-
  ## Summary

  Activities currently support only LLM agent invocation, but the `spec_type` field is an unvalidated string with no execution branching. This task extends the system to support three distinct execution modes:

  - `agent_invoke` — existing LLM agent path (renamed from ad-hoc values like `task`, `task_approval`)
  - `cli_command` — spawn a shell command with template-substituted args, capture output via `$ORBIT_OUTPUT_FILE`
  - `api` — make an HTTP request with template-substituted URL/headers/body, return parsed response

  ## YAML Examples

  ### agent_invoke
  ```yaml
  activity:
    id: resolve-backlogged-task
    spec_type: agent_invoke
    description: Work on a single orbit task in backlog or rejected status.
    input_schema_json: { type: object, properties: { task_id: { type: string } } }
    output_schema_json: { type: object, required: [task_id], properties: { task_id: { type: string } } }
    instruction: |
      If input.task_id is provided, work on that specific task...
    skill_refs: [orbit-skills, orbit-manage-tasks]
    tools: [fs.read, fs.write]
  ```

  ### cli_command
  ```yaml
  activity:
    id: run-package-tests
    spec_type: cli_command
    description: Run tests for a specific Rust package.
    input_schema_json: { type: object, properties: { package: { type: string } } }
    output_schema_json: { type: object, properties: { exit_code: { type: integer } } }
    command: cargo
    args: [test, -p, '{{input.package}}']
    working_dir: '{{workspace_path}}'
    timeout_seconds: 300
    expected_exit_codes: [0]
    env:
      RUST_BACKTRACE: '1'
  ```

  ### api
  ```yaml
  activity:
    id: notify-slack
    spec_type: api
    description: Post a message to a Slack channel.
    input_schema_json: { type: object, required: [message], properties: { message: { type: string }, channel: { type: string } } }
    output_schema_json: { type: object, properties: { ok: { type: boolean }, ts: { type: string } } }
    method: POST
    url: https://slack.com/api/chat.postMessage
    headers:
      Content-Type: application/json
      Authorization: 'Bearer {{secrets.SLACK_BOT_TOKEN}}'
    body: '{"channel": "{{input.channel}}", "text": "{{input.message}}"}'
    timeout_seconds: 30
    expected_status_codes: [200]
  ```

  ## Template Namespace

  All string fields in `cli_command` and `api` config support `{{namespace.key}}` substitution:

  | Syntax | Source |
  |---|---|
  | `{{input.field}}` | Runtime input values (validated against input_schema_json) |
  | `{{env.VAR}}` | Process environment variables |
  | `{{workspace_path}}` | Activity workspace path |
  | `{{secrets.KEY}}` | Reserved — return error if referenced (not yet implemented) |

  ## Output Capture (cli_command)

  The runtime sets `ORBIT_OUTPUT_FILE=/tmp/<run-id>.json` before execution. If the command writes valid JSON to that path, it is validated against `output_schema_json`. If not written, `{"exit_code": N}` is used as fallback output.

  ## Dependency

  This task builds on top of T20260315-000227 (activity schema snake_case refactor). That task must be complete before starting this one. After T20260315-000227, the `Activity` struct has top-level `instruction`, `skill_refs`, `tools` fields — this task migrates those into a `spec_config: Value` blob.

  ## Scope

  - Includes: type-specific execution paths, template engine, `ORBIT_OUTPUT_FILE` protocol, HTTP executor, all related struct/YAML/CLI updates
  - Excludes: `{{secrets.*}}` implementation (deferred), additional spec types, agent_invoke skill permission enforcement via `tools` field
