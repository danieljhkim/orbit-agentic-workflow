title: Add typed GitHub CLI tools to Orbit's tool arsenal
description: |-
  ## Problem

  Orbit agents need a safe, reusable way to perform the GitHub PR workflow described in `gh_commands.md`, but exposing arbitrary `gh` execution would be too broad and hard to audit. The requested command surface is intentionally narrow: auth check, repo discovery, PR creation/list/view/checkout/comment/review/merge/close, and CI checks.

  ## Goal

  Add these GitHub operations to Orbit's tool arsenal as typed internal tools so agents can use them without raw shell access to `gh`.

  ## Scope

  In scope:

  - implement narrow typed tools that wrap the minimal `gh` command set in `gh_commands.md`
  - keep the tool contract focused on the Task -> Branch -> PR -> Review -> Merge workflow
  - preserve auditability and policy control through Orbit's existing tool execution path
  - add focused tests for tool registration, input validation, and command construction

  Out of scope:

  - generic `gh` passthrough
  - direct GitHub API integration
  - support for every `gh` subcommand
  - multi-provider abstraction beyond the initial tool naming and contracts

  ## Proposed Direction

  Introduce GitHub-specific built-in tools with Orbit-facing names such as:

  - `github.auth.status`
  - `github.repo.view`
  - `github.pr.create`
  - `github.pr.list`
  - `github.pr.view`
  - `github.pr.checkout`
  - `github.pr.comment`
  - `github.pr.review`
  - `github.pr.merge`
  - `github.pr.close`
  - `github.pr.checks`

  Each tool should accept typed inputs, invoke only the corresponding `gh` operation, and return structured JSON suitable for agents and audits. This keeps the surface area small while making the PR workflow reusable across Orbit activities and skills.

  ## Key Constraints

  - Do not add a generic "run arbitrary gh" tool.
  - Keep tool inputs explicit and minimal.
  - Prefer structured JSON output over raw terminal text where possible.
  - Follow the command set and intent in `gh_commands.md`.
