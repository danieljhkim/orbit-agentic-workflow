title: Clarify approve-task skill commit requirements for review-approved code changes
description: |-
  # Clarify commit requirements in orbit-approve-task

  The current `orbit-approve-task` skill explains how to return `result.commit`, but the wording is still ambiguous enough that an approval can be recorded without also requesting the required commit. In particular, the phrase "if there was a code change and the workflow expects a commit" leaves too much room for interpretation.

  We want the instruction to be explicit: when an agent approves a task in `review` and accepts code changes, the approval response must include `result.commit` so Orbit can create the commit. The file list should include the relevant changed repository files, the Orbit task artifacts for the approved task after it reaches `done` under `.orbit/tasks/done/<task_id>/`, and any associated job-run artifacts that belong in the same audited commit.

  The rule should also be explicit about what must not be committed: task bundles that are still in `proposed`, `backlog`, `in-progress`, `review`, `blocked`, or `rejected` are not the approval artifacts to stage for this workflow.

  This should update the human-facing repo skill and the shipped asset copy together so future agents get one unambiguous rule.
