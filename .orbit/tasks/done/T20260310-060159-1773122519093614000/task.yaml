title: Create triage-and-dispatch activity for CEO-driven task selection
description: |-
  # Create triage-and-dispatch Activity and Default Named Jobs

  **Depends on:** T20260310-061202-1773123122525861000 (orbit job run --task-id + named job IDs + manual schedule) — that task must be merged and built before any steps here.

  Once the code prerequisites ship, register the five default named inactive jobs and the triage-and-dispatch activity.

  ## Default Named Jobs (all --schedule manual, disabled)

  | Job ID | Target Activity |
  |--------|----------------|
  | `job-resolve-backlogged-task` | `resolve-backlogged-task` |
  | `job-perform-maintenance` | `perform-maintenance` |
  | `job-oversee-orbit-operations` | `oversee-orbit-operations` |
  | `job-approve-task-leader` | `approve-task-leader` |
  | `job-triage-and-dispatch-task` | `triage-and-dispatch-task` |

  These exist as stable handles operators and activity instructions can reference portably, regardless of install.

  ## triage-and-dispatch-task Activity

  Steve (CEO) reviews the current backlog, applies product judgment to select the single highest-value task, and dispatches it by invoking `orbit job run job-resolve-backlogged-task --task-id <id>`. Pure orchestration — pick and delegate. Execution is handled by the existing resolve-backlogged-task activity.
