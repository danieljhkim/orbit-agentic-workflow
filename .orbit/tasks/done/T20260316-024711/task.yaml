title: Split job execution into engine modules and remove legacy created_file auto-commit
description: |-
  # Split job execution into engine modules and remove legacy created_file auto-commit

  Orbit's current job runtime has grown into a large mixed-responsibility surface inside `orbit-core/src/command/job.rs`. That file currently blends job-definition CRUD, job-run orchestration, activity dispatch, agent protocol parsing, schema validation, stale-run recovery, step-input propagation, and legacy report auto-commit behavior.

  We want a cleanup refactor that enforces a clearer architecture:
  - `command/job.rs` should only own direct job command operations such as add/show/list/update/delete and thin run entrypoints.
  - job-run orchestration should move into an internal engine layer inside `orbit-core` first.
  - activity execution/dispatch should move into an engine/executor flow with clear module boundaries.
  - the legacy `created_file` / `execute_created_file_auto_commit` path should be removed entirely. Orbit should not auto-commit reports.
  - a separate `orbit-engine` crate can be reconsidered later once the internal engine boundary is stable and the dependency surface is clear.

  This task should deliver a cleaner runtime structure, remove obsolete side effects, and make future activity types and lifecycle changes easier to reason about.

  Out of scope:
  - redesigning the task model itself
  - introducing new job features unrelated to runtime cleanup
  - extracting a new crate in the same pass unless the internal engine split ends up making that extraction trivial and low-risk
  - silently preserving deprecated `created_file` behavior behind compatibility shims
