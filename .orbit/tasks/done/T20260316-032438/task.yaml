title: Remove the legacy direct orbit agent run command
description: |-
  # Remove the legacy direct agent-run CLI surface

  **Goal:** Delete the standalone `orbit agent run` command and the supporting core path if it has no product use beyond being directly exposed by the CLI.

  **What I verified:**
  - `orbit-cli/src/command/agent.rs` is the active user-facing entrypoint for this behavior.
  - `orbit-core/src/command/agent.rs` implements `run_agent_task`, `run_agent_task_with_options`, and `get_agent_session` for that path.
  - Current runtime/job execution no longer depends on this command surface; job activity execution now goes through the engine/executor path instead.
  - The remaining references are the CLI wiring and dedicated tests such as `orbit-core/tests/agent_run_behavior.rs` and `orbit-cli/tests/agent_commands.rs`.

  **Requested outcome:**
  - Remove the direct `orbit agent run` command from the CLI.
  - Remove the corresponding legacy core command path if nothing else still depends on it.
  - Clean up stale tests, docs, and any now-dead session helpers that only existed for this surface.

  **Out of scope:**
  - Removing agent support from job/activity execution.
  - Redesigning the new engine/executor-based agent activity path.

  **Risks:**
  - Some lower-level session read APIs may still be useful elsewhere even if the run command is removed, so the implementation should confirm which pieces are truly dead before deleting them.
  - Help text, tests, or docs may still mention the command after the code path is removed.
