schema_version: 4
id: T20260314-220354
title: Refactor Job schema to multi-step and job-run to directory structure
description: |-
  Two interconnected schema changes to jobs and job-runs:

  **1. Multi-step Job schema**

  The current `Job` struct is a thin wrapper over a single activity (flat `target_type`, `target_id`, `agent_cli`, `timeout_seconds`, `env_extra` fields). Replace these with a `steps: Vec<JobStep>` array, where each step carries those same fields. This enables jobs to chain multiple activity invocations sequentially.

  New job YAML shape:
  ```yaml
  schemaVersion: 1
  job:
    job_id: job-perform-maintenance
    state: enabled
    steps:
      - target_type: activity
        target_id: perform-maintenance
        agent_cli: codex
        timeout_seconds: 1200
        env_extra: []
  ```

  **2. Directory-based job-run storage**

  Replace the single flat `jrun-<id>.yaml` file with a directory bundle:
  ```
  .orbit/jobs/runs/<job_id>/<run_id>/
    jrun.yaml          # run-level metadata only
    step-runs/
      01-<target_id>.yaml   # per-step execution record
      02-<target_id>.yaml
  ```

  `jrun.yaml` holds only run-level fields: `run_id`, `job_id`, `attempt`, `state`, `scheduled_at`, `started_at`, `finished_at`, `duration_ms`, `created_at`.

  Each step file holds per-step execution: `target_type`, `target_id`, `started_at`, `finished_at`, `duration_ms`, `exit_code`, `agent_response_json`, `status`, `error_code`, `error_message`.

  Step files use index-prefixed names (`01-perform-maintenance.yaml`) to preserve order and avoid collisions if two steps share a target_id.

  **Why this matters:**
  - `agent_response_json` can be hundreds of KB; keeping it in a separate file prevents bloated run metadata
  - Steps can be written incrementally as they complete (better observability mid-run)
  - Consistent with the task bundle pattern (`.orbit/tasks/<status>/<id>/`)
  - Enables future step-level retry and partial replay
