title: Rename orbit_home and home-labeled config surfaces to selected root terminology
description: |-
  # Rename orbit_home and home-labeled config surfaces to selected root terminology

  **Goal:** Remove the remaining `orbit_home` / `home` naming drift now that Orbit no longer defaults to `$HOME/.orbit`.

  **Problem:**
  - Runtime/context/config surfaces still expose names like `orbit_home`, `orbit_home()` and `config show` field/output labels called `home`.
  - After the repo-local root refactor, those values now mean "selected Orbit root" rather than a HOME-backed location.
  - The old names create avoidable confusion for users, agents, and future maintainers.

  **Requested cleanup:**
  - Rename the internal/runtime compatibility surface from `orbit_home` to terminology that matches the actual semantics, such as `orbit_root`, `selected_root`, or similar.
  - Update `config show` JSON/text output so field names and labels no longer imply a HOME-only meaning.
  - Refresh tests/docs accordingly.

  **Scope:**
  - Runtime/context/config naming only
  - CLI output/help/docs that still present the selected root as `home`
  - Tests that assert the old field names or labels

  **Out of scope:**
  - Reintroducing any HOME fallback behavior
  - Broad persistence or initialization behavior changes beyond naming/API cleanup

  **Risks:**
  - Renaming public CLI JSON fields may break consumers, so compatibility handling or a deliberate breaking-change note may be required.
  - Internal renames may touch several crates because the runtime context threads this field through multiple layers.
