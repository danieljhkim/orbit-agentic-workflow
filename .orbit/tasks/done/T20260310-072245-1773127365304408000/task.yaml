id: T20260310-072245-1773127365304408000
title: Fix hermetic env causing Codex agent panic on macOS
description: |-
  ## Problem

  When `orbit job serve` or `orbit job run` spawns an agent CLI (e.g., Codex) with
  `inherit = false` (the default hermetic environment mode), the child process receives
  only `HOME`, `PATH`, and `CODEX_HOME`. On macOS, this causes the Codex binary to panic:

  ```
  WARNING: proceeding, even though we could not update PATH: Operation not permitted (os error 1)

  thread 'main' panicked at system-configuration-0.6.1/src/dynamic_store.rs:154:1:
  Attempted to create a NULL object.
  ```

  The `system-configuration` Rust crate requires macOS-specific environment variables
  (e.g., `TMPDIR`, `__CF_USER_TEXT_ENCODING`, `SHELL`, or similar Darwin plumbing) to
  initialise `SCDynamicStore`. Without them, it constructs a NULL Core Foundation object
  and panics.

  ## Impact

  - All jobs with `agent_cli: codex` fail immediately with `AGENT_INVOCATION_FAILED` (exit 101).
  - The triage-and-dispatch job cannot delegate work to resolve-backlogged-task or any other
    agent-backed job.
  - Observed in run `jrun-1773126986888435000`.

  ## Root Cause Chain

  1. `orbit-core/src/command/job.rs:554-558` selects `EnvironmentMode::ClearAndSet` when
     `inherit = false`.
  2. `orbit-exec/src/process.rs:25-28` calls `command.env_clear()` then sets only the
     allowlisted vars.
  3. Codex (or any macOS-native binary) loses system-level env vars required by
     `SCDynamicStore` and panics.
