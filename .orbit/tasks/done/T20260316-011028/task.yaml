title: Remove created_at and updated_at from activity YAML artifacts
description: |-
  # Remove timestamp noise from activity YAML artifacts

  **Goal:** Stop writing `created_at` and `updated_at` into persisted activity YAML artifacts so those files only carry stable activity configuration and references.

  **Problem:**
  - Activity YAML artifacts currently include creation and update timestamps such as `created_at: 2026-03-16T01:08:25.195539Z` and `updated_at: 2026-03-16T01:08:25.195539Z`.
  - Those fields add churn to artifacts that are otherwise treated as configuration/state documents and make diffs noisier than they need to be.
  - The timestamps appear derivable or non-essential for the persisted artifact contract, so storing them in the YAML surface is probably redundant.

  **Requested improvement:**
  - Remove `created_at` and `updated_at` from persisted activity YAML artifacts.
  - Update any readers, serializers, tests, and docs that still expect those fields in activity YAML.
  - Confirm Orbit still exposes any required activity timing metadata through the right runtime or API surface if that metadata is still needed elsewhere.

  **Scope:**
  - Activity file persistence and serialization
  - Activity load/save contracts and tests
  - Any user-facing examples or assertions that reference these YAML timestamps

  **Out of scope:**
  - Removing timestamps from activity run or job run artifacts unless the implementation naturally overlaps
  - Broader activity metadata redesign beyond the YAML artifact surface

  **Risks:**
  - Existing tests or tooling may currently depend on those YAML fields being present.
  - If timestamp metadata is still relied on for debugging or display, the replacement source of truth needs to stay clear.
