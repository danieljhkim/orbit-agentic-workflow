title: Remove job retry configuration and simplify job schema
description: |-
  # Remove job retry configuration and simplify job schema

  **Goal:** Remove retry support from Orbit jobs so job execution stays single-attempt and the persisted/job-definition schema stays minimal.

  **Requested simplification:** Remove these properties everywhere they are part of job definitions, typed models, persistence, runtime behavior, or user-facing output:
  - `retry_max_attempts`
  - `retry_backoff_strategy`
  - `retry_initial_delay_seconds`

  **Scope:**
  - Job YAML/spec payloads under `.orbit/jobs/jobs/`
  - CLI job add/show/json surfaces
  - Core job command params and runtime execution flow
  - Shared job types/contracts
  - File and SQLite stores, including schema/migration handling
  - Tests that currently assert retry fields or retry behavior

  **Out of scope:**
  - Changing job timeout behavior
  - Adding a replacement retry abstraction

  **Assumptions:**
  - Jobs should execute once per trigger and record the resulting success/failure/timeout without scheduling retry attempts.
  - We prefer a schema cleanup over preserving deprecated retry fields with ignored defaults.

  **Risks:**
  - Stored SQLite databases may need a migration path if older rows/tables contain retry columns.
  - Existing tests may encode retry semantics and will need to be rewritten around single-attempt behavior.
