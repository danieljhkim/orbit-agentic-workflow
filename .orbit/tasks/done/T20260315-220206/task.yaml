title: Propagate task workspace into job_task_pipeline CLI steps
description: |-
  # Fix missing workspace_path in `job_task_pipeline` CLI steps

  We investigated failed job run `jrun-20260315-215921` for `job_task_pipeline`. Step 1 (`dispatch_task`) succeeded and selected task `T20260314-054456-1773467096795909000`, but step 2 (`create_branch`) failed with:

  ```text
  invalid input: workspace_path is unavailable in this context
  ```

  Root cause:
  - `create_branch` is a `cli_command` activity with `working_dir: "{{workspace_path}}"`
  - the stored `create_branch` activity has `workspace_path: null`
  - `TemplateContext.workspace_path` currently comes only from `activity.workspace_path`
  - the dispatched task itself does have a valid `workspace_path` (`/Users/daniel/workspace/repos/orbit`), but the pipeline does not thread that task workspace into later steps

  This is not just a `create_branch` problem. The same pipeline pattern exists in other CLI steps:
  - `run_tests` also uses `working_dir: "{{workspace_path}}"`
  - `checkout_branch` also uses `working_dir: "{{workspace_path}}"`

  So the pipeline currently depends on a workspace path that exists on the task but is never made available to the CLI activity template context.

  This task should make `job_task_pipeline` consistently provide the task workspace to downstream steps, or otherwise make those steps resolve the correct working directory without relying on missing activity-local `workspace_path`.

  Out of scope:
  - Redesigning the entire job input propagation model unless needed for this fix
  - Broad activity templating changes unrelated to workspace-path resolution
  - Changing task selection logic in `dispatch_task`
