title: Add rejected task status and route proposal/review failures into it
description: |-
  ## Problem
  Orbit currently does not have a dedicated `rejected` task status. Rejected proposed tasks are moved to `archived`, while review failures are sent back to `backlog`. That mixes distinct outcomes together and makes the task lifecycle, audit trail, and agent guidance harder to follow.

  ## Goal
  Introduce a first-class `rejected` task status so failed proposals and failed reviews land in a consistent, explicit state, and update the relevant Orbit skills and user-facing guidance to use that status.

  ## Done Criteria
  - `rejected` exists as a supported task status across the task model, CLI, runtime, and persistence layers.
  - Rejecting a `proposed` task or a `review` task moves it to `rejected` instead of `archived` or `backlog`.
  - Relevant Orbit skills and lifecycle documentation describe `rejected` correctly and stop instructing agents to use the old rejection paths.
  - Regression tests cover the new status, rejection transitions, and any adjusted archive/unarchive semantics.
