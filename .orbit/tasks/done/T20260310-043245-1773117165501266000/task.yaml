title: Add role filter to orbit identity list
description: |-
  # Role filter for identity list

  Extend orbit identity list so callers can filter results by identity role. The command should support an explicit role selector, keep output deterministic, and preserve the current architecture boundary where filtering semantics live below orbit-cli rather than being embedded only in presentation logic.

  The feature should work for both text and JSON output, use the same role vocabulary already supported by identity parsing, and surface actionable validation errors for unknown role values.
