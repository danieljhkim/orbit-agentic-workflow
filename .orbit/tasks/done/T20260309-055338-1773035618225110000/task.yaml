title: Add identity inspection CLI commands
description: |-
  # Identity inspection commands

  Add a new read-only orbit identity command group with two subcommands:
  - orbit identity list
  - orbit identity show <identity_id>

  The feature should expose the identities already stored under the runtime identity root without introducing direct state mutation, background behavior, or CLI-owned business logic. The implementation should preserve the existing architecture boundary where lookup and catalog behavior live below orbit-cli, while the CLI layer remains responsible only for argument parsing and output formatting.

  The command should make identity discovery easier for humans and agents, and errors should remain actionable when an identity does not exist or is malformed.
