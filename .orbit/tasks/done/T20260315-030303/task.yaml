id: T20260315-030303
title: Add --json output flag to all orbit CLI mutating commands
description: |-
  Several orbit CLI mutating subcommands lack a `--json` flag, making it impossible for agents and scripts to consume their output programmatically. Read-only commands (`list`, `show`, `search`) already support `--json`, but the mutating commands do not.

  **Affected commands (missing --json):**
  - `orbit task add`
  - `orbit task update`
  - `orbit task approve`
  - `orbit task reject`
  - `orbit task archive`
  - `orbit task unarchive`
  - `orbit task delete`
  - `orbit activity delete`
  - `orbit job delete`

  **Done criteria:** Every orbit CLI subcommand supports `--json` for machine-readable output, including mutating operations.
contextFiles:
- orbit-cli/src/command/task.rs
- orbit-cli/src/command/activity.rs
- orbit-cli/src/command/job.rs
