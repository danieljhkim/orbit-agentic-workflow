title: Deduplicate parse_duration_seconds into a shared module
description: |-
  # Duplicate Duration Parsing

  `parse_duration_seconds` is implemented identically in two places:
  - `orbit-cli/src/command/activity.rs`
  - `orbit-cli/src/command/job.rs`

  The function parses strings like `5m`, `2h`, `30s` into a `u64` seconds value. Both implementations are line-for-line duplicates, supporting the same units (s/m/h/d/w) with identical error handling.

  This violates the codebase's stated architectural invariant of strict crate layering. It is also a maintenance hazard: if a new time unit is needed or an edge case is fixed, both copies must be updated in sync.

  ## Scope

  Extract the function into a single location, update all callers. The right home is a `parse` module in `orbit-cli` (alongside the existing `parse::csv_to_vec` pattern already used in the codebase) or a shared utility in `orbit-exec` if the function is needed across crates.
contextFiles:
  - orbit-cli/src/command/activity.rs
  - orbit-cli/src/command/job.rs
  - orbit-cli/src/parse.rs
