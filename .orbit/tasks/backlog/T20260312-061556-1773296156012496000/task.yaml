title: Refactor jobs to support ordered multi-activity chains
description: |-
  ## Problem

  Orbit jobs currently target exactly one activity through the `target_type` / `target_id` model. That makes simple workflow orchestration awkward and encourages special-case follow-up hooks whenever one activity should naturally lead to another.

  The recent `resolve-backlogged-task -> approve-task-leader` use case is a good example: the real need is not a one-off handoff flag, but a first-class way for a single job to execute more than one activity in sequence.

  ## Goal

  Refactor job definitions and job-run artifacts so a single job can execute an ordered chain of activities.

  For v1, keep the model intentionally simple:

  - a job declares multiple activities in order
  - Orbit executes them sequentially only
  - each next activity receives the previous activity's successful result as its input
  - execution stops on the first failure or timeout
  - users can define chained jobs directly instead of relying on special-case follow-up automation

  ## Proposed Direction

  Replace the singular activity target in job specs with an ordered activity list. A minimal shape could be:

  ```yaml
  job:
    job_id: job-example
    activities:
      - activity_id: resolve-backlogged-task
      - activity_id: approve-task-leader
  ```

  V1 chaining contract:

  1. the first activity receives the job run input
  2. each subsequent activity receives the previous activity's `result` object as its input
  3. Orbit records per-activity execution details inside the job-run artifact
  4. the overall job-run state is derived from the ordered execution outcome

  This keeps the system understandable while solving the immediate resolve-to-approve use case in a general way.

  ## Scope

  In scope:

  - refactor the job model from single target to ordered activity chains
  - update job persistence and job-run artifacts to represent multiple activity executions
  - execute chained activities sequentially in runtime
  - provide a user-facing way to define chained jobs
  - adapt `resolve-backlogged-task -> approve-task-leader` to use the new job-chain model
  - add focused migration/backward-compatibility behavior for existing single-activity jobs
  - add targeted regression coverage for chaining semantics and persisted artifacts

  Out of scope:

  - conditional branching
  - parallel activity execution
  - loops or retries per individual activity step beyond the existing whole-job retry model
  - arbitrary data transforms between steps
  - a generic workflow DSL

  ## Key Constraints

  - Existing single-activity jobs must continue to work or be migrated cleanly.
  - V1 ordering must be deterministic and strictly sequential.
  - Step-to-step data passing must remain simple and auditable.
  - Job-run artifacts should make it easy to see which activity ran, with what outcome, and in what order.
  - The resolve-to-approve use case should be expressible by configuration/data, not a special runtime hook.
