title: orbit task update --comment silently accepts whitespace-only strings
description: |-
  The CLI validates that --comment is not an empty string, but a string containing only whitespace (e.g. '   ' or a newline) passes validation and is appended as a blank comment entry to the task.

  This is inconsistent with the blank-string guard and creates noise in the task comment history.
