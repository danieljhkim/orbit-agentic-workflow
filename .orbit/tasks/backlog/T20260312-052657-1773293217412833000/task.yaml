title: Auto-commit maintenance and operations reports with current job-run artifacts
description: |-
  ## Problem

  `job-perform-maintenance` and `job-oversee-orbit-operations` both produce repo-local markdown reports, but successful runs currently leave those new files uncommitted. Orbit already supports successful-agent commit intent, yet these two activities only allow a `comment` result today, and the current commit hook runs before the active job-run is marked complete. That ordering means Orbit cannot include the just-finished run artifact in the same audited commit.

  ## Goal

  When either job finishes successfully, the agent should return the created report file path and a brief summary comment. Orbit should validate that path, finalize the current job-run artifact, and then automatically create one commit containing:

  - the created report/assessment file
  - the `.orbit/jobs/runs/<job_id>/<run_id>.yaml` artifact for that run

  ## Scope

  In scope:

  - add a narrow success output field for the created report file on `perform-maintenance` and `oversee-orbit-operations`
  - update the maintenance and operations skills so the agent returns `comment` plus the created file path
  - move or split the auto-commit flow so it runs only after the current job-run artifact is persisted
  - generate a deterministic commit message and explicit file list for these two jobs
  - add focused regression coverage for schema validation, commit timing, and committed file selection

  Out of scope:

  - general auto-commit support for every activity
  - arbitrary multi-file commit planning from the agent for these jobs
  - retroactively committing historical reports or archived job-runs

  ## Proposed Direction

  Keep the agent contract narrow: have the agent return the created file path rather than a full commit request. Orbit should then:

  1. validate the returned path is non-empty, exists, and stays inside the repo root
  2. complete the current job-run so the run YAML exists on disk with final state
  3. derive the current run artifact path from the job ID and run ID
  4. invoke the existing typed git tools with an internally generated commit message and explicit file list containing only the created report and the current run artifact

  This keeps repository mutation in Orbit-owned code, preserves the existing explicit-file commit safety guarantees, and gives these recurring operational jobs an auditable artifact trail by default.
