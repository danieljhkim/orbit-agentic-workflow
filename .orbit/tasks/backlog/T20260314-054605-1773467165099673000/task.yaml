title: Streamline common task lifecycle transitions into fewer commands
description: |-
  # Streamline common task lifecycle transitions into fewer commands

  **Goal:** Reduce the current friction in Orbit task execution where common lifecycle progressions often require multiple sequential commands even when the intent is obvious.

  **Problem:**
  - Moving a proposed task into active execution commonly means approving it and then separately assigning and/or moving it to `in-progress`.
  - The current lifecycle is auditable, but the operational path can feel overly procedural for common workflows.
  - Agents and humans alike end up stitching together `approve`, `update --assigned-to`, and `update --status in-progress` steps manually.

  **Requested improvement:**
  - Introduce a simpler, explicit command path for common transitions without weakening lifecycle rules or auditability.
  - Examples could include a `task start` command, richer `task approve` options, or another deliberately designed shortcut for the normal proposal-to-execution flow.
  - Keep the underlying lifecycle semantics visible, but make the ergonomics better for the most common path.

  **Scope:**
  - Task CLI ergonomics and runtime support for common lifecycle transitions
  - Audit/event behavior for the streamlined path
  - Task workflow docs/skills that currently require multiple manual steps
  - Tests for the new command flow and existing lifecycle safeguards

  **Out of scope:**
  - Replacing the full task lifecycle model
  - Weakening required gates such as review approval or execution summary checks

  **Risks:**
  - A shortcut command could blur important approval semantics if it is not designed carefully.
  - Adding multiple overlapping task-mutation commands could make the CLI harder to learn if the new path is not clearly preferable.
