title: 'Fix Claude CLI agent backend: missing flags and env vars'
description: |-
  ## Problem

  The Claude CLI agent backend was wired up but never validated against the actual `claude` CLI interface. Three issues make it non-functional for job execution:

  ### 1. Missing `--permission-mode bypassPermissions`
  In `-p` (print/non-interactive) mode, the Claude CLI still prompts for tool-use approval unless told otherwise. Any job that requires Claude to call a tool (Bash, Edit, etc.) will block indefinitely waiting for user input — or be rejected outright. This is the primary cause of breakage.

  Flags that fix this (mutually exclusive):
  - `--permission-mode bypassPermissions` — recommended for controlled sandboxes
  - `--dangerously-skip-permissions` — full bypass, less explicit

  ### 2. `ANTHROPIC_API_KEY` not in `required_env_vars`
  Claude's `required_env_vars` is `["HOME", "PATH"]`. In hermetic execution mode the env is cleared and only the allowlist is passed through. `ANTHROPIC_API_KEY` is not in the allowlist so it is never validated upfront and never passed to the process — every Claude job fails silently at auth time.

  By contrast, Codex declares `CODEX_HOME` in its env vars, which serves a similar purpose.

  ### 3. `--no-session-persistence` missing
  Without this flag every `-p` mode invocation saves a session to disk. Each Orbit job run creates a permanent session file under `~/.claude`. For a job runtime executing tens or hundreds of runs this is a significant disk leak.

  ## Impact

  - All Claude agent jobs in hermetic mode fail silently (auth)
  - All Claude agent jobs that use tools block or fail (permissions)
  - Session files accumulate unboundedly on disk
  - No tests catch any of these (mock binary tests are absent for Claude)
