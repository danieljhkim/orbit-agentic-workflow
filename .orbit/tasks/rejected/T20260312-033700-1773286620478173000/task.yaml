title: Shorten task and job-run IDs while preserving creation order
description: |-
  # ID Format Update

  Update Orbit task IDs and job-run IDs to use shorter timestamp-based formats while preserving the current creation-order behavior.

  New target formats:
  - task IDs: `TYYYYMMDD-HHMMSS-<suffix>` where `<suffix>` is a short sequence or random digit block used only to avoid same-second collisions
  - job-run IDs: `JRYYYYMMDD-HHMMSS-<suffix>` where `<suffix>` is a short sequence or random digit block used only to avoid same-second collisions

  Scope:
  - change task ID generation in the file task store
  - change job-run ID generation in file and SQLite-backed job stores
  - keep ordering semantics consistent with current behavior
  - keep existing IDs valid for lookup and display

  Out of scope:
  - changing historical IDs already stored on disk or in SQLite
  - broad changes to unrelated ID families unless required to keep job-run generation safe
  - altering task/job sorting behavior beyond what is necessary for the new ID scheme

  Assumptions:
  - task IDs and job-run IDs should both expose human-readable creation time in `YYYYMMDD-HHMMSS`
  - task IDs and job-run IDs should keep distinct prefixes to avoid ambiguity in CLI usage and logs
  - second-level timestamps are acceptable as long as collisions are handled safely
  - shorter IDs are preferred even if they depend on a short suffix for uniqueness

  Risks:
  - shared helpers may currently affect job IDs as well as job-run IDs
  - second-level timestamps can collide under fast repeated creation
  - tests or docs may currently assume the longer timestamp form
