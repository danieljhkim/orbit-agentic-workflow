proposalRejectedBy: human
proposalDecisionNote: 'Rejected. The proposal is based on a false premise: fs.* and orbit.task.* are real built-in Orbit tools today, not fictional abstractions. More importantly, the current problem is not the existence of those tools but that activity tools lists are not enforced by runtime agent execution. Rewriting activity instructions to use raw shell commands would mostly change documentation while weakening Orbit''s semantic tool contracts. I want to reconsider the broader tool model before making this change.'

