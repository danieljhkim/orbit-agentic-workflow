# ---- content ----
title: Remove fs.* and orbit.task.* abstract tool refs from activity definitions
description: |-
  Activity YAML files currently declare abstract tool names like `fs.read`, `fs.write`, `fs.list`, `fs.delete`, `orbit.task.list`, `orbit.task.show`, `orbit.task.update`, and `orbit.activity.show` in their `tools:` field and reference them in instruction text. These abstract tool names are not enforced and add confusion — agents should invoke terminal commands directly (`orbit task show`, `cat`, `ls`, `orbit task list`, etc.) rather than relying on abstract tool IDs that don't map to any real MCP tool.

  **Affected files:**
  - `orbit-core/assets/activities/implement_change.yaml` — uses fs.* and orbit.task.* in both tools list and instruction text
  - `orbit-core/assets/activities/dispatch_task.yaml` — uses orbit.task.* in both tools list and instruction text
  - `orbit-core/assets/activities/open_pr.yaml` — uses orbit.task.show in tools list
  - `orbit-core/assets/activities/review_pr.yaml` — uses orbit.task.show in tools list
acceptanceCriteria: []

