description: |-
  ## Problem

  The test `job_add_defaults_timeout_to_fifteen_minutes` in `orbit-cli/tests/job_commands.rs:179` asserts `timeout_seconds == 7000` but the actual default timeout is `15m` (900 seconds). The test name says "fifteen minutes" so 900 is correct — the expected value 7000 is wrong.

  This is a pre-existing failure unrelated to other work. It causes `make ci` to fail in the job_commands test suite.
