id: T20260310-072953-1773127793630284000
title: Design platform-agnostic env passthrough for hermetic agent execution
description: |-
  ## Background

  Task T20260310-072245-1773127365304408000 fixed the immediate Codex agent panic on macOS
  by adding `TMPDIR`, `__CF_USER_TEXT_ENCODING`, and `USER` to the default env passthrough
  allowlist. While this unblocks agent invocation, it is a macOS-specific patch — the
  underlying problem is that the hermetic env model has no principled way to determine
  which system-level env vars are safe and necessary to pass through.

  ## Problem

  The current approach (a static allowlist in `DEFAULT_ENV_PASS`) has limitations:
  1. Platform-specific vars are baked into a cross-platform constant.
  2. New agent CLIs may require different vars, leading to an ever-growing allowlist.
  3. No distinction between "system plumbing" vars (safe to pass) and "user/app" vars (potential leakage).
  4. Users must manually edit config.toml to add vars their agents need.

  ## Desired Outcome

  A more robust mechanism for env passthrough in hermetic mode that:
  - Automatically detects and passes platform-required system vars (macOS, Linux).
  - Keeps user/app vars excluded by default.
  - Allows per-job or per-agent env var overrides without modifying the global config.
  - Is documented and testable.

  ## Related Tasks

  - T20260310-072245-1773127365304408000 (immediate fix, macOS-specific allowlist expansion)

