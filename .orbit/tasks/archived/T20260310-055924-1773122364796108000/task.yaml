title: Investigate malformed resolve-backlogged-task success metadata
description: |-
  ## Summary
  The `resolve-backlogged-task` scheduler still has an unarchived run recorded as `success`, but its persisted metadata is incomplete and cannot be trusted as a clean terminal record.

  ## Impact
  - Run `jrun-1773115107199060000` for job `job-1773033062432167000` reports `state: success` while `finished_at`, `duration_ms`, `exit_code`, and `agent_response_json` are all `null`.
  - The parent job remains `paused` with `next_run_at` stuck in the past (`2026-03-09T10:46:11.230220Z`), so backlog automation does not have a healthy tracked state.
  - Operations cannot safely archive or ignore this run because it leaves recent scheduler history inconsistent.

  ## Evidence
  - `orbit job-run show --json jrun-1773115107199060000`
  - `.orbit/jobs/runs/job-1773033062432167000/jrun-1773115107199060000.yaml`
  - `orbit job show --json job-1773033062432167000`
  - Related prior runtime work: `T20260310-042915-1773116955241830000` fixed a job-run completion hang after this malformed run was recorded, so this may be a residual artifact or a regression worth verifying.

  ## Desired Outcome
  Determine whether this malformed success record is legacy fallout from the earlier job-run completion bug or an active regression, then either repair/archive the orphaned run safely or fix the runtime so future `resolve-backlogged-task` executions always persist complete terminal metadata.
