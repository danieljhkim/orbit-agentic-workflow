title: Restore paused approve-task-leader jobs to a single healthy state
description: |-
  ## Summary
  Orbit still has paused `approve-task-leader` scheduler jobs without an active remediation task, even though approval automation is expected to run continuously.

  ## Impact
  - The primary approval job `job-1773034473007480000` remains `paused` as of 2026-03-10T04:12:53.794556Z, despite later successful runs `jrun-1773114475509999000` and `jrun-1773115888455102000`.
  - A second legacy approval job `job-1773033071102526000` is also still `paused`, creating duplicate/stale automation state for the same activity.
  - No active Orbit task is tracking the recovery or cleanup work because the earlier issue `T20260310-033413-1773113653720463000` is already archived while the jobs remain paused.

  ## Evidence
  - Job: `job-1773034473007480000` (`approve-task-leader`, schedule `every 10m`, state `paused`)
  - Successful runs after the original incident: `jrun-1773114475509999000`, `jrun-1773115888455102000`
  - Legacy duplicate job: `job-1773033071102526000` (`approve-task-leader`, schedule `every 5h`, state `paused`)
  - Archived prior issue: `T20260310-033413-1773113653720463000`

  ## Desired Outcome
  Establish the intended active approval scheduler, either resume it or document why it should stay paused, archive stale duplicate jobs, and keep recovery tracked until approval automation is healthy again.
