title: Remove HOME-level .orbit support and standardize on repo-local Orbit roots
description: |-
  # Repo-Local Orbit Only

  Remove support for using ~/.orbit as an implicit Orbit home/data root. Orbit should operate against a repository-local .orbit directory by default, and the codebase should stop bootstrapping or reading configuration from HOME-level .orbit state.

  Goal:
  - keep Orbit state in repo-level .orbit only
  - remove implicit HOME fallback and HOME bootstrap behavior
  - make init, runtime startup, config loading, and docs consistent with the repo-local model

  Scope:
  - runtime data-root selection and bootstrap behavior
  - init command behavior and default config selection
  - config loading/reporting that currently exposes both root and home concepts
  - tests and docs that still assume ~/.orbit is the default persistence/config location

  Out of scope:
  - migrating existing user data from ~/.orbit into repository-local .orbit
  - changing explicit root override behavior unless needed to support the repo-local model cleanly
  - changing persistence backends beyond the root-location decision

  Assumptions:
  - when running inside a git repo without an explicit override, Orbit should use <repo>/.orbit
  - commands run outside a repo should fail clearly rather than silently creating or reading ~/.orbit
  - repository-local config should remain the single source of truth for default persistence paths

  Risks:
  - several runtime and init paths currently depend on orbit_home_root and HOME-based bootstrap behavior
  - test coverage currently encodes HOME-level semantics in both init and config flows
  - identity and skill bootstrapping may currently rely on HOME-based locations and need a coordinated update
