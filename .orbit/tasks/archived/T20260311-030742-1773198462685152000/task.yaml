id: T20260311-030742-1773198462685152000
title: Enable approval-aware Codex execution for commit-capable Orbit workflows
description: |-
  ## Problem

  A Codex agent was unable to create a commit because the command execution layer returned a sandbox denial:

  ```text
  exec_command failed: CreateProcess { message: "Codex(Sandbox(Denied ... error: io error: Operation not permitted (os error 1) ..."
  ```

  Orbit currently launches Codex with a hard-coded invocation of `codex exec --sandbox workspace-write` in `orbit-agent/src/providers/codex/codex_cli.rs`. At the same time, the approval workflow in `orbit-core/assets/skills/orbit-approve-task/SKILL.md` explicitly tells the approving agent to create a commit on `agent-main` when code changes were approved.

  Local Codex CLI help shows that Codex supports approval policies (for example `-a/--ask-for-approval`), but Orbit does not currently pass any approval mode through to the Codex provider. That leaves the agent stuck in a sandboxed execution mode with no Orbit-managed path to escalate commands like `git commit` when they are legitimately required by the workflow.

  ## Impact

  - Approved tasks with code changes can fail at the final commit step even after the review decision is complete.
  - Orbit's task lifecycle and its agent execution constraints are out of sync.
  - Operators get a low-level sandbox error instead of an Orbit-specific recovery path or configuration knob.

  ## Root Cause Chain

  1. `orbit-core/assets/skills/orbit-approve-task/SKILL.md` requires a commit after approval when code changed.
  2. `orbit-agent/src/providers/codex/codex_cli.rs` hard-codes `exec --sandbox workspace-write`.
  3. Orbit does not expose any provider-level approval policy or sandbox override for Codex.
  4. When Codex attempts a restricted command, the runtime surfaces a sandbox denial (`Operation not permitted`) instead of a guided escalation flow.

  ## Proposed Solution

  Add an approval-aware Codex invocation path in Orbit. Prefer preserving `workspace-write` as the default sandbox, but allow Orbit to configure Codex with an approval mode that can request escalation for blocked commands, or provide a narrowly scoped runtime/provider setting for workflows that must perform repository mutations such as `git commit`. The behavior should be explicit, test-covered, and documented so approval-oriented workflows can complete without silently weakening sandbox defaults.
