title: Support --comment on task add/update/approve/reject
description: |-
  # Task comment append support

  Revise the task mutation CLI so `orbit task add`, `orbit task update`, `orbit task approve`, and `orbit task reject` accept `--comment <comment>` and append that text to the task's existing `comments` collection instead of replacing prior entries.

  This work must be grounded in the current Orbit architecture: task persistence is file-backed today, with comments already present in the task bundle document, so the feature should extend the shared task contract, runtime mutation API, CLI wiring, and file task store behavior. Do not scope this work around a new SQLite task persistence path unless task persistence architecture changes separately.

  Open design point to resolve during implementation: `approve` and `reject` already carry an explicit actor via `--by`, while `add` and `update` rely on other attribution fields. Comment authorship should stay explicit and deterministic within the existing task model and command contracts.
