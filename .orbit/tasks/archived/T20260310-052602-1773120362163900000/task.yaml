title: Implement tiered output model to eliminate agent token bloat
description: |-
  # Token Bloat in Agent Operations

  Agent activity sessions consume ~14k tokens per run. The root cause is that all list and run commands return full task/job/activity objects—including large fields like plan, execution_summary, description, and context_files—even when the agent only needs operational signals (id, status, title, type).

  The `feature.md` document in the repo root already contains a detailed measurement-backed analysis of this problem and proposes a three-tier design:

  - **Signal**: minimal operational data (id, title, type, status, priority)
  - **Summary**: small structured objects for quick inspection (default `show` behavior)
  - **Artifact**: full detailed objects for debugging and human review (`--full` or existing behavior)

  ## Scope

  Implement the signal tier across the three highest-impact commands:
  1. `orbit task list` — add `--ops` flag returning signal-only JSON
  2. `orbit job list` — add `--ops` flag returning signal-only JSON
  3. `orbit activity list` — add `--ops` flag returning signal-only JSON

  Execution summaries are the largest single field. Move them to external artifact files:
  - Store execution summary content at `.orbit/reports/<task-id>/execution-summary.md`
  - Replace the inline `execution_summary` field on the task with `execution_summary_path: <relative-path>`

  ## Expected Impact

  Token usage per agent operational query drops from ~11k to ~150 tokens per list call.
  Full session cost projected to drop from ~14k to 800–1200 tokens.
