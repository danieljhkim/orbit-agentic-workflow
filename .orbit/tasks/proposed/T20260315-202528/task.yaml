# ---- content ----
title: Allow rejected -> in-progress status transition
description: |-
  The `rejected -> backlog` transition exists but `rejected -> in-progress` does not.
  This forces an unnecessary detour through `backlog` when picking up a rejected task
  for immediate rework — as seen when advancing T20260315-185546 after rejection.

  A rejected task is known work that needs remediation. Allowing direct re-entry to
  `in-progress` is the natural path when an agent or engineer immediately starts fixing it.
