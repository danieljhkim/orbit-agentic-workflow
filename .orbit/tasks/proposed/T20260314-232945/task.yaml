title: Allow rejected tasks to move directly to in-progress
description: |-
  # Direct resume for rejected tasks

  Current Orbit lifecycle validation only allows `rejected -> backlog`, which forces an extra status hop before an agent can resume work after feedback. We want to add support for `rejected -> in-progress` through the standard `orbit task update <id> --status in-progress` flow.

  Implement the change consistently across the transition rules, command handling, and regression coverage while preserving existing proposal and review rejection audit metadata. Out of scope: changing how `orbit task reject` works or weakening the existing `in-progress -> review` execution-summary requirement.
