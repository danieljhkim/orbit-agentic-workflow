# ---- content ----
title: Make task history audit trails more informative
description: |-
  # Improve task history audit trail entries

  Task bundle history in `task.yaml` currently records generic events like `moved`, which leaves too little context for humans trying to understand what actually changed. For example, this entry:

  ```yaml
  - at: 2026-03-15T19:54:07.914426Z
    by: human
    event: moved
  ```

  does not say whether the task moved from `proposed -> backlog`, `in-progress -> review`, `review -> done`, or some other transition. That weakens the audit trail, especially once a task has multiple lifecycle changes over time.

  This task should improve task history so lifecycle entries are self-explanatory. A straightforward direction would be to record status-aware events, such as `status_changed`, and include the old/new status in the history entry, or otherwise emit a more explicit event string that preserves equivalent detail.

  Out of scope:
  - Replacing the entire task audit/history system
  - Reformatting unrelated task metadata sections
  - Building a full event-sourcing model beyond what is needed for clear task history
