title: Bind implement_change execution to task workspace and pipeline branch
description: |-
  Investigate and fix branch/workspace drift during `job_task_pipeline` execution. In job run `jrun-20260315-230425`, step 2 (`create_branch`) succeeded and created the expected pipeline branch, but step 3 (`implement_change`) did not stay anchored to that execution context.

  Evidence:
  - the dispatched task workspace was `/Users/daniel/workspace/repos/orbit`
  - `create_branch` succeeded in the pipeline
  - the task implementation commit `65c794d` landed on `agent-main`, not on `orbit/T20260314-054456-1773467096795909000`
  - the generic tool execution path still uses `ToolContext::default()`
  - `proc.spawn` runs with `current_dir: None`
  - `implement_change` instructions mention `workspacePath`, but the runtime does not enforce that cwd/branch for agent-side tool calls

  This means the implementation step can drift to whatever checkout the agent process already happens to be running in. Depending on the agent session context, that could be `agent-main`, another repo checkout, or a separate worktree such as `orbit-v1`.

  We need Orbit to make the task workspace and intended branch explicit and enforce them during implementation, rather than relying on ambient agent cwd or branch state.
