title: Reduce Orbit-managed environment variable surface
description: |-
  Orbit should not manage sensitive environment variables. We want the runtime and tool execution model to avoid treating secrets as Orbit-managed configuration, and we also want to prepare for a stricter future where Orbit no longer manages even broad ambient variables like HOME and PATH.

  This task should audit the current execution environment policy, provider/runtime expectations, CLI-command activity behavior, and any skill/docs/config surfaces that imply Orbit owns or curates sensitive env state.

  The immediate product direction is:
  - Orbit must not manage sensitive env vars
  - Orbit should avoid growing its built-in env allowlist around secret-bearing variables
  - the later removal of HOME and PATH should be designed deliberately because it may break current agent/tool execution paths

  The task should produce a coherent design and implementation that reduces Orbit-managed env responsibilities without introducing hidden breakage.
