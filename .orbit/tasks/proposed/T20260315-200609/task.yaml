# ---- content ----
title: 'dispatch_task: consider rejected tasks and add pre-invoke guard'
description: |-
  Two improvements to the dispatch_task activity:

  **1. Include rejected tasks in dispatch consideration**
  The current instruction only queries `status: "backlog"`. Tasks in `rejected` status
  (previously dispatched, then rejected at review) represent known, already-planned work
  that needs remediation. These should be surfaced to Steve with even higher priority than
  backlog — they are regressions or incomplete work, not net-new items.

  **2. Pre-invoke guard: skip agent invocation when there is nothing to dispatch**
  When both backlog and rejected queues are empty, the current pipeline still invokes a
  full agent (costing tokens and time) just to be told "nothing to do." The job runner
  should support a lightweight pre-check on a step that skips the step (and optionally
  stops the pipeline cleanly) before paying the agent invocation cost.

  This requires a new `precondition` field on job steps in `orbit-types` and corresponding
  runner logic in `orbit-core`.
