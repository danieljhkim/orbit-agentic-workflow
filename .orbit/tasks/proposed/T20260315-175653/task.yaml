# ---- content ----
title: Add optional model field to job steps for agent model selection
description: |-
  # Optional model selection for job steps

  Orbit job steps currently let users choose `agent_cli` but not the specific model behind that CLI. Default job artifacts such as `job_review_tasks.yaml` therefore cannot express choices like GPT-5.4 or Sonnet 4.5 alongside the selected agent runtime.

  Add an optional `model` field on each `job.steps[]` entry so users can pin model selection next to `agent_cli` without breaking existing jobs that omit it. This should update the bundled job assets and the runtime plumbing that turns a job step into an agent invocation.
