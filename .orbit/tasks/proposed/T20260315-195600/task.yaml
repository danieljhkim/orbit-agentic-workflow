# ---- content ----
title: Resolve unused OrbitContext lock_store warning
description: |-
  # Clean up unused `lock_store` warning

  `orbit-core` currently emits a `dead_code` warning because `OrbitContext` carries `lock_store: Arc<dyn LockStoreBackend>` but nothing in the runtime ever reads that field. The warning shows up during normal `cargo test` and `cargo build -p orbit-cli --release` flows, which adds noise to routine validation and makes it a little harder to spot meaningful warnings.

  This should be treated as a small cleanup task, not a behavior change. The goal is to decide whether the lock store is still part of the intended runtime design. If it is, wire it into real runtime behavior and add coverage. If it is not, remove the unused field and any now-dead construction code so Orbit builds without the warning.

  Out of scope:
  - Designing a new cross-process locking system from scratch
  - Broad runtime/store refactors unrelated to this specific warning
  - Silencing the warning with `#[allow(dead_code)]` unless that is explicitly justified as the correct long-term design
