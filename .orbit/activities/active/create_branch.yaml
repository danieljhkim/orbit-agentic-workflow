activity:
  id: create_branch
  spec_type: cli_command
  description: Create a new git branch for a task using the orbit/<task_id> naming convention
  input_schema_json:
    properties:
      base:
        description: Branch or commit to start from (e.g. main). Defaults to main in job_task_pipeline.
        type: string
      task_id:
        description: The Orbit task ID to create a branch for
        type: string
    required:
    - task_id
    type: object
  output_schema_json:
    properties:
      exit_code:
        type: integer
    type: object
  args:
  - -c
  - git checkout '{{input.base}}' && git pull --rebase origin '{{input.base}}' && git checkout -b 'orbit/{{input.task_id}}'
  command: bash
  expected_exit_codes:
  - 0
  timeout_seconds: 60
  working_dir: '{{workspace_path}}'
