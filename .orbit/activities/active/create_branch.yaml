activity:
  id: create_branch
  spec_type: cli_command
  description: Create or reuse an isolated git worktree for a task branch using the orbit/<task_id> naming convention
  input_schema_json:
    properties:
      base:
        description: Branch or commit to start from (e.g. main). Defaults to main in job_task_pipeline.
        type: string
      task_id:
        description: The Orbit task ID to create a branch for
        type: string
      workspace_path:
        description: Task workspace path propagated from dispatch_task for CLI execution.
        type: string
    required:
      - task_id
    type: object
  output_schema_json:
    required:
      - exit_code
      - workspace_path
      - repo_root
      - branch
    properties:
      branch:
        description: Task branch checked out inside the worktree.
        type: string
      exit_code:
        type: integer
      repo_root:
        description: Canonical repository root used to create the worktree.
        type: string
      workspace_path:
        description: Dedicated task worktree path for downstream execution.
        type: string
    type: object
  args:
    - scripts/orbit-create-task-worktree.sh
    - '{{workspace_path}}'
    - '{{input.task_id}}'
    - '{{input.base}}'
  command: bash
  expected_exit_codes:
    - 0
  timeout_seconds: 60
  working_dir: "{{workspace_path}}"
