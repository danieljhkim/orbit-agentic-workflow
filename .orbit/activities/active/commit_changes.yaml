schema_version: 1
created_by: system
identity_id: null
activity:
  id: commit_changes
  spec_type: automation
  description: Stage and commit task worktree changes through Orbit-owned automation
  input_schema_json:
    properties:
      branch:
        description: Task branch expected to be checked out in the worktree.
        type: string
      repo_root:
        description: Canonical repository root that owns the task worktree.
        type: string
      task_id:
        description: The Orbit task ID whose changes should be committed.
        type: string
      workspace_path:
        description: Dedicated task worktree path where implementation completed.
        type: string
    required:
    - task_id
    - workspace_path
    - repo_root
    - branch
    type: object
  output_schema_json:
    properties:
      branch:
        description: Branch the commit was created on.
        type: string
      changed_files:
        description: Repository-relative file paths included in the commit.
        items:
          type: string
        type: array
      commit_message:
        description: Deterministic commit message generated from task metadata.
        type: string
      commit_sha:
        description: Commit SHA created by Orbit automation.
        type: string
      repo_root:
        description: Canonical repository root that owns the task worktree.
        type: string
      workspace_path:
        description: Task worktree path where the commit was created.
        type: string
    required:
    - repo_root
    - workspace_path
    - branch
    - commit_message
    - commit_sha
    - changed_files
    type: object
  action: commit_task_changes
