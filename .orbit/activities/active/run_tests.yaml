schema_version: 1
created_by: system
identity_id: null
activity:
  id: run_tests
  spec_type: cli_command
  description: Run tests, formatting checks, and linting for the workspace project
  input_schema_json:
    properties:
      workspace_path:
        description: Task workspace path propagated from dispatch_task for CLI execution.
        type: string
    required: []
    type: object
  output_schema_json:
    properties:
      exit_code:
        type: integer
    type: object
  args:
  - check
  command: make
  expected_exit_codes:
  - 0
  timeout_seconds: 300
  working_dir: '{{workspace_path}}'
