schema_version: 1
created_by: system
identity_id: null
activity:
  id: checkout_branch
  spec_type: automation
  description: Finalize isolated task worktree execution without mutating the human checkout
  input_schema_json:
    properties:
      repo_root:
        description: Canonical repository root that owns the task worktree.
        type: string
      workspace_path:
        description: Task worktree path propagated from create_branch for downstream execution.
        type: string
    required:
    - workspace_path
    - repo_root
    type: object
  output_schema_json:
    properties:
      cleanup_strategy:
        description: Summary of how the task worktree was left after finalization.
        type: string
      repo_root:
        description: Canonical repository root that owns the task worktree.
        type: string
      workspace_path:
        description: Task worktree path retained after pipeline completion.
        type: string
    required:
    - workspace_path
    - repo_root
    - cleanup_strategy
    type: object
  action: finalize_task_worktree
