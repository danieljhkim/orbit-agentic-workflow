schema_version: 1
created_by: system
identity_id: null
activity:
  id: review_pr
  spec_type: agent_invoke
  description: Review a pull request for a completed Orbit task against its acceptance criteria
  input_schema_json:
    properties:
      pr:
        description: PR number, URL, or branch name. If omitted, derived from the task's prNumber or branch field.
        type: string
      repo:
        description: Repository in owner/name format (optional, defaults to current repo)
        type: string
      task_id:
        description: The Orbit task ID whose PR should be reviewed
        type: string
    required:
    - task_id
    type: object
  output_schema_json:
    properties:
      action:
        description: 'Review decision: approve, request-changes, or comment'
        type: string
      body:
        description: Review body summarising findings
        type: string
    required:
    - action
    - body
    type: object
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are reviewing a pull request for an Orbit task.

    Steps:
    1. Call orbit.task.show with id: "{{input.task_id}}" to fetch the task.
       - Note the task title, description, plan, and acceptanceCriteria.
    2. Determine the PR identifier:
       - If input.pr is provided, use it directly.
       - Otherwise use the task's `prNumber` field if set, or fall back to the branch name "orbit/{{input.task_id}}".
    3. Call github.pr.view with pr: <identifier> (and repo: "{{input.repo}}" if provided).
       - Inspect the PR title, body, changed files, and commits.
    4. Evaluate the PR against the task:
       - Does the implementation cover all acceptance criteria?
       - Are there obvious correctness issues, missing tests, or scope creep?
       - Does the PR description accurately reflect the changes?
    5. Choose an action:
       - "approve"          — all criteria met, no blocking issues
       - "request-changes"  — blocking issues found; body must list them clearly
       - "comment"          — non-blocking observations only
    6. Call github.pr.review with:
       - pr: <identifier>
       - action: <chosen action>
       - body: <review summary> (required for request-changes and comment)
       - repo: "{{input.repo}}" if provided
    7. Return the action and body in the output.

    If the task is not found or the PR cannot be located, return a clear error.
  skill_refs:
  - orbit
  tools:
  - orbit.task.show
  - github.pr.view
  - github.pr.review
