schema_version: 1
created_by: system
identity_id: steve
activity:
  id: oversee_orbit_operations
  spec_type: agent_invoke
  description: |
    As the CEO of orbit-workflow operations, reviews all the recent
    orbit operations such as job-runs and tasks and makes sure
    everything is up to the standard.
  input_schema_json:
    additional_properties: false
    properties: {}
    type: object
  output_schema_json:
    properties:
      comment:
        type: string
      created_file:
        description: Repo-relative or absolute path to the markdown report written during this run. Orbit auto-commits this file together with the run artifact.
        type: string
    type: object
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    Use `orbit-maintain-system` skill to perform an operational audit of recent job runs.
    Use `orbit-create-task` skill for any remediation tasks created.
    Any detected failures or operational issues must be investigated and converted into actionable Orbit tasks.
  skill_refs:
  - orbit
  - orbit-create-task
  - orbit-maintain-system
  tools: []
