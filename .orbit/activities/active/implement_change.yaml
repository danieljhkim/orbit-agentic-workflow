activity:
  id: implement_change
  spec_type: agent_invoke
  description: Implement an Orbit task from plan to committed code, then move it to review
  input_schema_json:
    properties:
      branch:
        description: Optional task branch name expected to be checked out in the implementation workspace.
        type: string
      repo_root:
        description: Optional repository root or task worktree path to use for git operations.
        type: string
      task_id:
        description: The Orbit task ID to implement
        type: string
      workspace_path:
        description: Optional task worktree path. If provided, it is the authoritative implementation workspace.
        type: string
    required:
    - task_id
    type: object
  output_schema_json:
    properties:
      files_changed:
        description: List of files created or modified
        items:
          type: string
        type: array
      status:
        description: 'Outcome: success or failed'
        type: string
      summary:
        description: One-paragraph summary of what was implemented
        type: string
    required:
    - status
    - summary
    type: object
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are implementing an Orbit task from plan to committed, tested code.

    Steps:
    1. Call orbit.task.show with id: "{{input.task_id}}" to fetch the task.
       - Read the task title, description, plan, acceptanceCriteria, contextFiles,
         and workspacePath carefully before touching any code.
       - If input.workspace_path is provided, treat that as the authoritative implementation workspace.

    2. Call orbit.task.update with:
       - id: "{{input.task_id}}"
       - status: "in-progress"

    3. Explore the workspace:
       - Use fs.list and fs.read to read the files listed in contextFiles and any
         other files the plan references. Understand the existing code before writing.
       - All relative file and process work should happen inside input.workspace_path when provided.

    4. Implement the plan:
       - Follow the plan steps in order.
       - Write code with fs.write. Keep changes minimal and focused on the task scope.
       - Do not refactor unrelated code or add unrequested features.

    5. Verify the implementation:
       - Use proc.spawn to run the project's test and lint commands from input.workspace_path when provided,
         otherwise from the task workspacePath.
         Common commands: `cargo test --workspace`, `make check`, `npm test`.
       - If tests fail, fix the issue before continuing. Do not move to review with
         failing tests.

    6. Commit the changes:
       - Call git.stage_paths with repo_root set to input.workspace_path when provided,
         otherwise the task workspacePath.
       - Call git.commit with repo_root set to input.workspace_path when provided,
         otherwise the task workspacePath.
       - Call git.commit with a concise commit message following the project's convention.
         Include the task ID in the message, e.g. "feat: <summary> [{{input.task_id}}]".

    7. Write an execution summary and move to review:
       - Call orbit.task.update with:
           - id: "{{input.task_id}}"
           - status: "review"
           - execution_summary: a markdown summary using this structure:
               ## Status
               success

               ## 1. Summary of Changes
               <what changed and why>

               ## 2. Strategic Decisions
               - <decision> | Rationale: <why> | Trade-offs: <trade-offs>

               ## 3. Assumptions Made
               - <assumption> | Impact if incorrect: <impact>

               ## 4. Design Weaknesses / Risks
               - <risk> | Severity: Low/Medium/High | Mitigation: <mitigation>

               ## 5. Deviations from Original Plan
               - <deviation> | Justification: <why>
               (or "None" if the plan was followed exactly)

               ## 6. Technical Debt Introduced
               - <item> | Recommended resolution: <next step>
               (or "None")

               ## 7. Recommended Follow-Ups
               - <next step>

    8. Return output:
       - status: "success"
       - summary: one paragraph describing what was implemented
       - files_changed: list of file paths you modified or created

    If any step fails unrecoverably (tests cannot be fixed, plan is ambiguous, required
    files are missing), set status to "failed" in the execution summary, call
    orbit.task.update to add a comment explaining the blocker, and return status: "failed".
  skill_refs:
  - orbit
  tools:
  - orbit.task.show
  - orbit.task.update
  - orbit.task.list
  - fs.read
  - fs.list
  - fs.write
  - fs.delete
  - git.stage_paths
  - git.commit
  - proc.spawn
  - proc.which
