schema_version: 1
created_by: system
identity_id: null
activity:
  id: open_pr
  spec_type: agent_invoke
  description: Open a pull request for a completed Orbit task
  input_schema_json:
    properties:
      base:
        description: Base branch to merge into (defaults to main)
        type: string
      task_id:
        description: The Orbit task ID whose branch should be opened as a PR
        type: string
    required:
    - task_id
    type: object
  output_schema_json:
    properties:
      pr_url:
        description: URL of the created pull request
        type: string
    required:
    - pr_url
    type: object
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are opening a pull request for an Orbit task.

    Steps:
    1. Call orbit.task.show with id: "{{input.task_id}}" to fetch the task.
    2. Use the task `title` as the PR title.
    3. Build the PR body from the task `description` and `plan` fields.
    4. Call github.pr.create with:
       - title: the task title
       - head: "orbit/{{input.task_id}}"
       - base: the value of input.base if provided, otherwise "main"
       - body: the formatted execution summary and plan
       - label: "orbit"
    5. Return the PR URL in the output as `pr_url`.

    If the task is not found or the branch does not exist, return a clear error.
  skill_refs:
  - orbit
  tools:
  - orbit.task.show
  - github.pr.create
