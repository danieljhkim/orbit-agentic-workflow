schema_version: 1
created_by: system
identity_id: null
activity:
  id: open_pr
  spec_type: automation
  description: Open a pull request from Orbit task metadata through Orbit-owned automation
  input_schema_json:
    properties:
      base:
        description: Base branch to merge into (defaults to agent-main)
        type: string
      branch:
        description: Task branch to open as a PR. If omitted, Orbit falls back to the task's stored branch.
        type: string
      changed_files:
        description: List of changed file paths from the preceding commit_task_changes step.
        items:
          type: string
        type: array
      commit_message:
        description: Commit message from the preceding commit_task_changes step, used as PR body header.
        type: string
      repo_root:
        description: Canonical repository root or task worktree used to resolve the current repository context.
        type: string
      task_id:
        description: The Orbit task ID whose branch should be opened as a PR
        type: string
    required:
    - task_id
    - repo_root
    - commit_message
    - changed_files
    type: object
  output_schema_json:
    properties:
      body:
        description: Pull request body built from commit_message and changed_files pipeline inputs.
        type: string
      pr_number:
        description: Pull request number returned after creation.
        type: string
      pr_url:
        description: URL of the created pull request
        type: string
      title:
        description: Pull request title derived from the Orbit task title.
        type: string
    required:
    - pr_url
    - pr_number
    - title
    - body
    type: object
  action: open_pr_from_task
