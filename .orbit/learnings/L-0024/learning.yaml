summary: Replace invocation-record SQL placeholders in place for nested task/tool filters
body: InvocationListQuery::push_filter used to append the bind index to the end of the condition. That works only when '?' is the last byte; nested EXISTS predicates like task_id/tool_name filters become invalid SQL if the index lands after the closing parenthesis. Replace the placeholder in place so future InvocationQuery filters can be expressed safely.
