summary: When changing ship PR handoffs, pass attribution on both `pr_open` Review and `merge_batch_pr` Done updates
body: Ship PR handoff has two attribution-sensitive automation updates. `pr_open` moves implemented tasks from In Progress to Review and must pass a model resolved from existing `implemented_by`, then the pipeline implementer identity, then task-authored fallbacks (`planned_by`, `created_by`) so it does not stamp `system`. `merge_batch_pr` later moves Review to Done and must preserve per-task attribution (`implemented_by`, then `created_by`, then no model so actor-less flows remain `system`). Keep regression coverage for both paths.
