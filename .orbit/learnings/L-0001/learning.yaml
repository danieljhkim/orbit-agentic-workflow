summary: Keep test fixture payloads out of `.orbit`-named directories because repo ignore rules hide them
body: When adding test fixtures that model Orbit workspace state, do not place the fixture payload under a literal `.orbit/` directory inside the fixture tree. The repo ignore rules hide `.orbit` paths, so `git add -A` will skip the fixture data even though local tests pass. Use a tracked neutral directory name such as `orbit/`, then have the test copy it into a temporary workspace as `.orbit/`.
