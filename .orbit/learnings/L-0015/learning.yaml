summary: Use --root <worktree>/.orbit only for worktree-local Orbit artifacts; task updates may need the canonical workspace root
body: Nested task worktrees may live under the parent checkout at `.orbit/state/worktrees/<name>`, which makes Orbit root selection matter. For worktree-local artifacts that must be committed from the task worktree (ADRs, learnings, docs/index updates), pass `--root <absolute-worktree-path>/.orbit` and verify the resulting artifact path before continuing. For canonical task lifecycle updates during shipment runs (`orbit.task.show`, `orbit.task.update`, `orbit.task.start`), use the workspace task store discovered by Orbit, often by omitting `--root` from inside the worktree; pointing at the worktree-local root can return `task_not_found` because that isolated `.orbit` has no task store. This is workflow guidance and has no single source-code anchor.
