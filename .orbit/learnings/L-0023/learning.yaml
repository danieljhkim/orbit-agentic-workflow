summary: Use execution_summary or comments for routine implementer handoffs; reserve task artifacts for durable outputs
body: 'Routine implementation handoffs should not be stored as task artifacts. When an `agent_implement` run finishes, use the task `execution_summary` field or a task comment for ordinary completion notes, validation lists, and file summaries. Reserve `artifacts` for durable generated outputs that future workflow steps need to fetch as files, such as plans, reports, binary captures, trace bundles, or intentionally attached JSON/Markdown deliverables. If prompt text says to persist meaningful state, clarify the target field instead of implying that every useful summary belongs under `artifacts/`. ORB-00180 showed the ambiguous wording: Grok wrote both `artifacts/files/execution-summary.md` and `artifacts/files/changes.json` for a normal dashboard refactor even though the task did not request artifacts and Orbit already has first-class summary/comment fields.'
