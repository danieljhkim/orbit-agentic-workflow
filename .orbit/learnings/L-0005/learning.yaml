summary: When modifying an Orbit skill, edit `crates/orbit-core/assets/skills/<name>/SKILL.md` — NOT `~/.claude/skills/<name>/SKILL.md` (packaged copy). The asset dir is the source of truth; ORB-00022's drift tests enforce parity across the four catalogs.
body: |-
  ## The mistake to prevent

  When an agent is asked to modify an Orbit skill (e.g. `orbit-create-task`, `orbit-graph`, `orbit-execute-task`), the easy-to-find paths are wrong:

  - **`~/.claude/skills/<skill-name>/SKILL.md`** — a packaged copy installed by `orbit workspace init --inject-agent-rules` (or seeded into a fresh workspace by `orbit init --refresh`). Edits here are local-only and never propagate.
  - Various scattered copies in linked git worktrees under `.orbit/state/worktrees/orbit-jrun-*/crates/orbit-core/assets/skills/...` — these track whatever branch their worktree is on; editing one corrupts only that worktree.

  ## The canonical source

  **`crates/orbit-core/assets/skills/<skill-name>/SKILL.md`** in the orbit repo. This is the file shipped to all consumers — embedded into the binary via `include_str!` in `crates/orbit-core/src/command/skill.rs::DEFAULT_SKILL_FILES` and seeded into user installations on `orbit workspace init`. Every consumer copy traces back to this asset.

  ## Four catalogs must agree (ORB-00022)

  When adding, removing, or renaming a skill, four locations must stay in sync:

  1. **Asset dir**: `crates/orbit-core/assets/skills/<id>/SKILL.md` — the source of truth.
  2. **Registry**: `crates/orbit-core/src/command/skill.rs::DEFAULT_SKILL_FILES` — `include_str!` entries plus the array length on both `DEFAULT_SKILL_FILES` and `default_skill_ids()`.
  3. **Plugin symlinks**: `plugin/skills/<id>` → `../../crates/orbit-core/assets/skills/<id>` (relative symlinks).
  4. **Router enumeration**: `crates/orbit-core/assets/skills/orbit/SKILL.md`'s `## Skill Selection` section — every skill ID must appear as a backtick-quoted token.

  For pure content edits to an existing skill: only #1 changes. For adding or removing a skill: all four.

  ## How to find the right file

  ```text
  orbit_graph_search({"query": "<skill-name>/SKILL.md", "type": "file"})
  ```

  returns the asset path directly. Don't `find ~/.claude/skills/` — it returns the packaged copy. Don't `find` against the whole repo — worktrees under `.orbit/state/worktrees/` contain divergent stale copies that will confuse the result set.

  ## Parity is enforced by tests

  `cargo test -p orbit-core command::skill::drift_tests` runs three parity tests:

  - `asset_dirs_match_default_skill_ids` — fails when an asset dir was added/removed without a registry update.
  - `plugin_skill_symlinks_resolve_to_assets` — fails when symlinks are missing or broken (skipped on Windows where `core.symlinks=false`).
  - `router_skill_enumerates_all_defaults` — fails when a registered skill is missing from `orbit/SKILL.md`'s router enumeration.

  Each failure message names the offending ID and which catalog is out of sync. So the canonical workflow is: edit the asset, then run `cargo test -p orbit-core command::skill` (or rely on CI) to flag any catalog you forgot. There's no need to mentally track the four lists if you trust the tests.

  ## Distribution note

  Changes to a SKILL.md asset don't reach existing user installations until they re-run `orbit init --refresh` (or the next time `orbit workspace init` runs in a fresh repo). The published plugin (via `npx @orbit-tools/cli`) picks up changes on the next release that bundles the updated binary. So when the change is purely a doc improvement to an existing skill, callers may not see it until they upgrade — worth mentioning in the commit message if the wording fixes operational friction.
