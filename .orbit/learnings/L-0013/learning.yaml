summary: Update CLI audit metadata when changing orbit-cli subcommands
body: |
  The CLI audit middleware records command/subcommand metadata with an exhaustive match on top-level command enums. Removing or renaming a subcommand can compile in the command module but fail later in `audit_middleware.rs` until the metadata match is updated. Keep command parse tests and audit metadata in the same change.
