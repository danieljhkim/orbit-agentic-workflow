summary: When adding dashboard JS modules, also embed and serve each matching /static/*.js route in orbit-dashboard
body: |-
  Browser ES module imports are URL-relative. If app.js imports ./diagnostics.js, ./scoreboard.js, ./router.js, or any new split module, the binary-served dashboard must expose the same file at /static/<module>.js.

  For orbit-dashboard that means adding the include_str! constant and Router route in crates/orbit-dashboard/src/lib.rs alongside the asset file. Otherwise the packaged binary can load /static/app.js successfully, then the browser fails the new imports with 404s.

  Before finishing dashboard JS extraction work, compare the ./...js imports in assets/dashboard/app.js with the /static/...js routes in src/lib.rs, or run an equivalent sanity check.
