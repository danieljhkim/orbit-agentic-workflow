summary: When changing Orbit built-in tool parameters, update both the orbit-tools schema wrapper and the orbit-core runtime host parser/wiring.
body: |
  Orbit built-in tool files under `crates/orbit-tools/src/builtin/orbit/**` often only declare `ToolSchema` and delegate execution through `OrbitBuiltinAction`. The JSON field parsing and task mutation wiring for those tools may live under `crates/orbit-core/src/runtime/orbit_tool_host/**` and `crates/orbit-core/src/command/**`. For field-add fixes, inspect both sides before assuming the schema file is the complete handler.

  When a tool schema extends the shared agent identity parameters, reserve `model` for provenance. Domain-specific model choices, such as embedding model aliases, should use a distinct field like `embedding_model`; otherwise `{"model":"codex"}` from normal tool attribution can be misread as a runtime option.
