summary: When changing Orbit built-in tool parameters, update both the orbit-tools schema wrapper and the orbit-core runtime host parser/wiring.
body: Orbit built-in tool files under `crates/orbit-tools/src/builtin/orbit/**` often only declare `ToolSchema` and delegate execution through `OrbitBuiltinAction`. The JSON field parsing and task mutation wiring for those tools may live under `crates/orbit-core/src/runtime/orbit_tool_host/**` and `crates/orbit-core/src/command/**`. For field-add fixes, inspect both sides before assuming the schema file is the complete handler.
