summary: For Orbit audit-event queries (durations, failure rates, tool usage, etc.) default to `orbit audit list --json`. The canonical store is `~/.orbit/orbit.db` (global root); `<workspace>/.orbit/orbit.db` is an abandoned leftover, not a mirror.
body: |-
  # Audit-data canonical source: `orbit audit list`, not a local SQLite file

  ## Rule

  For any question about Orbit audit events (tool-call counts, per-call
  `duration_ms`, failure rates, who-ran-what), default to
  `orbit audit list --json` (optionally with `--limit`, `--since`, `--tool`,
  `--status`, `--role` filters). Do not query a SQLite file directly.

  ## Why

  The canonical audit store lives at `~/.orbit/orbit.db` — the **global**
  Orbit root — not at `<workspace>/.orbit/orbit.db`. Per
  `crates/orbit-core/src/config/persistence.rs:59`,
  `audit_db = paths.global_dir.join("orbit.db")`, and the doc comment on
  the same struct is explicit: "Audit: global only (single SQLite database)."

  The workspace-local `<workspace>/.orbit/orbit.db` is **not a mirror** of
  the canonical store. It is an abandoned artifact from a prior layout: the
  runtime no longer writes audit events to it, but the file persists in
  workspaces initialized before the move (and may still be (re)created at
  init — see follow-up task). Observed in this workspace 2026-05-17:

  | source                                       | row count | last timestamp                   |
  |----------------------------------------------|----------:|----------------------------------|
  | `~/.orbit/orbit.db` audit_events             |      6428 | 2026-05-17T23:03:51Z             |
  | `<workspace>/.orbit/orbit.db` audit_events   |       364 | 2026-05-10T01:53:36Z             |
  | `orbit audit list --json`                    |      6428 | matches the global DB            |

  An agent that opens the workspace-local file silently works off an
  abandoned snapshot and misses most of history (including all `run-mcp`
  tool invocations on this machine). Earlier wording of this learning
  called the workspace DB a "stale partial mirror" — that framing is wrong;
  it is not a mirror at all.

  ## How to apply

  - Default audit query: `orbit audit list --json [--since 7d] [--tool <name>] [--status failure]`.
  - Per-call `duration_ms` is exposed directly on each row — no need to
    derive it from invocation totals.
  - Pipe to `python3 -c "import json,sys; ..."` for ad-hoc aggregation;
    `--limit 100000` if you need the full history.
  - The `subcommand` field distinguishes CLI (`run`) from MCP (`run-mcp`)
    tool invocations — both have `command='tool'`.
  - See `crates/orbit-store/src/sqlite/audit_event_store.rs` for the queries
    the CLI runs against the canonical DB.

  ## What not to do

  - Do **not** open `<workspace>/.orbit/orbit.db` — it is abandoned, not a
    mirror. Treat it as a stale leftover file.
  - Do **not** open `~/.orbit/orbit.db` directly either unless (a) the
    `orbit` binary is genuinely unavailable, or (b) you need a column the
    CLI does not expose. State the reason in your response when you take
    that fallback.
  - Do **not** sqlite/grep first and "double-check" with the CLI — the CLI
    answer is the truth; any local file can lag or be entirely abandoned.
