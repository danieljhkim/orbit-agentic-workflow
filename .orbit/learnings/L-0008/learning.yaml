summary: When GitHub connector PR creation returns 403, fall back to authenticated `gh pr create` with explicit base/head/body
body: In the GitHub publish flow, the connector `_create_pull_request` may fail with `403 Resource not accessible by integration` even after the branch is pushed. Do not treat that as a publish blocker if `gh auth status` is healthy. Use `gh pr create --draft --base <base> --head <branch> --title ... --body ...`, then verify with `gh pr view --json url,isDraft,baseRefName,headRefName,title,state` and record the PR link back on the Orbit task. Keep the PR target unchanged from the intended connector call.
