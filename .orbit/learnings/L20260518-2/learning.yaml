summary: Validate dashboard tab names against the DOM before smoke-testing Runs
body: |
  ORB-00145's validation plan named a top-level Runs tab, but the current dashboard DOM exposes top-level tabs Tasks, Scoreboard, Audit, Diagnostics, and Knowledge. Runs coverage lives under Diagnostics as the Recent Runs subtab. Before treating a dashboard smoke-test tab list as authoritative, inspect `#tabs .tab` in `index.html` or the loaded DOM and map any Runs coverage to Diagnostics > Recent Runs unless a real top-level Runs tab has been added.
