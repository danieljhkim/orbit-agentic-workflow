summary: Files shipped as plugin assets (`crates/*/assets/**`, esp. `SKILL.md`) must not embed workspace-local artifact IDs (ADR-NNNN, L-NNNN, ORB-NNNNN) — they become dangling refs in other workspaces. Cite IDs in Rust source instead; use learnings for skill-level guidance.
body: |
  # Workspace-local artifact IDs do not belong in shipped plugin assets

  ## Rule

  When editing files that ship as **plugin assets** — `crates/*/assets/**`, most
  prominently `crates/orbit-core/assets/skills/**/SKILL.md` — never embed
  workspace-local artifact identifiers:

  - `ADR-NNNN`
  - `L-NNNN` (e.g. `L-0009`)
  - `ORB-NNNNN` (task IDs)

  These IDs are scoped to **this** repository's `.orbit/` store. Any consumer
  who installs the Orbit plugin into their own workspace will read the same
  shipped file and see references they cannot resolve — there is no
  `ADR-0149` in *their* `.orbit/adrs/`, no `L-0009` in *their*
  `.orbit/learnings/`. The citation is a dangling pointer the moment the
  asset leaves this checkout.

  ## Why

  Plugin assets are the cross-workspace surface; `.orbit/` artifacts are the
  within-workspace surface. The boundary is structurally identical to
  ADR-0125 ("Lineage is workspace-local; cross-machine reach via
  external_refs render"), just one layer over: workspace-local artifacts
  should not reach **other workspaces** via shipped files, the same way
  they should not reach **other machines** via raw task IDs.

  The trap is easy to fall into because contributor intuition says "cite
  the artifact that justifies the constraint" — which is correct, but only
  in surfaces whose audience is repo contributors. Skill files are not such
  a surface; they are injected into end-user agents' prompts.

  ## How to apply

  | Surface | Audience | Cite local IDs? | Use instead |
  |---|---|---|---|
  | `crates/**/src/**/*.rs` (Rust source) | Orbit contributors | ✅ yes | n/a |
  | `crates/**/assets/**` (skills, prompts, templates) | end users in other workspaces | ❌ no | project learning, or in-prose rationale without ID |
  | `docs/design/**` (design docs) | Orbit contributors | ✅ yes | n/a |
  | Top-level docs (README, CONTRIBUTING) | end users + contributors | mixed — prefer external links | external refs, GitHub permalinks |
  | `.orbit/adrs/`, `.orbit/learnings/`, `.orbit/tasks/` | this workspace | ✅ yes (this is where they live) | n/a |

  When a *constraint documented in a shipped asset* needs an enforcement
  nudge against agents weakening it:

  - Do NOT inline-cite the ADR ID in the skill file.
  - DO write a project learning scoped to the skill file's path; the
    learning is itself workspace-local but gets push-injected into the
    agent's prompt at the right moment.
  - DO inline-cite the ADR ID in the corresponding Rust source — the file
    that actually implements the constraint — since that file's audience
    is contributors.

  ## What not to do

  - Adding `<!-- ADR-0149 -->` or `<!-- L-0009 -->` next to a `Required
    fields:` callout in `SKILL.md` "just for traceability." This is the
    exact mistake that produced this learning.
  - Pasting a snippet from `.orbit/adrs/*/body.md` into a skill's body to
    explain a constraint. Paraphrase the rationale in vendor-neutral
    terms; keep the ID out.
  - Treating Rust source comments and skill-file comments as
    interchangeable surfaces. Audience differs; citation conventions
    differ.

  ## Evidence trail

  - Conversation 2026-05-17 — an agent (claude) drafted ORB-00132 with a
    planned `ADR-0149` citation in `crates/orbit-core/assets/skills/
    orbit-create-task/SKILL.md`; user flagged the leak before the task was
    approved. Task was revised in-place to scope citations to Rust source
    only.
  - Parallel: `project_task_id_local_only.md` (auto-memory) and
    ADR-0125 capture the same workspace-local boundary at the
    cross-machine layer.
