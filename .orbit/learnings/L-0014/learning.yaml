summary: Put new Orbit workspace config knobs in .orbit/config.toml (the rich knob registry) — .orbit/config.yaml is a ~45-byte metadata stub holding only schema_version and workspace_id, not a settings file.
body: |
  # Orbit workspace config: `config.toml` is the knob registry, `config.yaml` is a metadata stub

  ## Rule

  When adding a new workspace-scoped configuration knob in an Orbit checkout, place it in `.orbit/config.toml`. Do not put behavior-affecting settings in `.orbit/config.yaml`.

  ## Why

  `.orbit/config.toml` holds the rich, sectioned workspace config: `[execution]`, `[task.approval]`, `[scoring]`, `[graph]`, `[workflow]` (with `base_branch`), `[pr]`, `[duel]`, `[crews.*]`. ~2 KB on disk; this is where every existing user-tunable behavior lives.

  `.orbit/config.yaml` is a ~45-byte file containing only `schema_version` and `workspace_id`. It is workspace identity metadata, not a knob registry. Putting behavior settings there produces a config that nothing reads.

  The default-to-yaml intuition ("yaml is for config") is wrong in this codebase. Inspect both files before recommending where a new setting lands.

  ## How to apply

  - New runtime/agent-behavior knob (e.g. an `auto_commit` toggle for artifact tools): add a `[section]` (existing or new) in `.orbit/config.toml`.
  - Reuse existing sections where the semantics fit. Example: artifact commits should target `[workflow].base_branch`, not a duplicate `commit_branch` key.
  - Touch `.orbit/config.yaml` only when adding a new workspace-identity field, and confirm against `schema_version` semantics first.

  ## What not to do

  - Pick `.orbit/config.yaml` because it exists and ends in `.yaml`. In this repo, that's a stub.
  - Add a behavior key alongside `workspace_id` to "co-locate." `workspace_id` is identity, not behavior — the surfaces are different.

  ## Evidence

  Conversation 2026-05-17: while shaping a follow-up task for the `.orbit/` artifact auto-commit gap, I proposed a `.orbit/config.yaml` schema for `artifacts.auto_commit`. User pushback: "why the yaml config? and not .orbit/config.toml?" Inspection confirmed `config.toml` is the rich knob registry and `config.yaml` is a metadata stub.
