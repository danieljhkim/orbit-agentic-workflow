summary: When wiring CLI activity-job identity, populate both ToolContext and ORBIT_AGENT_* env so subprocess `orbit tool run` calls inherit canonical runtime identity.
body: CLI backend tool calls cross a process boundary. Setting `ToolContext.agent_name` and `ToolContext.model_name` in `run_cli_backend` is not enough for tools invoked inside the spawned provider process; the child must also receive `ORBIT_AGENT_NAME` and `ORBIT_AGENT_MODEL`. `orbit tool run` reads those env vars and then overwrites self-reported tool input models with the canonical runtime family at dispatch.
