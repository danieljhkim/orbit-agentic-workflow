summary: When exposing Orbit write tools to activities, update child runtime sandbox reallows rather than weakening `.orbit/**` deny
body: The default policy appends a workspace `.orbit/**` modify deny. Non-Codex provider activity children inherit the macOS sandbox without Codex side-write roots, so every activity-exposed Orbit write store needs an explicit narrow reallow in `append_orbit_child_runtime_write_roots` plus a regression test and policy-sandbox doc update. Keep registered but non-activity-exposed stores such as ADRs and graph write roots denied until those write tools are actually exposed.
