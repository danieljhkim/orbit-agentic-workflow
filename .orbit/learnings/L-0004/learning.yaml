summary: Treat ps-dependent process identity tests as validation-environment sensitive under Codex
body: The Codex exec environment can deny `ps` execution (`operation not permitted`), which makes process identity probes return `Unavailable` and causes ps-dependent tests to fail even when the code under test is unchanged. When validating nearby changes, run targeted non-ps tests for signal and record the ps-denial blocker separately from task regressions.
