summary: Treat orbit-design deprecation clippy failures as unrelated CI blockers unless the task owns design.rs
body: On ORB-00179, `make ci` failed before task-specific checks because `crates/orbit-core/src/command/design.rs` uses deprecated items with `since = "2026-05"`, which current clippy rejects under `-D warnings` (`clippy::deprecated_semver` plus `deprecated`). When a task does not own the retired orbit-design surface, do not patch `design.rs` just to make the unrelated gate green; record the evidence on the task and run targeted validation for the touched code.
