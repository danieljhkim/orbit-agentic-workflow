summary: Pass --root <worktree>/.orbit when running Orbit CLI inside a nested Orbit worktree
body: Nested task worktrees may live under the parent checkout at .orbit/state/worktrees/<name>. From that location, Orbit workspace discovery can select the parent .orbit directory unless the command is given an explicit root. For ADR, learning, and task-store operations that must land in the task worktree, run Orbit commands with --root <absolute-worktree-path>/.orbit and verify the resulting artifact path before continuing. This is workflow guidance and has no single source-code anchor.
