summary: 'For Orbit audit-event queries (failure rates, tool usage, etc.) default to `orbit audit list --json` — `.orbit/orbit.db` can be a stale/partial mirror (seen: 364 rows vs 6068 via CLI in same workspace).'
body: |
  # Audit-data canonical source: `orbit audit list`, not `.orbit/orbit.db`

  ## Rule

  For any question about Orbit audit events (tool-call counts, failure rates,
  who-ran-what), default to `orbit audit list --json` (optionally with
  `--limit`, `--since`, `--tool`, `--status`, `--role` filters). Treat
  `.orbit/orbit.db` as an implementation detail, not a query target.

  ## Why

  The workspace-local `.orbit/orbit.db` can be a stale or partial mirror of the
  canonical audit store the CLI reads. Observed in this workspace
  (2026-05-17):

  | source                          | row count | last timestamp                   |
  |---------------------------------|----------:|----------------------------------|
  | direct `sqlite3 .orbit/orbit.db audit_events` |       364 | 2026-05-10T01:53:36Z |
  | `orbit audit list --json`       |     6068  | 2026-05-17T21:17:28Z             |

  Same schema, ~17x fewer rows, 7 days behind. An agent that opens
  `.orbit/orbit.db` directly will silently work off an old snapshot, miss
  recent failures, and underreport surfaces (e.g. `subcommand=run-mcp`
  returned 0 rows from the local db, 1749 from the CLI).

  ## How to apply

  - Default audit query: `orbit audit list --json [--since 7d] [--tool <name>] [--status failure]`.
  - Pipe to `python3 -c "import json,sys; ..."` for ad-hoc aggregation;
    `--limit 100000` if you need the full history.
  - The `subcommand` field distinguishes CLI (`run`) from MCP (`run-mcp`)
    tool invocations — both have `command='tool'`. See
    `crates/orbit-store/src/sqlite/audit_event_store.rs` for the queries
    the CLI runs.
  - Only fall back to direct sqlite when (a) the `orbit` binary is
    genuinely unavailable, or (b) you need a column the CLI does not
    expose. State the reason in your response so the user knows you took
    the fallback.

  ## What not to do

  - Do **not** grep, sqlite, or read `.orbit/orbit.db` first and then
    "double-check" with the CLI — the CLI answer is the truth; the local
    db can lag arbitrarily.
  - Do **not** assume the row count in `.orbit/orbit.db` reflects recent
    activity. Crash-recovery, multi-machine workflows, and worktree
    isolation can all desync it.
evidence:
- kind: external
  reference: conversation 2026-05-17 — agent queried .orbit/orbit.db directly (364 rows, ending 2026-05-10) and missed all run-mcp entries; switching to `orbit audit list --json` returned 6068 rows ending 2026-05-17 including 1749 MCP tool calls.
