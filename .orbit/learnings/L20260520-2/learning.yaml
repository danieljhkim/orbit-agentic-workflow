summary: When job owner tests fail with missing tokens, check whether `ps` is blocked before debugging Orbit code.
body: 'While validating ORB-00199 in the Codex macOS execution environment, `cargo test -p orbit-cli -p orbit-core -p orbit-store` failed only in job owner identity tests. The root cause was environmental: running `ps -p $$ -o lstart=` returned `operation not permitted`, so process identity tokens could not be persisted and cancellation reported `owner_identity_mismatch`. Before chasing runtime or store changes, verify `ps` availability in the active sandbox.'
