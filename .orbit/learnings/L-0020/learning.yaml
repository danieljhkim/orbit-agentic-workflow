summary: 'When retiring packaged skills, treat `plugin/skills/*` entries as symlinks: inspect/delete the link itself instead of using `apply_patch` on a dangling target.'
body: A retired skill can leave behind a dangling symlink under `plugin/skills/`. Text-oriented patch flows may try to read the symlink target and fail before applying any changes. For skill retirement or catalog cleanup, inspect `ls -la plugin/skills` / `readlink`, update the Rust/default catalog and shipped skill assets with `apply_patch`, then remove the stale symlink as a filesystem entry. Re-run the skill catalog drift tests or `cargo check --workspace --all-targets` to catch stale registrations and broken links.
