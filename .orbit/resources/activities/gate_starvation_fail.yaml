schemaVersion: 2
kind: Activity
metadata:
  name: gate_starvation_fail
spec:
  type: deterministic
  description: >
    Emit a `gate.starvation` audit event and fail the Run. Used by the
    admission-gate workflow (`task_gate_pipeline`) as the post-loop
    guard when the reserve-wait window never opened within
    `max_wait_seconds`. The audit payload carries `task_ids` and
    `conflicting_files` so an epic-level orchestrator can decide to
    replan the bundle rather than retry indefinitely.
  input_schema_json:
    type: object
    required: [task_ids]
    properties:
      task_ids:
        type: array
        items:
          type: string
      conflicts:
        type: array
        items:
          type: object
      max_wait_seconds:
        type: number
  output_schema_json:
    type: object
    description: >
      This activity always fails — it exists only to emit the audit
      event and terminate the Run. The output schema is declared for
      parity with other deterministic activities.
    properties: {}
  action: gate_starvation_fail
  config: {}
