schemaVersion: 2
kind: Activity
metadata:
  name: sleep
spec:
  type: deterministic
  description: >
    Block for a fixed wall-clock duration and report the observed elapsed
    seconds. Useful for auditable polling loops that should not shell out.
  input_schema_json:
    type: object
    required: [seconds]
    properties:
      seconds:
        type: number
        minimum: 0
        maximum: 3600
  output_schema_json:
    type: object
    required: [slept_seconds]
    properties:
      slept_seconds:
        type: number
  action: sleep
  config: {}
