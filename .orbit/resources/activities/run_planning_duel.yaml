schemaVersion: 2
kind: Activity
metadata:
  name: run_planning_duel
spec:
  type: deterministic
  description: >
    Run a planning duel for a single Orbit task: select two planners and one
    arbiter, collect plan artifacts, persist the winning plan, and record the
    planning-duel scoreboard row.
  input_schema_json:
    type: object
    required: [task_id]
    properties:
      task_id:
        type: string
      run_id:
        type: string
      base_branch:
        type: string
  output_schema_json:
    type: object
    properties:
      task_id:
        type: string
      run_id:
        type: string
      task_status:
        type: string
      winner_agent_cli:
        type: string
      winner_model:
        type: string
      recorded:
        type: boolean
  action: run_planning_duel
  config: {}
