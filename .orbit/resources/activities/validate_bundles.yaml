schemaVersion: 2
kind: Activity
metadata:
  name: validate_bundles
spec:
  type: deterministic
  description: >
    Validate the auto-dispatch bundle list before the fan_out dispatch.
    Fails the Run with a structured error if any bundle
    exceeds `max_bundle_size`, contains a duplicate task_id across
    bundles, or references an id not present in the input `known_task_ids`
    set. Pass-through on success so the fan_out can consume the same
    `bundles` shape without unwrapping a wrapper object — prevents a
    misgrouped backlog from silently dispatching.
  input_schema_json:
    type: object
    required: [bundles, max_bundle_size, known_task_ids]
    properties:
      bundles:
        type: array
        items:
          type: array
          items:
            type: string
      max_bundle_size:
        type: number
      known_task_ids:
        type: array
        items:
          type: string
  output_schema_json:
    type: object
    required: [bundles, bundle_count]
    properties:
      bundles:
        type: array
        items:
          type: array
          items:
            type: string
      bundle_count:
        type: number
  action: validate_bundles
  config: {}
