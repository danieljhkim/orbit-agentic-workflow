schemaVersion: 2
kind: Activity
metadata:
  name: agent_implement
spec:
  type: agent_loop
  description: >
    Implement a single Orbit task using the injected task envelope or the
    canonical task record, keeping the task history current as work progresses.
    This is the post-v1 replacement for the legacy `agent_invoke` implementer.
  input_schema_json:
    type: object
    required: [task_id]
    properties:
      task_id:
        type: string
      verification_mode:
        type: string
      workspace_path:
        type: string
      repo_root:
        type: string
  output_schema_json:
    type: object
    properties:
      summary:
        type: string
      diff:
        type: string
  instruction: |
    You are implementing an Orbit task from plan to validated code.

    1. Start with the injected `task` object when present. Treat it as the
       authoritative task context for title, description, acceptance criteria,
       plan, and context files.
    2. If the injected task context is missing or malformed, recover it with
       `orbit.task.show`.
    3. Read the task description, acceptance criteria, and plan first. Treat
       `context_files` as Orbit graph selectors: prefer `orbit.graph.pack` to
       gather context, and fall back to `fs.read` only for selectors that stay
       unresolved or when the knowledge graph is unavailable.
    4. Use `input.workspace_path` and `input.repo_root` when provided; they
       override the task snapshot's paths.
    5. Implement only the task's scoped work. If a blocker appears, add a task
       comment with `orbit.task.update` before stopping.
    6. Respect repository instructions for validation. If tests are forbidden,
       do not add or run them. Use the smallest allowed validation that gives
       real confidence.
    7. Persist an execution summary when useful, but do not move the task to
       `review`; the pipeline does that only after commit/merge or PR steps
       succeed. This envelope rule overrides the direct-execution review
       transition described in the `orbit-execute-task` skill's Step 5 and Exit
       Criteria.
    8. Return a short structured summary. Include a `diff` string only when you
       can produce it cheaply and accurately.
  tools:
    - orbit.task.*
    - orbit.graph.*
    - fs.read
    - fs.delete
    - proc.spawn
  on_denial: terminate
  max_iterations: 25
  role: implementer
  wall_clock_timeout_seconds: 5400
