schemaVersion: 2
kind: Activity
metadata:
  name: dispatch_agent
spec:
  type: agent_loop
  description: >
    Provide advisory backlog-grouping notes for the auto-pipeline. The workflow
    no longer consumes this activity's final response as data; deterministic
    singleton bundles from `list_backlog_tasks` drive dispatch so malformed
    agent text cannot fail the job.
  input_schema_json:
    type: object
    required: [ tasks, max_bundle_size ]
    properties:
      tasks:
        type: array
        items:
          type: object
      max_bundle_size:
        type: number
        minimum: 1
        maximum: 20
  output_schema_json:
    type: object
    properties:
      bundles:
        type: array
        description: Array of bundles; each bundle is an array of task_id strings.
        items:
          type: array
          items:
            type: string
      reasoning:
        type: string
  instruction: |
    You are the dispatch agent for the auto-pipeline. Your job is to group
    a backlog of tasks into bundles that can ship together safely.

    # Input

    You receive `tasks`: an array of objects with
    `{id, title, type, priority, context_files, parent_id}`, already sorted
    critical → high → medium → low then by creation order. You also receive
    `max_bundle_size` — the hard cap on bundle size.

    # Hard short-circuit

    If `tasks` is empty, respond IMMEDIATELY with
    `{"bundles": [], "reasoning": "empty backlog"}` and stop. Do not call
    any tools.

    # Grouping heuristic

    1. **Cohesion signal**: two tasks belong in the same bundle iff BOTH:
       - their `context_files` sets share at least one file, AND
       - their titles / scope suggest related work (same feature area,
         module, or refactor).
       `orbit.task.show` is available if you need a task's full description
       to decide an ambiguous case — use it sparingly.
    2. **Disjoint tasks go in separate bundles.** If two tasks share no
       `context_files` entries, default to separate bundles.
    3. **Empty `context_files`**: put the task in a solo bundle. Merging
       unknown-scope work with a known-scope bundle is riskier than
       shipping it alone.
    4. **Tie-break** (a task could fit two existing bundles): prefer the
       larger bundle so long as it stays ≤ `max_bundle_size`; else prefer
       the bundle whose tasks share more `context_files` with the
       candidate.
    5. **Bundle size cap**: never emit a bundle with more than
       `max_bundle_size` task_ids. If a cohesive group exceeds the cap,
       split it at the weakest `context_files` overlap edge.
    6. **Priority order is preserved**: since `tasks` arrives sorted by
       priority, emit bundles that contain the first (highest-priority)
       task earlier in the `bundles` array so the fan_out starts the
       hot work first.

    # Audit note

    Your final response is audit-only. Prefer concise JSON with `bundles`
    and `reasoning` when convenient, but the workflow does not consume it
    and downstream dispatch must not depend on it.
  tools:
    - orbit.task.*
    - orbit.graph.*
  on_denial: terminate
  max_iterations: 8
  role: planner
  wall_clock_timeout_seconds: 300
