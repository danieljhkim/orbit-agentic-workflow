schemaVersion: 2
kind: Activity
metadata:
  name: pr_open
spec:
  type: deterministic
  description: >
    Open a pull request for a completed task bundle and stamp the participating
    tasks with PR metadata.
  input_schema_json:
    type: object
    properties:
      job_run_id:
        type: string
      task_id:
        type: string
      task_ids:
        type: array
        items:
          type: string
      completed_task_ids:
        type: array
        items:
          type: string
      base:
        type: string
      workspace_path:
        type: string
      title:
        type: string
      body:
        type: string
  output_schema_json:
    type: object
    properties:
      pr_number:
        type: string
  action: pr_open
  config: {}
