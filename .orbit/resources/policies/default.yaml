schemaVersion: 2
kind: Policy
metadata:
  name: default
spec:
  description: Default filesystem profile policy for Orbit activity runs
  denyRead:
  - '**/*.env'
  denyModify:
  - .orbit/**
  - '**/*.env'
  fsProfiles:
    implementer:
      read:
      - ./**
      modify:
      - ./**
    docs_writer:
      read:
      - ./**
      modify:
      - docs/**
      - '!docs/drafts/**'
    pure_compute:
      read: []
      modify: []
    reviewer:
      read:
      - ./**
      modify: []
  created_at: 2026-05-09T00:15:07.378461Z
  updated_at: 2026-05-09T00:15:07.378461Z
