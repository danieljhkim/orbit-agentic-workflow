# Planning duel pipeline.
#
# Runs the retained planning-duel automation for one task. The automation
# selects planner/arbiter roles, invokes the agent activities, writes the
# winning plan back to the task, and records the planning-duel scoreboard row.

schemaVersion: 2
kind: Job
metadata:
  name: job_duel_plan_pipeline
spec:
  state: enabled
  kind: workflow
  max_active_runs: 3
  default_input:
    task_id: null
    base_branch: main

  steps:
    - id: run_planning_duel
      target: activity:run_planning_duel
      default_input:
        task_id: "{{ input.task_id }}"
        base_branch: "{{ input.base_branch }}"
