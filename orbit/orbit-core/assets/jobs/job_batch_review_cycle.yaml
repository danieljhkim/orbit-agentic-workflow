schemaVersion: 1

# ---- job ----
job:
  # ---- registration ----
  job_id: job_batch_review_cycle
  state: enabled

  # ---- execution ----
  #
  # Batch review cycle: review a batch PR and either merge it or enter the fix-and-review loop.
  #
  # Step flow:
  #   review_batch_pr             — review the opened PR against all batch tasks' acceptance criteria
  #   sync_batch_review_to_github — publish review threads to GitHub
  #   check_batch_review_decision — gate: succeeds if all tasks APPROVED, fails if any REQUEST_CHANGES
  #   job_batch_review_loop       — (on_failure) iterative fix-and-review loop until approved
  #   merge_batch_pr              — merge approved PRs only after rechecking branch freshness, then advance all tasks to done
  #
  max_active_runs: 1
  default_input:
    base: main
  steps:
    - target_type: activity
      target_id: review_batch_pr
      agent_cli: claude
      model: sonnet
      condition: on_success
      timeout_seconds: 600

    - target_type: activity
      target_id: sync_batch_review_to_github
      condition: on_success
      timeout_seconds: 120

    - target_type: activity
      target_id: check_batch_review_decision
      condition: on_success
      timeout_seconds: 30

    - target_type: job
      target_id: job_batch_review_loop
      condition: on_failure
      timeout_seconds: 7200

    - target_type: activity
      target_id: merge_batch_pr
      condition: on_success
      timeout_seconds: 60
