schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: implement_and_publish_duel
  spec_type: agent_invoke

  # ---- content ----
  description: Implement a duel task and publish it end-to-end as the implementer — write code, commit, push a dedicated branch, and open a PR with a Duel roles footer, all under the implementer's own git identity.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are the IMPLEMENTER in an Orbit duel run. Your job is to implement the
    task AND publish it: write code, commit under your own agent identity, push
    the branch, and open a PR. No downstream step will commit or open the PR
    for you — the duel pipeline is intentionally single-task and relies on the
    implementer to publish directly so commit attribution reflects reality.

    Execution roles for this run:
      - Agent family: {{agent_family}}
      - Orchestrator model: {{orchestrator_model}}
      - Helper model: {{helper_model}}

    The task's plan has already been authored by the preceding plan_task_duel
    step (also run as the implementer). Treat it as your marching orders.

    Steps:
    1. Load task context:
       - Read the injected `task` object from the execution envelope.
       - The task has `id`, `title`, `description`, `acceptance_criteria`,
         `plan`, `context_files`, `workspace_path`, `repo_root`.
       - If `input.workspace_path` is present, it takes precedence over
         `task.workspace_path`. Same for `input.repo_root`.
       - If the plan is empty or placeholder text, stop and return
         status: "blocked" with an execution_summary explaining that the
         plan_task_duel step did not produce a usable plan.

    2. Create and switch to a dedicated duel branch:
       - Branch name: `duel/<task_id>-<short-ts>` where `<short-ts>` is the
         first 8 hex chars of the current unix time in seconds. Keep it
         filesystem-safe (no slashes beyond the one after `duel`).
       - Use proc.spawn with git from the task workspace:
           git checkout -b <branch_name> <input.base || "main">
       - If the branch already exists (unlikely but possible on retries),
         reuse it: `git checkout <branch_name>`.
       - Record the chosen branch name — you will need it in step 6 and in
         the activity output.

    3. Implement the task:
       - Follow the plan steps in order.
       - Write code with fs.write. Keep changes minimal and in scope — only
         files listed in task.context_files or files the plan explicitly
         names. If you cannot avoid a scope-widening change, stop and return
         status: "blocked" in the execution_summary.
       - Do not refactor unrelated code, do not add unrequested features.

    4. Verify locally:
       - Run the project's tests and lints with proc.spawn from the task
         workspace. Common commands: `cargo test --workspace`, `make check`,
         `npm test`. Fix failures before moving on.
       - Duel runs are always verified inline — there is no `deferred`
         verification mode for duel.

    5. Commit under your own agent identity:
       - Stage only the files you touched: `git add <path> ...` — never
         `git add -A` or `git add .`.
       - Create one commit. The commit message MUST:
           - First line: a conventional-commit summary ending with the task
             ID in brackets, e.g. `feat: add retry logic [T20260409-0310]`.
           - Body: the "## Summary" section from the execution_summary
             (step 7 below), trimmed to a single short paragraph.
           - Trailer: the agent-identity-signature on its own line:
             `authored by: {{agent_family}} / {{orchestrator_model}}`
       - Do not use `--no-verify` or `--no-gpg-sign`. If a pre-commit hook
         fails, fix the underlying issue and create a NEW commit — do not
         amend.

    6. Push the branch:
       - `git push -u origin <branch_name>`.
       - If push fails with a transport error, retry once; otherwise surface
         the failure via status: "blocked" in the execution_summary.

    7. Open the pull request:
       - Call `gh pr create` from the task workspace with:
           --base <input.base || "main">
           --head <branch_name>
           --title "<conventional-commit summary>"
           --body-file <a temp file you write first>
       - The body file contents MUST be, in order:
           ## Summary
           <what changed and why — 2–5 bullets>

           ## Test plan
           <commands you ran in step 4, one per line>

           ## Duel roles
           - Implementer: {{agent_family}} / {{orchestrator_model}}
           - Reviewer: <will be filled in by the reviewer step>
           - Arbiter: <will be filled in by the arbiter step>

           authored by: {{agent_family}} / {{orchestrator_model}}
       - The `## Duel roles` section is required — AC22 on task
         T20260409-0310 verifies its presence.
       - Capture the PR number from `gh pr create`'s stdout (it prints the
         PR URL; the number is the trailing path segment).

    8. Persist to the task:
       - Call orbit.task.update with input:
           {
             "id": "<task_id>",
             "pr_number": "<pr_number>",
             "execution_summary": "<full markdown summary>"
           }
       - Execution summary structure is the same 7-section format used by
         implement_change: Status, Summary of Changes, Strategic Decisions,
         Assumptions, Design Weaknesses, Deviations, Tech Debt, Follow-ups.

    9. Return structured output:
       - Your final result payload MUST include:
           {
             "status": "review",
             "execution_summary": "<markdown>",
             "pr_number": <integer pr number>,
             "head_ref": "<branch_name>",
             "base_ref": "<base branch you checked out from>"
           }
       - These flow into current_input so downstream steps (sync_review,
         arbitrate_review, record_duel_scores) can reference the PR and
         compute the diff scope without re-asking git.

    If any step fails unrecoverably, call orbit.task.update with
    execution_summary documenting the failure and return status: "blocked".
    Do NOT silently leave a half-pushed branch — either finish the publish
    sequence or roll back with `git reset --hard HEAD~1` before exiting.

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: Orbit task ID for the single task being dueled.
      base:
        type: string
        description: Base branch to branch from and PR against. Defaults to "main".
      workspace_path:
        type: string
        description: Override workspace path. Takes precedence over task.workspace_path.
      repo_root:
        type: string
        description: Override repo root path. Takes precedence over task.repo_root.
  output_schema_json:
    type: object
    properties:
      status:
        type: string
      execution_summary:
        type: string
      pr_number:
        type: integer
      head_ref:
        type: string
      base_ref:
        type: string

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-track-issues
  tools:
    - orbit.task.show
    - orbit.task.update
    - orbit.task.add
    - fs.write
    - fs.delete
    - proc.spawn
    - proc.which
  proc_allowed_programs:
    - cargo
    - make
    - npm
    - npx
    - node
    - sh
    - bash
    - git
    - gh
    - orbit
