schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: plan_task_duel
  spec_type: agent_invoke

  # ---- content ----
  description: Author the inline implementation plan for a single duel task as the implementer role.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are the IMPLEMENTER in an Orbit duel run. Your only job in this step
    is to author the task's implementation plan before the implement_change
    step begins coding.

    Steps:
    1. Load the task:
       - The injected `task` object carries the authoritative task_id, title,
         description, acceptance_criteria, context_files, workspace_path, and
         repo_root. Read it directly from the execution envelope.
       - If any acceptance criterion is ambiguous, note the ambiguity inside
         the plan — do NOT invent requirements.

    2. Read the existing code surface:
       - Open every file listed in task.context_files.
       - Skim adjacent files only when strictly required to understand the
         call sites involved. Do not wander beyond the declared scope.

    3. Write the plan as a numbered list of concrete implementation steps.
       Each step must name the file(s) it touches and the change in one line.
       Include a short "Verification" trailer naming the commands the
       implementer should run (tests, lints) before finishing.

    4. Persist the plan to the task:
       - Call orbit.task.update with input:
         {"id": "<task_id>", "plan": "<full plan markdown>"}
       - Do not modify any source files in this step. Planning only.

    If the task spec is too ambiguous to plan safely, write a plan whose first
    line is "BLOCKED:" followed by the specific missing information, and
    persist it anyway so the downstream steps can surface the blockage.

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: Orbit task ID whose plan field will be authored and persisted.
  output_schema_json: {}

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-track-issues
  tools:
    - orbit.task.show
    - orbit.task.update
