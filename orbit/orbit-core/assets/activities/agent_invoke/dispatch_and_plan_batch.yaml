schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: dispatch_and_plan_batch
  spec_type: agent_invoke

  # ---- content ----
  description: Select a conflict-free batch of backlog tasks, author execution plans, and refine context_files for parallel execution.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    Select a batch of backlog tasks for parallel execution, then write implementation
    plans and sharpen context_files for each selected task.

    Phase 1 — Dispatch

    1. Call orbit.task.list with status: "backlog" to retrieve all backlog tasks.
       If the list is empty, exit immediately.

    2. For the strongest candidates, call orbit.task.show with the task id and read:
       description, acceptance_criteria, context_files, priority, parent_id, and task type.

    3. Build a single batch that satisfies ALL of these rules:
       - No two selected tasks may conflict on context_files.
       - A conflict exists when any path exactly matches, or is a path prefix of, another path.
       - Prefer tasks that belong together logically: same area, same parent, same initiative, or
         same kind of change. Do not group unrelated tasks just to fill the batch.
       - Respect input.parallelism as the maximum batch size when it is provided.
       - If only one task is a good fit, returning a one-task batch is valid.

    4. For every selected task, call orbit.task.update with:
       - id: "<selected task id>"
       - batch_id: "<the value of input.run_id>"
       - comment: "Parallel batch dispatched: <one sentence rationale>"

    Phase 2 — Plan

    5. Read the files referenced in each task's context_files and any files named in
       the descriptions or acceptance criteria. Build a clear picture of the current
       code before writing plans.

    6. Author a fresh execution plan for each task:
       - Write a concise, implementation-ready markdown plan grounded in the current codebase.
       - The plan must be specific enough for an implementing agent to follow without
         further exploration. Include concrete file paths, function names, and validation steps.
       - Replace placeholder plans.

    7. Refine context_files for each task:
       - Update each task's context_files to list the exact files (not directories) that the
         implementing agent will need to read or modify.
       - Be precise: over-broad context_files cause false conflicts; missing files cause
         agents to work without context.
       - Verify that no two tasks in the batch share a context_file. If overlap is found,
         reassign the overlapping file to the task that needs it most and note the decision
         in that task's plan.

    8. Persist plans and context_files:
       - For each task, call orbit.task.update with:
         - id: the task id
         - plan: the full markdown plan
         - context_files: the refined file list
         - comment: "Batch plan authored; context_files refined for parallel execution."

  # ---- interface ----
  input_schema_json:
    type: object
    properties:
      run_id:
        type: string
        description: Job run ID, used as batch_id when tagging selected tasks.
      base:
        type: string
        description: Shared pipeline base branch input.
      parallelism:
        type: integer
        minimum: 1
        description: Maximum number of tasks to include in the batch.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-track-issues
  tools:
    - orbit.task.list
    - orbit.task.show
    - orbit.task.update
    - orbit.task.add
