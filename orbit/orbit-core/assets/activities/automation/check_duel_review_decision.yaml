schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: check_duel_review_decision
  spec_type: automation

  # ---- content ----
  description: "Gate step: read the arbiter's authoritative decision and emit loop_exit=true on APPROVED, false on REQUEST_CHANGES."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - decision
    properties:
      decision:
        type: string
        description: Authoritative arbiter decision, piped from the arbitrate_review step output (APPROVED or REQUEST_CHANGES).
  output_schema_json:
    type: object
    required:
      - review_decision
      - loop_exit
    properties:
      review_decision:
        type: string
        description: The normalized review decision (APPROVED or REQUEST_CHANGES).
      loop_exit:
        type: boolean
        description: "True when the arbiter approved — signals the duel review loop to stop."

  # ---- execution ----
  action: check_duel_review_decision
