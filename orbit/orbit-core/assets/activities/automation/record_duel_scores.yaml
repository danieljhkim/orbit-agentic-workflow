schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: record_duel_scores
  spec_type: automation

  # ---- content ----
  description: "Append one DuelRun entry to .orbit/scoreboard/duel.json, composed from the arbiter verdict and the role assignments stamped by select_duel_roles."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
      - duel_started_at
      - implementer_agent_cli
      - implementer_model
      - reviewer_agent_cli
      - reviewer_model
      - arbiter_agent_cli
      - arbiter_model
      - decision
      - reviewer_score
      - implementer_score
    properties:
      task_id:
        type: string
        description: Orbit task ID this duel run evaluated.
      duel_started_at:
        type: string
        description: RFC3339 start timestamp written by select_duel_roles; used to compute wall-clock cost.
      implementer_agent_cli:
        type: string
      implementer_model:
        type: string
      reviewer_agent_cli:
        type: string
      reviewer_model:
        type: string
      arbiter_agent_cli:
        type: string
      arbiter_model:
        type: string
      decision:
        type: string
        description: Authoritative arbiter decision (APPROVED or REQUEST_CHANGES).
      per_comment:
        type: array
        description: Arbiter's per-comment classification table from ArbiterVerdict.
      reviewer_score:
        type: number
        description: Reviewer quality score on a 0.0–5.0 scale.
      implementer_score:
        type: number
        description: Implementer quality score on a 0.0–5.0 scale.
      task_class_ambiguity:
        type:
          - string
          - "null"
        description: Arbiter's ambiguity classification (well_specified, needs_judgment, exploratory, or null).
      fix_loop_iterations:
        type: integer
        description: Number of fix-loop iterations executed. Defaults to 0.
      fix_loop_exhausted:
        type: boolean
        description: True iff the fix loop hit max_iterations without converging. Defaults to false.
      merged:
        type: boolean
        description: True iff the PR was merged.
      pr_number:
        type: integer
        description: GitHub PR number associated with this run.
      base_ref:
        type: string
        description: Base git ref for scope derivation via git diff --name-only.
      head_ref:
        type: string
        description: Head git ref for scope derivation via git diff --name-only.
  output_schema_json:
    type: object
    required:
      - run_id
      - recorded
    properties:
      run_id:
        type: string
        description: Scoreboard entry identifier assigned to the recorded DuelRun.
      recorded:
        type: boolean
        description: True iff the entry was appended to .orbit/scoreboard/duel.json.

  # ---- execution ----
  action: record_duel_scores
