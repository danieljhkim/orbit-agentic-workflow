schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: merge_batch_pr
  spec_type: automation

  # ---- content ----
  description: Merge an approved batch PR, rechecking branch freshness, then advance all batch tasks to done

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Batch run ID (batch_id). All batch tasks and their shared PR are resolved from this ID.
      base:
        type: string
        description: Base branch to check freshness against. Defaults to main.
  output_schema_json:
    type: object
    required:
      - merged
    properties:
      merged:
        type: boolean
        description: Whether the pull request merge completed successfully.

  # ---- execution ----
  action: merge_batch_pr
