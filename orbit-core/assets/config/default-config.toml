root = "."

[execution.env]
inherit = false

[execution.codex]
sandbox = "workspace-write"
# Optional: enable escalation requests for workflows that legitimately need approval.
# approval_policy = "on-request"

[task.approval]
required_for_agent = true
delegate_approval = true

# ----------------------------------
# Backend Instances
# ----------------------------------

[job]
# only yaml file persistence is supported (default = file)
persistence = { type = "file", path = "jobs", format = "yaml"}

[activity]
# only yaml file persistence is supported (default = file)
persistence = { type = "file", path = "activities", format = "yaml" }

[skill]
# only markdown is supported for now (default = file)
persistence = { type = "file", path = "skills", format = "md" }

[task]
# only yaml file persistence is supported (default = file)
persistence = { type = "file", path = "tasks", format = "yaml" }

[audit]
# only sqlite is supported for now (default = sqlite)
persistence = { type = "sqlite", path = "orbit.db" }
