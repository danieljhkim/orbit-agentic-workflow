[execution.env]
inherit = false
pass = ["HOME","PATH","CODEX_HOME"]

[task.approval]
required_for_agent = true
delegate_approval = true

# ----------------------------------
# Backend Instances
# ----------------------------------

[job]
# yaml + sqlite are supported for now (default = file)
persistence = { type = "file", path = "jobs", format = "yaml"}

[work]
# yaml + sqlite are supported for now (default = file)
persistence = { type = "file", path = "works", format = "yaml" }

[skill]
# only markdown is supported for now (default = file)
persistence = { type = "file", path = "skills", format = "md" }

[task]
# yaml + sqlite are supported for now (default = file)
persistence = { type = "file", path = "tasks", format = "yaml" }

[watch]
# only sqlite is supported for now (default = sqlite)
persistence = { type = "sqlite", path = "orbit.db"}

[audit]
# only sqlite is supported for now (default = sqlite)
persistence = { type = "sqlite", path = "orbit.db" }
