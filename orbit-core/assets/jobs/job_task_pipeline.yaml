schemaVersion: 1

# ---- job ----
job:
  # ---- registration ----
  job_id: job_task_pipeline
  state: enabled

  # ---- execution ----
  #
  # Step flow:
  #   dispatch_task
  #   plan_task        — author or refresh the task execution plan while the task is still queued
  #   create_branch    — create or reuse isolated worktree + orbit/<task_id> branch (also moves task to in-progress)
  #   implement_change — implement in the task worktree and persist an execution summary
  #   update_task      — safety net: persist task status from implement_change output (skips if already at target)
  #   run_tests        — verify tests pass inside the task worktree
  #   commit_changes   — safety net: stage and commit if the agent left uncommitted changes (skips if clean)
  #   open_pr          — safety net: open a PR if one doesn't already exist (skips if PR found on task)
  #   job_review_cycle — sub-job: review → gate → fix loop → merge (scoped on_failure)
  max_active_runs: 4
  default_input:
    base: agent-main
  steps:
    - target_type: activity
      target_id: dispatch_task
      agent_cli: claude
      model: sonnet
      timeout_seconds: 1000

    - target_type: activity
      target_id: plan_task
      condition: on_success
      agent_cli: claude
      model: opus
      timeout_seconds: 1000

    - target_type: activity
      target_id: create_branch
      condition: on_success
      timeout_seconds: 60

    - target_type: activity
      target_id: implement_change
      agent_cli: codex
      model: gpt-5.4
      condition: on_success
      timeout_seconds: 2000

    - target_type: activity
      target_id: update_task
      condition: on_success
      timeout_seconds: 15

    - target_type: activity
      target_id: run_tests
      condition: on_success
      timeout_seconds: 600

    - target_type: activity
      target_id: commit_changes
      condition: on_success
      timeout_seconds: 60

    - target_type: activity
      target_id: open_pr
      condition: on_success
      timeout_seconds: 300

    - target_type: job
      target_id: job_review_cycle
      condition: on_success
      timeout_seconds: 7200
