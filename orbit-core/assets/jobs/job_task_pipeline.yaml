schemaVersion: 1

# ---- job ----
job:
  # ---- identity ----
  job_id: job_task_pipeline
  state: enabled

  # ---- execution ----
  #
  # Step flow:
  #   dispatch_task
  #   create_branch    — create or reuse isolated worktree + orbit/<task_id> branch
  #   implement_change — implement in the task worktree, run tests, commit, move to review
  #   run_tests        — verify tests pass inside the task worktree
  #   open_pr          — open PR from orbit/<task_id> into base
  #   checkout_branch  — finalize task worktree execution without mutating the main checkout
  #   review_pr        — review the opened PR against task acceptance criteria
  default_input:
    base: agent-main
  steps:
    - target_type: activity
      target_id: dispatch_task
      agent_cli: claude
      timeout_seconds: 1000

    - target_type: activity
      target_id: create_branch
      timeout_seconds: 60

    - target_type: activity
      target_id: implement_change
      agent_cli: codex
      timeout_seconds: 1800

    - target_type: activity
      target_id: run_tests
      timeout_seconds: 600

    - target_type: activity
      target_id: open_pr
      agent_cli: codex
      timeout_seconds: 300

    - target_type: activity
      target_id: checkout_branch
      timeout_seconds: 60

    - target_type: activity
      target_id: review_pr
      agent_cli: claude
      timeout_seconds: 600
