schemaVersion: 1

# ---- job ----
job:
  # ---- registration ----
  job_id: job_review_cycle
  state: enabled

  # ---- execution ----
  #
  # Review cycle: review a PR and either merge it or enter the fix-and-review loop.
  #
  # Step flow:
  #   review_pr             — review the opened PR against task acceptance criteria
  #   check_review_decision — gate: succeeds if APPROVED, fails if REQUEST_CHANGES
  #   job_review_loop       — (on_failure) iterative fix-and-review loop until approved
  #   merge_pr              — merge approved PRs only after rechecking branch freshness, then advance tasks to done
  #
  # Extracted from job_task_pipeline so that on_failure on job_review_loop is
  # naturally scoped to the review steps, not the entire pipeline.
  max_active_runs: 4
  default_input:
    base: agent-main
  steps:
    - target_type: activity
      target_id: review_pr
      agent_cli: codex
      model: gpt-5.4
      condition: on_success
      timeout_seconds: 600

    - target_type: activity
      target_id: sync_review_to_github
      condition: on_success
      timeout_seconds: 60

    - target_type: activity
      target_id: check_review_decision
      condition: on_success
      timeout_seconds: 30

    - target_type: job
      target_id: job_review_loop
      condition: on_failure
      timeout_seconds: 7200

    - target_type: activity
      target_id: merge_pr
      condition: on_success
      timeout_seconds: 60
