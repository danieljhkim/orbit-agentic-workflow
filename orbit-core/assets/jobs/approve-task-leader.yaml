id: approve-task-leader
specType: task_approval
description: Leader review and delegated task approval workflow
instruction: Review the proposed task approval payload and return a decision with any supporting note.
inputSchemaJson:
  type: object
  required:
    - task_id
    - decision
  properties:
    task_id:
      type: string
    decision:
      type: string
      enum:
        - approve
        - reject
    note:
      type: string
  additionalProperties: false
outputSchemaJson:
  type: object
  required:
    - task_id
    - decision
    - approved
  properties:
    task_id:
      type: string
    decision:
      type: string
    approved:
      type: boolean
    comment:
      type: string
artifactPathTemplate: "{{ORBIT_ROOT}}/agents/{{repo_name}}/executions/{{date}}-approve-task.md"
skillRefs: []
identityId: linus
assignedTo: Linus Torvalds (Maintainer)
createdBy: system
