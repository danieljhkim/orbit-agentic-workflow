schemaVersion: 1
job:
  job_id: job_execute_task
  state: enabled
  #
  # Step flow:
  #   dispatch_task
  #   create_branch    — checkout base + pull/rebase + create orbit/<task_id>
  #   implement_change — fetch task, implement plan, run tests, commit, move to review
  #   run_tests        — verify tests pass on the task branch
  #   open_pr          — open PR from orbit/<task_id> into base
  #   checkout_branch  — return to base branch + pull/rebase
  #   review_pr        — review the opened PR against task acceptance criteria
  steps:
    - target_type: activity
      target_id: dispatch_task
      agent_cli: claude
      timeout_seconds: 1000

    - target_type: activity
      target_id: create_branch
      timeout_seconds: 60

    - target_type: activity
      target_id: implement_change
      agent_cli: codex
      timeout_seconds: 1800

    - target_type: activity
      target_id: run_tests
      timeout_seconds: 600

    - target_type: activity
      target_id: open_pr
      agent_cli: codex
      timeout_seconds: 300

    - target_type: activity
      target_id: checkout_branch
      timeout_seconds: 60

    - target_type: activity
      target_id: review_pr
      agent_cli: claude
      timeout_seconds: 600
