schemaVersion: 1

# ---- job ----
job:
  # ---- registration ----
  job_id: job_parallel_task_pipeline
  state: enabled

  # ---- execution ----
  # Orchestrates one agent-selected batch using a shared worktree on agent-main.
  # Workers implement changes directly in the shared directory with file-level locking.
  # After all workers finish, automated verification gates the batch. If verification
  # fails, an agent-based finalize step attempts fixes. On success, a single commit
  # and PR are created from agent-main.
  max_active_runs: 1
  default_input:
    base: agent-main
    parallelism: 4
  steps:
    # 1. Select a conflict-free batch, author plans, refine context_files.
    - target_type: activity
      target_id: dispatch_and_plan_batch
      agent_cli: claude
      model: opus
      timeout_seconds: 2400

    # 2. Snapshot batch state for audit trail.
    - target_type: activity
      target_id: snapshot_batch_state
      condition: on_success
      timeout_seconds: 15

    # 3. Launch parallel workers in the shared worktree.
    - target_type: activity
      target_id: parallel_dispatch_tasks
      condition: on_success
      timeout_seconds: 7200

    # 4. Verify build and tests pass.
    - target_type: activity
      target_id: verify_batch
      condition: on_success
      timeout_seconds: 600

    # 4b. Fallback: if verification fails, invoke agent to diagnose and fix.
    - target_type: activity
      target_id: finalize_tasks
      agent_cli: claude
      model: opus
      condition: on_failure
      timeout_seconds: 3600

    # 5. Commit all changes and open a single PR from agent-main.
    - target_type: activity
      target_id: commit_and_open_batch_pr
      condition: on_success
      timeout_seconds: 300

    # 6. Review cycle: review, gate, fix loop, merge.
    - target_type: job
      target_id: job_batch_review_cycle
      condition: on_success
      timeout_seconds: 7200
