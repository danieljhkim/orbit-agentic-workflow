schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: implement_batch_fix
  spec_type: agent_invoke

  # ---- content ----
  description: Address unresolved PR review comments by implementing fixes across all batch tasks in the shared worktree
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are fixing issues identified during PR review for a batch of Orbit tasks
    that share a single worktree and PR.

    Steps:
    1. Load all batch tasks:
       - Call orbit.task.list with input: {"batch_id": "<run_id>"}
         to fetch every task belonging to this batch.
       - For each task, call orbit.task.show with input: {"id": "<task_id>"}
         to fetch the task's title, description, plan, context_files, workspace_path,
         repo_root, and prNumber.
       - The shared worktree path is available from any task's workspace_path field.

    2. Fetch review threads for all tasks:
       - For each task, call orbit.task.review_thread.list with id: <task_id>
         and status: "open" to fetch all unresolved review threads.
       - Read each thread's messages carefully. Understand what the reviewer is asking for.
       - If a thread is a question or nit that doesn't require code changes, note it for
         the review response but do not modify code unnecessarily.

    3. Implement fixes:
       - Address each actionable comment by modifying the relevant files.
       - All file operations should happen inside the shared worktree (workspace_path).
       - Keep changes minimal and focused on addressing the review feedback.
       - Do not refactor unrelated code or add unrequested features.

    4. Reply to review threads and resolve:
       - After implementing fixes, reply to each review thread using
         orbit.task.review_thread.reply with the thread's `thread_id`.
         Briefly describe what was fixed.
       - Then resolve the thread using orbit.task.review_thread.resolve
         with the same `thread_id`.
       - If a thread could not be addressed, reply explaining why but do NOT resolve it.

    5. Verify the fixes:
       - Use proc.spawn to run the project's test and lint commands from the shared worktree.
       - If tests fail, fix the issue before continuing.

    6. Update task records:
       - For each task that was modified, call orbit.task.update with execution_summary
         documenting the fixes applied.
       - Example: orbit.task.update with input:
         {"id": "<task_id>", "execution_summary": "Fixed null check in validate() per review feedback."}

    If a comment cannot be addressed (ambiguous, out of scope, or would require
    breaking changes), document the reason in the task's execution_summary so the reviewer
    can make a decision.

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Batch run ID (batch_id). The agent loads all batch tasks via orbit.task.list.
  output_schema_json: {}

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-execute-change-request
    - orbit-track-issues
  tools:
    - orbit.task.show
    - orbit.task.list
    - orbit.task.update
    - orbit.task.add
    - orbit.task.review_thread.list
    - orbit.task.review_thread.reply
    - orbit.task.review_thread.resolve
    - fs.copy
    - fs.move
    - fs.mkdir
    - fs.patch
    - fs.write
    - fs.delete
    - proc.spawn
    - proc.which
  proc_allowed_programs:
    - cargo
    - make
    - npm
    - npx
    - node
    - sh
    - bash
    - git
    - orbit
