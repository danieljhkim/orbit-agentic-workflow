schema_version: 1
created_by: system
activity:
  id: open_batch_pr
  spec_type: automation
  description: "Push the shared parallel branch and open a single PR from agent-dev to agent-main for the entire batch."
  input_schema_json:
    type: object
    required:
      - run_id
      - workspace_path
    properties:
      run_id:
        type: string
        description: "Job run ID, used as batch_id to query tasks belonging to this batch."
      workspace_path:
        type: string
      base:
        type: string
        description: "Head branch name. Defaults to agent-dev."
  output_schema_json:
    type: object
    properties: {}
  action: open_batch_pr
