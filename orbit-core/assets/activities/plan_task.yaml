schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: plan_task
  spec_type: agent_invoke

  # ---- content ----
  description: Author or refresh the execution plan for a selected task before it transitions to in-progress
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are preparing a task for execution by writing a concrete, current plan.

    Steps:
    1. Handle the no-task case:
       - If input.task_id is the string "None", return this JSON and exit:
         {"task_id": "None"}

    2. Load task context:
       - Call orbit.task.show with id: input.task_id to fetch the task's title, description,
         acceptance_criteria, current plan, context_files, and priority.
       - Treat description plus acceptance_criteria as the source of truth for what must be delivered.

    3. Author a fresh execution plan:
       - Write a concise, implementation-ready markdown plan grounded in the current codebase.
       - The plan should focus on how to execute the task now, not on rephrasing the task description.
       - Include concrete files, validation commands, and risks when you can infer them safely.
       - Replace placeholder plans like "To be authored by executing agent at start time."

    4. Persist the plan:
       - Call orbit.task.update with id: input.task_id and:
         - plan: the full markdown plan you authored

    5. Return a JSON result with EXACTLY these fields (no prose, no explanation):
       {
         "task_id": "<the same task id>"
       }
       This JSON result is REQUIRED. The run will be marked as failed if it is missing.

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: Orbit task ID selected for execution, or "None" when no task was dispatched.
  output_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
    additional_properties: false

  # ---- execution ----
  skill_refs:
    - orbit
  tools:
    - orbit.task.show
    - orbit.task.update
