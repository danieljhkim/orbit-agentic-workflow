schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: commit_changes
  spec_type: automation

  # ---- content ----
  description: "Safety net: stage and commit task worktree changes if the agent left uncommitted work. Skips silently when the worktree is already clean."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: The Orbit task ID whose changes should be committed. All other fields (workspace_path, repo_root, branch, execution_summary) are loaded from the task.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  action: commit_task_changes
