schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: create_branch
  spec_type: automation

  # ---- content ----
  description: Refresh the local base branch from remote, then create or reuse an isolated git worktree for a task branch using the orbit/<task_id> naming convention

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: The Orbit task ID to create a branch for
      base:
        type: string
        description: Branch or commit to start from (e.g. main). Defaults to main in job_task_pipeline.
  output_schema_json:
    type: object
    required:
      - workspace_path
      - repo_root
      - branch
    properties:
      workspace_path:
        type: string
        description: Dedicated task worktree path for downstream execution.
      repo_root:
        type: string
        description: Canonical repository root used to create the worktree.
      branch:
        type: string
        description: Task branch checked out inside the worktree.

  # ---- execution ----
  action: create_task_worktree
