schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- identity ----
  id: start_task
  spec_type: automation

  # ---- content ----
  description: Transition task to in-progress and pass task metadata to downstream steps

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: The Orbit task ID to start.
      note:
        type: string
        description: Optional lifecycle note recorded with the start transition.
      comment:
        type: string
        description: Optional task comment to append while starting the task.
  output_schema_json:
    type: object
    required:
      - id
      - status
      - title
      - description
    properties:
      id:
        type: string
        description: The started task ID.
      status:
        type: string
        description: Updated task status after the start transition.
      title:
        type: string
        description: Task title for implementation.
      description:
        type: string
        description: Task description with context and requirements.
      plan:
        type: string
        description: Detailed implementation plan with numbered steps.
      context_files:
        type: array
        items:
          type: string
        description: List of relevant file paths for context.
      workspace_path:
        type: string
        description: Task workspace path for implementation.
      repo_root:
        type: string
        description: Task repo root for git operations.
      branch:
        type: string
        description: Task branch name checked out in the workspace.

  # ---- execution ----
  action: start_task
