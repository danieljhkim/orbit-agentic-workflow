schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: start_task
  spec_type: automation

  # ---- content ----
  description: Transition task to in-progress

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: The Orbit task ID to start.
  output_schema_json:
    type: object
    required:
      - task_id
      - status
    properties:
      task_id:
        type: string
        description: The started task ID.
      status:
        type: string
        description: Updated task status after the start transition.

  # ---- execution ----
  action: start_task
