schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: sync_batch_review_to_github
  spec_type: automation

  # ---- content ----
  description: Publish pending review threads from all batch tasks to their shared GitHub PR

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Batch run ID (batch_id). Review threads from all batch tasks are synced to GitHub.
  output_schema_json:
    type: object
    properties:
      synced_count:
        type: integer
        description: Number of review comments/replies synced to GitHub

  # ---- execution ----
  action: sync_batch_review_to_github
