schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: finalize_tasks
  spec_type: agent_invoke

  # ---- content ----
  description: Review a completed parallel batch, make any needed follow-up fixes, and run build or test verification across the batch.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are finalizing a completed parallel task batch before serial PR and review steps begin.

    Steps:
    1. Handle the empty-batch case:
       - If input.completed_task_ids is missing or empty, return:
         {"completed_task_ids": [], "summary": "No completed tasks were available for batch finalization."}

    2. Load task context:
       - For each id in input.completed_task_ids, call orbit.task.show and read:
         title, description, acceptance_criteria, execution_summary, context_files, workspace_path, and repo_root.
       - Treat each task workspace_path as the authoritative checkout for that task.

    3. Review the batch as a whole:
       - Inspect the code changes across the selected task worktrees.
       - Look for integration issues, stale assumptions, duplicated fixes, or places where one task now needs a small follow-up because of another task in the same batch.
       - You may revise code directly in the affected task worktrees with fs.write or fs.delete when needed.

    4. Run verification:
       - In this activity you ARE allowed to run build, test, lint, or validation commands with proc.spawn.
       - Choose the smallest commands that give real confidence for the batch.
       - If verification reveals a fixable issue, fix it before continuing.

    5. Keep task records current:
       - If you materially change a task during this finalization pass, update that task execution_summary with orbit.task.update so the task record reflects the final state before commit and PR creation.

    6. Return a JSON result with EXACTLY these fields:
       {
         "completed_task_ids": ["<task ids that should continue to serial finalization>"],
         "summary": "<brief markdown or plain-text note about the batch finalization pass>"
       }

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - completed_task_ids
    properties:
      completed_task_ids:
        type: array
        items:
          type: string
      base:
        type: string
      parallelism:
        type: integer
        minimum: 1
  output_schema_json:
    type: object
    required:
      - completed_task_ids
    properties:
      completed_task_ids:
        type: array
        items:
          type: string
      summary:
        type: string
    additional_properties: false

  # ---- execution ----
  skill_refs:
    - orbit
  tools:
    - orbit.task.show
    - orbit.task.update
    - fs.write
    - fs.delete
    - proc.spawn
    - proc.which
  proc_allowed_programs:
    - cargo
    - make
    - npm
    - npx
    - node
    - sh
    - bash
    - git
    - orbit
