schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: sync_review_to_github
  spec_type: automation

  # ---- content ----
  description: Publish pending review threads from the task to GitHub PR comments

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: Orbit task ID whose review threads should be synced to GitHub
  output_schema_json:
    type: object
    properties:
      synced_count:
        type: integer
        description: Number of review comments/replies synced to GitHub

  # ---- execution ----
  action: sync_review_to_github
