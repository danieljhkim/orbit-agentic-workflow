schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: update_task
  spec_type: automation

  # ---- content ----
  description: "Safety net: persist task status if the task is not already at the target status. Skips silently when the task status already matches."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
      - status
    properties:
      task_id:
        type: string
        description: The Orbit task ID to mutate.
      status:
        type: string
        description: The target task status to apply using Orbit's normal transition rules.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  action: update_task
