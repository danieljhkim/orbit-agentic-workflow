schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: update_task
  spec_type: automation

  # ---- content ----
  description: Persist task status and execution details from a completed automation step

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
      - status
    properties:
      task_id:
        type: string
        description: The Orbit task ID to mutate.
      status:
        type: string
        description: The target task status to apply using Orbit's normal transition rules.
      execution_summary:
        type: string
        description: Optional replacement execution summary for the task. Required for in-progress to review transitions.
      comment:
        type: string
        description: Optional task comment to append while persisting the result.
  output_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: The updated task ID.

  # ---- execution ----
  action: update_task
