schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: parallel_finalize_tasks
  spec_type: automation

  # ---- content ----
  description: Run serial per-task finalization for a completed parallel batch.

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - completed_task_ids
    properties:
      completed_task_ids:
        type: array
        items:
          type: string
      base:
        type: string
        description: Base branch used for dedicated parallel worker worktrees. Defaults to orbit-parallel-work-branch.
  output_schema_json:
    type: object
    required:
      - launched
      - succeeded
      - failed
    properties:
      launched:
        type: integer
      succeeded:
        type: integer
      failed:
        type: integer
      failures:
        type: array
        items:
          type: object
          properties:
            task_id:
              type: string
            error:
              type: string
          required:
            - task_id
            - error

  # ---- execution ----
  action: run_parallel_finalize_tasks
