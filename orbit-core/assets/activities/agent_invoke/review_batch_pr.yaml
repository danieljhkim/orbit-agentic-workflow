schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: review_batch_pr
  spec_type: agent_invoke

  # ---- content ----
  description: Review a batch pull request against all batch tasks' acceptance criteria
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are reviewing a single pull request that covers multiple Orbit tasks in a batch.

    Steps:
    1. Load all batch tasks:
       - Call orbit.task.list with input: {"batch_id": "<run_id>"}
         to fetch every task belonging to this batch.
       - For each task, call orbit.task.show with input: {"id": "<task_id>", "agent": "<agent>", "model": "<model>"}
         to fetch the task's title, description, plan, acceptanceCriteria, and prNumber.

    2. Determine the PR identifier:
       - Use any batch task's `prNumber` field (they all share the same PR).
       - If prNumber is not set, fall back to the branch name convention.

    3. Call github.pr.view with pr: <identifier>.
       - Inspect the PR title, body, changed files, and commits.

    4. Evaluate the PR holistically against ALL tasks:
       - For each task, check whether its acceptance criteria are met.
       - Are there obvious correctness issues, missing tests, or scope creep?
       - Does the PR description accurately reflect the changes?
       - Scope check: compare the PR's changed files against each task's context_files.
         Any file modified outside any task's declared scope is a deviation. If the
         out-of-scope change alters behavior (logic, tests, configuration), it is a
         BLOCKING issue — use "request-changes".
       - Regression check: for any out-of-scope file that was modified, verify the change
         does not revert or weaken a fix introduced by a prior PR/commit. A regression is
         always a BLOCKING issue — use "request-changes" regardless of how minor it looks.

    5. Choose an action — apply these rules strictly in order:
       - "request-changes"  — ANY of the following are present for ANY task:
                              • acceptance criteria not met
                              • correctness or logic error
                              • out-of-scope behavioral change (see scope check)
                              • regression to a prior fix (see regression check)
                              • missing tests for changed behaviour
       - "approve"          — all criteria met for ALL tasks AND no blocking issues found.

    6. Post review feedback:
       - For each issue, post a review thread on the specific task it relates to using
         orbit.task.review_thread.add with that task's id. Set path and line when tied
         to a specific file and diff line.
       - Leave exactly one issue per thread. Never bundle multiple findings into one thread.
       - For general issues not tied to a specific task, pick the most relevant task.
       - After all issue-specific threads are posted, call orbit.task.review_thread.add
         on each task with a short overall summary of the decision and blocking themes.

    7. Update ALL batch tasks with the review decision:
       - For each task, call orbit.task.update with input:
         {"id": "<task_id>", "pr_status": "<pr_status>", "agent": "<agent>", "model": "<model>"}
       - This is the CRITICAL step. The engine reads pr_status from the task artifacts
         to gate the review loop and merge decision. You MUST update every batch task.

    If no tasks are found for the batch, or the PR cannot be located, return a clear error.

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Batch run ID (batch_id). The agent loads all batch tasks via orbit.task.list and their shared PR via orbit.task.show.
  output_schema_json: {}

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-review-pr
    - orbit-track-issues
  tools:
    - orbit.task.show
    - orbit.task.list
    - orbit.task.update
    - orbit.task.add
    - orbit.task.review_thread.add
    - github.pr.view
