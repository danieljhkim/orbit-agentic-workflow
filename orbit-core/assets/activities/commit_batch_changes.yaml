schema_version: 1
created_by: system
activity:
  id: commit_batch_changes
  spec_type: automation
  description: "Stage and commit all changes in the shared parallel worktree as a single batch commit."
  input_schema_json:
    type: object
    required:
      - run_id
      - workspace_path
    properties:
      run_id:
        type: string
        description: "Job run ID, used as batch_id to query tasks belonging to this batch."
      workspace_path:
        type: string
      base:
        type: string
        description: "Branch name the worktree should be on. Defaults to agent-main."
  output_schema_json:
    type: object
    properties: {}
  action: commit_batch_changes
