schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: review_pr
  spec_type: agent_invoke

  # ---- content ----
  description: Review a pull request for a completed Orbit task against its acceptance criteria
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are reviewing a pull request for an Orbit task.
    Steps:
    1. Load task context (if available):
       - If input.task_id is present, call orbit.task.show with input: {"id": "<task_id>"}
         to fetch the task's title, description, plan, and acceptanceCriteria.
         Example: orbit.task.show --input '{"id": "T20260315-123456"}'
       - If input.task_id is absent, proceed without task metadata — review the PR on its
         own merits using the PR description and changed files.
    2. Determine the PR identifier:
       - If input.pr is provided, use it directly.
       - If input.task_id is present, use the task's `prNumber` field if set, or fall back
         to the branch name "orbit/<task_id>".
    3. Call github.pr.view with pr: <identifier> (and repo: "{{input.repo}}" if provided).
       - Inspect the PR title, body, changed files, and commits.
    4. Evaluate the PR against the task:
       - Does the implementation cover all acceptance criteria?
       - Are there obvious correctness issues, missing tests, or scope creep?
       - Does the PR description accurately reflect the changes?
       - Scope check: compare the PR's changed files against the task's context_files.
         Any file modified outside the task's declared scope is a deviation. If the
         out-of-scope change alters behavior (logic, tests, configuration), it is a
         BLOCKING issue — use "request-changes".
       - Regression check: for any out-of-scope file that was modified, verify the change
         does not revert or weaken a fix introduced by a prior PR/commit. A regression is
         always a BLOCKING issue — use "request-changes" regardless of how minor it looks.
    5. Choose an action — apply these rules strictly in order:
       - "request-changes"  — ANY of the following are present:
                              • acceptance criteria not met
                              • correctness or logic error
                              • out-of-scope behavioral change (see scope check)
                              • regression to a prior fix (see regression check)
                              • missing tests for changed behaviour
         Body MUST list every blocking issue clearly.
       - "approve"          — all criteria met AND no blocking issues found.
       - "comment"          — ONLY for a PR that is otherwise approvable but has minor
                              non-blocking observations (style, naming, optional follow-ups).
                              Do NOT use "comment" if there is any issue that should be fixed.
                              Do NOT write "recommend merge" in a comment review — that is
                              self-contradictory. If the PR is ready to merge, use "approve".
    6. Call github.pr.review with:
       - pr: <identifier>
       - action: <chosen action>
       - body: <review summary> (required for request-changes and comment)
       - repo: "{{input.repo}}" if provided
    7. Return the action and body in the output.

    If input.task_id was provided but the task is not found, or the PR cannot be located,
    return a clear error.

  # ---- interface ----
  input_schema_json:
    type: object
    properties:
      task_id:
        type: string
        description: Optional Orbit task ID whose PR should be reviewed. When present, the agent loads task metadata via orbit.task.show.
      pr:
        type: string
        description: PR number, URL, or branch name. Optional when task_id is provided; falls back to the task prNumber and then the task branch.
      repo:
        type: string
        description: Repository in owner/name format. Optional when task_id is provided and defaults to the current repository.
  output_schema_json:
    type: object
    required:
      - action
      - body
    properties:
      action:
        type: string
        description: "Review decision: approve, request-changes, or comment"
      body:
        type: string
        description: Review body summarising findings

  # ---- execution ----
  skill_refs:
    - orbit
  tools:
    - orbit.task.show
    - github.pr.view
    - github.pr.review
