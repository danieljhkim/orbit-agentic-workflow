schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: review_pr
  spec_type: agent_invoke

  # ---- content ----
  description: Review a pull request for a completed Orbit task against its acceptance criteria
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are reviewing a pull request for an Orbit task.
    Steps:
    1. Load task context:
       - Call orbit.task.show with input: {"id": "<task_id>", "agent": "<agent>", "model": "<model>"}
         to fetch the task's title, description, plan, acceptanceCriteria, and prNumber.
         Example: orbit.task.show --input '{"id": "T20260315-123456", "agent": "codex", "model": "gpt-5.4"}'
    2. Determine the PR identifier:
       - Use the task's `prNumber` field if set, or fall back to the branch name "orbit/<task_id>".
    3. Call github.pr.view with pr: <identifier>.
       - Inspect the PR title, body, changed files, and commits.
    4. Evaluate the PR against the task:
       - Does the implementation cover all acceptance criteria?
       - Are there obvious correctness issues, missing tests, or scope creep?
       - Does the PR description accurately reflect the changes?
       - Scope check: compare the PR's changed files against the task's context_files.
         Any file modified outside the task's declared scope is a deviation. If the
         out-of-scope change alters behavior (logic, tests, configuration), it is a
         BLOCKING issue — use "request-changes".
       - Regression check: for any out-of-scope file that was modified, verify the change
         does not revert or weaken a fix introduced by a prior PR/commit. A regression is
         always a BLOCKING issue — use "request-changes" regardless of how minor it looks.
    5. Choose an action — apply these rules strictly in order:
       - "request-changes"  — ANY of the following are present:
                              • acceptance criteria not met
                              • correctness or logic error
                              • out-of-scope behavioral change (see scope check)
                              • regression to a prior fix (see regression check)
                              • missing tests for changed behaviour
       - "approve"          — all criteria met AND no blocking issues found.
    6. Post review feedback:
       - For each issue tied to a specific file and diff line, call github.pr.review.comment.
       - Leave exactly one issue per comment. Never bundle multiple findings into one comment.
       - If an issue is not tied to a specific diff line, use a separate github.pr.comment
         for that issue instead of folding it into the summary.
       - After all issue-specific comments are posted:
         - If action is "request-changes": call github.pr.comment with a short overall
           summary of the decision and the main blocking themes.
         - If action is "approve": call github.pr.comment with a brief approval summary.
    7. Update the task with the review decision:
       - Call orbit.task.update with input: {"id": "<task_id>", "pr_status": "<pr_status>", "agent": "<agent>", "model": "<model>"}
    8. Return a JSON result with EXACTLY these fields (no prose, no explanation):
       {
         "task_id": "<the Orbit task ID>",
         "pr_status": "approve",
         "body": "<review summary text>",
         "loop_exit": true
       }
       - Set loop_exit to true if pr_status is "approve", false otherwise.
       This JSON result is strongly recommended. If the agent crashes before returning it,
       the engine falls back to the task's pr_status field to decide whether to exit the review loop.

    If the task is not found, or the PR cannot be located, return a clear error.

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: Orbit task ID whose PR should be reviewed. The agent loads task metadata (including prNumber) via orbit.task.show.
  output_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: The Orbit task ID that was reviewed
      pr_status:
        type: string
        description: "Review decision: approve or request-changes"
      body:
        type: string
        description: Review summary text
      loop_exit:
        type: boolean
        description: "True when pr_status is approve — signals the review loop to stop."

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-review-pr
  tools:
    - orbit.task.show
    - orbit.task.update
    - github.pr.view
    - github.pr.review.comment
    - github.pr.comment
