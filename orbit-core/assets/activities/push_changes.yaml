schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: push_changes
  spec_type: automation

  # ---- content ----
  description: "Push the task branch to the remote after committing. Ensures the GitHub PR reflects the latest local changes."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: The Orbit task ID whose branch should be pushed. The workspace_path is loaded from the task.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  action: push_task_changes
