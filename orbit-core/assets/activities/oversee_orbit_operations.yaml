schema_version: 1

# ---- metadata ----
created_by: system
# ---- activity ----
activity:
  # ---- registration ----
  id: oversee_orbit_operations
  spec_type: agent_invoke

  # ---- content ----
  description: |
    Review recent Orbit operations such as job runs and tasks and make
    sure everything is up to the standard.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    Use `orbit-maintain-system` skill to perform an operational audit of recent job runs.
    Use `orbit-create-task` skill for any remediation tasks created.
    Any detected failures or operational issues must be investigated and converted into actionable Orbit tasks.

  # ---- interface ----
  input_schema_json:
    type: object
    properties: {}
    additional_properties: false
  output_schema_json:
    type: object
    properties:
      comment:
        type: string

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-create-task
    - orbit-maintain-system
  tools: []
