schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: merge_pr
  spec_type: automation

  # ---- content ----
  description: Merge an approved Orbit pull request, rechecking task branch freshness against the base branch before advancing the task to done

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: The Orbit task ID whose pull request should be merged. All other fields (pr_number, repo_root, branch, base) are loaded from the task or use conventions.
      pr_status:
        type: string
        description: "Direct review decision from upstream step (approve or request-changes). When provided, takes precedence over the persisted task field."
  output_schema_json:
    type: object
    required:
      - merged
    properties:
      merged:
        type: boolean
        description: Whether the pull request merge completed successfully.

  # ---- execution ----
  action: merge_pr_from_task
