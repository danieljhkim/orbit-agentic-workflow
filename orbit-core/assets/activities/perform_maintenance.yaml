schema_version: 1

# ---- metadata ----
created_by: system
identity_id: prii

# ---- activity ----
activity:
  # ---- identity ----
  id: perform_maintenance
  spec_type: agent_invoke

  # ---- content ----
  description: perform system maintenance, using `orbit-maintain-system`
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    Use `orbit-maintain-system` skill to perform system maintenance.
    Output a brief summary in the comment.

  # ---- interface ----
  input_schema_json:
    type: object
    properties: {}
    additional_properties: false
  output_schema_json:
    type: object
    properties:
      comment:
        type: string
      created_file:
        type: string
        description: Repo-relative or absolute path to the markdown report written during this run. Orbit auto-commits this file together with the run artifact.

  # ---- execution ----
  skill_refs:
    - orbit-maintain-system
  tools: []
