schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: open_pr
  spec_type: automation

  # ---- content ----
  description: "Safety net: open a pull request from Orbit task metadata if the task does not already have one. Skips silently when the task already references an open PR."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: The Orbit task ID whose branch should be opened as a PR. All other fields (repo_root, branch, base, execution_summary, changed_files) are loaded from the task or derived from git.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  action: open_pr_from_task
