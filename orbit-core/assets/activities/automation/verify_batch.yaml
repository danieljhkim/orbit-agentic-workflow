schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: verify_batch
  spec_type: automation

  # ---- content ----
  description: "Run build and test verification on a parallel batch workspace. Cheap automation gate before finalize."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Job run ID, used to identify the batch.
      workspace_path:
        type: string
        description: Path to the workspace directory. If omitted, resolved from the current working directory.
  output_schema_json:
    type: object
    required:
      - passed
      - exit_code
      - stdout
      - stderr
    properties:
      passed:
        type: boolean
        description: Whether build and tests passed.
      exit_code:
        type: integer
        description: Exit code of the last command that ran (build or test).
      stdout:
        type: string
        description: Combined stdout from build/test commands.
      stderr:
        type: string
        description: Combined stderr from build/test commands.

  # ---- execution ----
  action: verify_batch
