schema_version: 1

# ---- metadata ----
created_by: system
# ---- activity ----
activity:
  # ---- registration ----
  id: review_tasks
  spec_type: agent_invoke

  # ---- content ----
  description: Review all Orbit tasks in "proposed" or "review" and record explicit approvals or rejections.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    Use `orbit-approve-task` to check for any orbit tasks with "proposed" or "review" status,
    review them carefully, and update the status accordingly.
    For each task reviewed, update it via the appropriate orbit skill with the approval or rejection decision and a brief rationale comment.
    Example approval: orbit.task.approve with input: {"id": "<task_id>", "note": "Acceptance criteria met. Implementation is clean."}
    Example rejection: orbit.task.reject with input: {"id": "<task_id>", "note": "Missing test coverage for edge case X."}

  # ---- interface ----
  input_schema_json:
    type: object
    properties: {}
    additional_properties: false
  output_schema_json: {}

  # ---- execution ----
  skill_refs:
    - orbit-approve-task
    - orbit-track-issues
  tools: []
