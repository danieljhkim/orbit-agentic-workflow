schema_version: 1

# ---- metadata ----
created_by: system
# ---- activity ----
activity:
  # ---- registration ----
  id: review_tasks
  spec_type: agent_invoke

  # ---- content ----
  description: Review all Orbit tasks in "proposed" or "review" and record explicit approvals or rejections.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    Use `orbit-approve-task` to check for any orbit tasks with "proposed" or "review" status,
    review them carefully, and update the status accordingly.
    Output the task_id's that have been approved and rejected and leave a brief summary in the comment.

  # ---- interface ----
  input_schema_json:
    type: object
    properties: {}
    additional_properties: false
  output_schema_json:
    type: object
    properties:
      comment:
        type: string

  # ---- execution ----
  skill_refs:
    - orbit-approve-task
  tools: []
