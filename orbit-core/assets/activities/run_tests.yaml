schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: run_tests
  spec_type: cli_command

  # ---- content ----
  description: Run tests, formatting checks, and linting for the workspace project

  # ---- interface ----
  input_schema_json:
    type: object
    required: []
    properties:
      workspace_path:
        type: string
        description: Task workspace path propagated from dispatch_task for CLI execution.
  output_schema_json:
    type: object
    properties:
      exit_code:
        type: integer

  # ---- execution ----
  # Convention: the workspace project must expose a `make check` target that runs
  # tests, formatting, and linting in one step. This keeps the activity simple and
  # lets each project own what "check" means.
  #
  # For stack auto-detection, replace command/args with:
  #   command: bash
  #   args:
  #     - -c
  #     - |
  #       set -e
  #       if [ -f Cargo.toml ]; then
  #         cargo fmt --check && cargo clippy -- -D warnings && cargo test --workspace
  #       elif [ -f package.json ]; then
  #         npm run lint --if-present && npm test
  #       elif [ -f pyproject.toml ]; then
  #         python -m pytest
  #       elif [ -f Makefile ]; then
  #         make check
  #       else
  #         echo "No recognized project type in $(pwd)" >&2; exit 1
  #       fi
  command: make
  args:
    - check
  working_dir: "{{workspace_path}}"
  timeout_seconds: 300
  expected_exit_codes:
    - 0
