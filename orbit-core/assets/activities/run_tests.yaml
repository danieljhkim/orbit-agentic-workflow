schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: run_tests
  spec_type: cli_command

  # ---- content ----
  description: Run tests, formatting checks, and linting for the workspace project

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: Orbit task ID. The engine loads the task's workspace_path into the template context so {{workspace_path}} resolves automatically.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  # Convention: the workspace project must expose a `make check` target that runs
  # tests, formatting, and linting in one step. This keeps the activity simple and
  # lets each project own what "check" means.
  command: make
  args:
    - check
  working_dir: "{{workspace_path}}"
  timeout_seconds: 300
  expected_exit_codes:
    - 0
