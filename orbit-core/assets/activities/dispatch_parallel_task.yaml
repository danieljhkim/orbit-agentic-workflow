schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: dispatch_parallel_task
  spec_type: agent_invoke

  # ---- content ----
  description: Select a coherent, conflict-free batch of backlog tasks for one parallel execution wave.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    Pick a group of backlog tasks that make sense to execute together in one parallel batch.

    1. Call orbit.task.list with status: "backlog" to retrieve all backlog tasks.
       If the list is empty, exit immediately.

    2. For the strongest candidates, call orbit.task.show with the task id and read:
       description, acceptance_criteria, context_files, priority, parent_id, and task type.

    3. Build a single batch that satisfies ALL of these rules:
       - No two selected tasks may conflict on context_files.
       - A conflict exists when any path exactly matches, or is a path prefix of, another path.
       - Prefer tasks that belong together logically: same area, same parent, same initiative, or
         same kind of change. Do not group unrelated tasks just to fill the batch.
       - Respect input.parallelism as the maximum batch size when it is provided.
       - If only one task is a good fit, returning a one-task batch is valid.

    4. For every selected task, call orbit.task.update with:
       - id: "<selected task id>"
       - batch_id: "<the value of input.run_id>"
       - comment: "Parallel batch dispatched: <one sentence rationale>"

  # ---- interface ----
  input_schema_json:
    type: object
    properties:
      run_id:
        type: string
        description: Job run ID, used as batch_id when tagging selected tasks.
      base:
        type: string
        description: Shared pipeline base branch input, accepted but unused by dispatch_parallel_task.
      parallelism:
        type: integer
        minimum: 1
        description: Maximum number of tasks to include in the batch.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  skill_refs:
    - orbit
  tools:
    - orbit.task.list
    - orbit.task.show
    - orbit.task.update
