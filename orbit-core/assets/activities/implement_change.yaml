schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- identity ----
  id: implement_change
  spec_type: agent_invoke

  # ---- content ----
  description: Implement an Orbit task from plan to tested code, then record the execution summary
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are implementing an Orbit task from plan to tested code.

    Steps:
    1. Review the task metadata provided as input.
       - Read input.title, input.description, and input.context_files carefully before touching any code.
       - input.workspace_path is the authoritative implementation workspace.

    2. Confirm the task lifecycle state:
       - In the standard `job_task_pipeline`, the `start_task` activity automatically moves
         the task to `in-progress` before this activity runs.
       - If you are invoked outside that standard pipeline and the task is not already
         `in-progress`, it is the caller's responsibility to transition it first.

    3. Explore the workspace:
       - Read the files listed in input.context_files. Understand the existing code before writing.
       - All relative file and process work should happen inside input.workspace_path.

    4. Implement the task:
       - If input.plan is provided, follow the plan steps in order.
       - Write code with fs.write. Keep changes minimal and focused on the task scope.
       - Do not refactor unrelated code or add unrequested features.

    5. Verify the implementation:
       - Use proc.spawn to run the project's test and lint commands from input.workspace_path.
         Common commands: `cargo test --workspace`, `make check`, `npm test`.
       - If tests fail, fix the issue before continuing. Do not move to review with
         failing tests.

    6. Prepare output for task persistence:
       - Construct an execution summary markdown with this structure:
           ## Status
           success

           ## 1. Summary of Changes
           <what changed and why>

           ## 2. Strategic Decisions
           - <decision> | Rationale: <why> | Trade-offs: <trade-offs>

           ## 3. Assumptions Made
           - <assumption> | Impact if incorrect: <impact>

           ## 4. Design Weaknesses / Risks
           - <risk> | Severity: Low/Medium/High | Mitigation: <mitigation>

           ## 5. Deviations from Original Plan
           - <deviation> | Justification: <why>
           (or "None" if the plan was followed exactly)

           ## 6. Technical Debt Introduced
           - <item> | Recommended resolution: <next step>
           (or "None")

           ## 7. Recommended Follow-Ups
           - <next step>
       - Do not stage files, create commits, or open pull requests. The job pipeline will handle persistence and those steps after this activity succeeds.

    7. Return output:
       - status: "success" or "failed"
       - summary: one paragraph describing what was implemented
       - execution_summary: the full markdown summary (will be passed to update_task for persistence)
       - files_changed: list of file paths you modified or created
       - note: optional lifecycle note for the status transition

    If any step fails unrecoverably (tests cannot be fixed, plan is ambiguous, required
    files are missing), return status: "failed" with the execution_summary documenting
    the failure reason (will be passed to update_task for persistence).

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
      - title
      - description
    properties:
      task_id:
        type: string
        description: The Orbit task ID to implement
      title:
        type: string
        description: Task title
      description:
        type: string
        description: Task description with context and requirements
      plan:
        type: string
        description: Detailed implementation plan with numbered steps
      context_files:
        type: array
        items:
          type: string
        description: Optional list of relevant file paths for context
      workspace_path:
        type: string
        description: Optional task worktree path. If provided, it is the authoritative implementation workspace.
      repo_root:
        type: string
        description: Optional repository root or task worktree path to use for git operations.
      branch:
        type: string
        description: Optional task branch name expected to be checked out in the implementation workspace.
  output_schema_json:
    type: object
    required:
      - status
      - summary
      - execution_summary
    properties:
      status:
        type: string
        description: "Outcome: success or failed"
      summary:
        type: string
        description: One-paragraph summary of what was implemented
      execution_summary:
        type: string
        description: Full markdown execution summary (passed to update_task activity for persistence)
      files_changed:
        type: array
        items:
          type: string
        description: List of files created or modified
      note:
        type: string
        description: Optional lifecycle note for the status transition

  # ---- execution ----
  skill_refs:
    - orbit
  tools:
    - fs.write
    - fs.delete
    - proc.spawn
    - proc.which
