schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: snapshot_batch_state
  spec_type: automation

  # ---- content ----
  description: "Snapshot the current state of all tasks in a parallel batch. Fast, deterministic, no agent involved."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Job run ID, used as batch_id to query tasks belonging to this batch.
  output_schema_json:
    type: object
    required:
      - task_ids
      - task_count
      - tasks
    properties:
      task_ids:
        type: array
        items:
          type: string
        description: IDs of all tasks in the batch.
      task_count:
        type: integer
        description: Number of tasks in the batch.
      tasks:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            status:
              type: string
            context_files:
              type: array
              items:
                type: string
        description: Summary of each task in the batch.

  # ---- execution ----
  action: snapshot_batch_state
