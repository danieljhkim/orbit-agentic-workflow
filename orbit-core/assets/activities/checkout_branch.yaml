schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- identity ----
  id: checkout_branch
  spec_type: cli_command

  # ---- content ----
  description: Finalize isolated task worktree execution without mutating the human checkout

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - workspace_path
      - repo_root
    properties:
      base:
        type: string
        description: Branch name to check out (e.g. main)
      workspace_path:
        type: string
        description: Task worktree path propagated from create_branch for downstream execution.
      repo_root:
        type: string
        description: Canonical repository root that owns the task worktree.
  output_schema_json:
    type: object
    required:
      - exit_code
      - workspace_path
      - repo_root
      - cleanup_strategy
    properties:
      exit_code:
        type: integer
      workspace_path:
        type: string
        description: Task worktree path retained after pipeline completion.
      repo_root:
        type: string
        description: Canonical repository root that owns the task worktree.
      cleanup_strategy:
        type: string
        description: Summary of how the task worktree was left after finalization.

  # ---- execution ----
  command: bash
  args:
    - scripts/orbit-finalize-task-worktree.sh
    - "{{input.repo_root}}"
    - "{{workspace_path}}"
  working_dir: "{{input.repo_root}}"
  timeout_seconds: 60
  expected_exit_codes:
    - 0
