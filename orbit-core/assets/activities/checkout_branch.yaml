schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- identity ----
  id: checkout_branch
  spec_type: cli_command

  # ---- content ----
  description: Check out a git branch, typically used to return to the base branch after task work is complete

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - base
    properties:
      base:
        type: string
        description: Branch name to check out (e.g. main)
      workspace_path:
        type: string
        description: Task workspace path propagated from dispatch_task for CLI execution.
  output_schema_json:
    type: object
    properties:
      exit_code:
        type: integer

  # ---- execution ----
  command: bash
  args:
    - -c
    - "git checkout '{{input.base}}' && git pull --rebase origin '{{input.base}}'"
  working_dir: "{{workspace_path}}"
  timeout_seconds: 60
  expected_exit_codes:
    - 0
