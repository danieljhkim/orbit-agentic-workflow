<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>orbit</title>
    <style>
      :root {
        --bg: #0d1117;
        --bg-elev: #131922;
        --fg: #c9d1d9;
        --fg-dim: #6e7681;
        --border: #21262d;
        --accent: #58a6ff;
        --status-proposed: #d29922;
        --status-backlog: #8b949e;
        --status-in-progress: #39c5cf;
        --status-review: #c678dd;
        --status-done: #3fb950;
        --status-blocked: #f85149;
        --status-rejected: #f85149;
        --status-archived: #6e7681;
        --status-someday: #8b949e;
        --priority-high: #f85149;
        --priority-medium: #d29922;
        --priority-low: #6e7681;
        --priority-critical: #ff7b72;
        --state-success: #3fb950;
        --state-active: #3fb950;
        --state-running: #39c5cf;
        --state-pending: #d29922;
        --state-failed: #f85149;
        --state-error: #f85149;
        --state-disabled: #6e7681;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.45;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }
      header {
        border-bottom: 1px solid var(--border);
        padding: 14px 20px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
      }
      header .brand {
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-weight: 600;
        font-size: 16px;
        color: var(--fg);
      }
      header .brand .prompt { color: var(--accent); margin-right: 6px; }
      header .meta {
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        color: var(--fg-dim);
      }
      main {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        padding: 20px;
        max-width: 1600px;
      }
      @media (max-width: 1100px) {
        main { grid-template-columns: 1fr; }
      }
      .col-side {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .panel {
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      .panel > header {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        color: var(--fg-dim);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .panel > header .count {
        color: var(--fg);
      }
      .panel > .body {
        padding: 6px 0;
      }
      #tasks-panel > .body {
        max-height: calc(100vh - 220px);
        overflow-y: auto;
      }
      .controls {
        display: flex;
        gap: 6px;
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
        align-items: center;
      }
      #task-search {
        flex: 1 1 200px;
        min-width: 160px;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 4px 8px;
        font: inherit;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        outline: none;
      }
      #task-search:focus {
        border-color: var(--accent);
      }
      #task-filter {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .chip {
        font: inherit;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 11px;
        padding: 2px 8px;
        border: 1px solid var(--border);
        border-radius: 3px;
        background: transparent;
        color: var(--fg-dim);
        cursor: pointer;
        text-transform: lowercase;
      }
      .chip:hover {
        color: var(--fg);
      }
      .chip.active {
        color: var(--fg);
        border-color: var(--accent);
        background: rgba(88, 166, 255, 0.1);
      }
      .empty {
        padding: 14px;
        color: var(--fg-dim);
        font-style: italic;
      }
      .err {
        padding: 14px;
        color: var(--status-blocked);
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
      }
      .group-header {
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 10px 14px 4px;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .group-header .name { font-weight: 600; }
      .group-header .group-count { color: var(--fg-dim); }
      .row {
        display: grid;
        grid-template-columns: 130px 1fr 70px 70px;
        gap: 10px;
        padding: 4px 14px;
        align-items: baseline;
        cursor: pointer;
      }
      .row:hover { background: rgba(88, 166, 255, 0.05); }
      .row.expanded {
        background: rgba(88, 166, 255, 0.08);
        border-left: 2px solid var(--accent);
        padding-left: 12px;
      }
      .row .id { color: var(--fg-dim); }
      .row .title { color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .row .priority, .row .type { font-size: 12px; color: var(--fg-dim); text-align: right; }
      .row-detail {
        padding: 10px 14px 14px 14px;
        background: rgba(88, 166, 255, 0.03);
        border-left: 2px solid var(--accent);
        display: grid;
        gap: 10px;
        font-size: 13px;
      }
      .row-detail .meta-line {
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 11px;
        color: var(--fg-dim);
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }
      .row-detail .meta-line .label {
        color: var(--fg-dim);
        margin-right: 4px;
        text-transform: lowercase;
        letter-spacing: 0.04em;
      }
      .row-detail .meta-line .value {
        color: var(--fg);
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }
      .row-detail h4 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--fg-dim);
        margin: 4px 0 2px;
        font-weight: 500;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }
      .row-detail .description {
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--fg);
        font-size: 13px;
      }
      .row-detail pre {
        margin: 0;
        padding: 8px 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 3px;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        max-height: 300px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--fg);
      }
      .row-detail .ac-list,
      .row-detail .file-list {
        margin: 0;
        padding-left: 18px;
        font-size: 12px;
        color: var(--fg);
      }
      .row-detail .ac-list li { margin-bottom: 2px; }
      .row-detail .history-line,
      .row-detail .comment-line {
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 11px;
        color: var(--fg-dim);
        line-height: 1.5;
      }
      .row-detail .history-line .actor,
      .row-detail .comment-line .author { color: var(--fg); }
      .pill {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        text-transform: lowercase;
        background: rgba(255, 255, 255, 0.04);
      }
      .runs-row {
        display: grid;
        grid-template-columns: 100px 1fr 80px 90px;
        gap: 10px;
        padding: 4px 14px;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        align-items: baseline;
      }
      .runs-row .when { color: var(--fg-dim); }
      .runs-row .id { color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .runs-row .duration { color: var(--fg-dim); text-align: right; }
      .runs-row .state { text-align: right; }
      .scoreboard-row {
        display: grid;
        grid-template-columns: 1fr 60px 60px 60px;
        gap: 10px;
        padding: 4px 14px;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }
      .scoreboard-row.header { color: var(--fg-dim); padding-top: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
      .scoreboard-row .num { text-align: right; }
      .tabs {
        display: flex;
        gap: 2px;
        padding: 0 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }
      .tab {
        background: transparent;
        color: var(--fg-dim);
        border: none;
        padding: 10px 14px;
        cursor: pointer;
        font: inherit;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 13px;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        text-transform: lowercase;
      }
      .tab:hover { color: var(--fg); }
      .tab.active {
        color: var(--fg);
        border-bottom-color: var(--accent);
      }
      .tab-pane { display: none; }
      .tab-pane.active { display: block; }
      .scoreboard-table-wrap {
        padding: 0;
        overflow-x: auto;
      }
      table.scoreboard-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      table.scoreboard-table th,
      table.scoreboard-table td {
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      table.scoreboard-table th {
        text-align: left;
        color: var(--fg-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 500;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 11px;
        position: sticky;
        top: 0;
        background: var(--bg-elev);
      }
      table.scoreboard-table td.num,
      table.scoreboard-table th.num {
        text-align: right;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }
      table.scoreboard-table td.zero { color: var(--fg-dim); }
      table.scoreboard-table tbody tr:hover { background: rgba(88, 166, 255, 0.04); }
      table.scoreboard-table td.agent { font-weight: 500; }
      .subtabs {
        display: flex;
        gap: 2px;
        padding: 6px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-elev);
      }
      .subtab {
        background: transparent;
        color: var(--fg-dim);
        border: none;
        padding: 4px 10px;
        cursor: pointer;
        font: inherit;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        border-bottom: 2px solid transparent;
        margin-bottom: -7px;
        text-transform: lowercase;
      }
      .subtab:hover { color: var(--fg); }
      .subtab.active {
        color: var(--fg);
        border-bottom-color: var(--accent);
      }
      .exit-fail { color: var(--state-failed); font-weight: 600; }
      td.stderr {
        max-width: 600px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        color: var(--fg-dim);
      }
      footer {
        padding: 12px 20px 24px;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 11px;
        color: var(--fg-dim);
        text-align: right;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand"><span class="prompt">$</span>orbit</div>
      <div class="meta" id="meta">connecting&hellip;</div>
    </header>
    <nav class="tabs" id="tabs">
      <button class="tab" data-tab="tasks" type="button">tasks</button>
      <button class="tab" data-tab="scoreboard" type="button">scoreboard</button>
      <button class="tab" data-tab="diagnostics" type="button">diagnostics</button>
    </nav>
    <section class="tab-pane" data-tab="tasks">
      <main>
        <section class="panel" id="tasks-panel">
          <header><span>tasks</span><span class="count" id="tasks-count"></span></header>
          <div class="controls">
            <input type="search" id="task-search" placeholder="search id or title" autocomplete="off" spellcheck="false" />
            <div id="task-filter"></div>
          </div>
          <div class="body" id="tasks-body"><div class="empty">loading&hellip;</div></div>
        </section>
        <div class="col-side">
          <section class="panel" id="runs-panel">
            <header><span>recent job runs</span><span class="count" id="runs-count"></span></header>
            <div class="body" id="runs-body"><div class="empty">loading&hellip;</div></div>
          </section>
        </div>
      </main>
    </section>
    <section class="tab-pane" data-tab="scoreboard">
      <main style="grid-template-columns: 1fr;">
        <section class="panel" id="scoreboard-panel">
          <header><span>scoreboard</span><span class="count" id="scoreboard-count"></span></header>
          <div class="body scoreboard-table-wrap" id="scoreboard-body"><div class="empty">loading&hellip;</div></div>
        </section>
      </main>
    </section>
    <section class="tab-pane" data-tab="diagnostics">
      <main style="grid-template-columns: 1fr;">
        <section class="panel" id="diagnostics-panel">
          <header>
            <span id="diag-title">metrics</span>
            <span class="count" id="diag-count"></span>
          </header>
          <nav class="subtabs" id="diag-subtabs">
            <button class="subtab" data-subtab="metrics" type="button">metrics</button>
            <button class="subtab" data-subtab="friction" type="button">friction</button>
          </nav>
          <div class="body scoreboard-table-wrap" id="diag-body"><div class="empty">loading&hellip;</div></div>
        </section>
      </main>
    </section>
    <footer id="footer"></footer>
    <script src="/static/app.js"></script>
  </body>
</html>
