schemaVersion: 2
kind: Executor
metadata:
  name: legacy-gemini
spec:
  executor_type: direct_agent
  command: gemini
  args:
    - --approval-mode
    - yolo
    - -o
    - json
  stdout_format: envelope
  sandbox: macos-sandbox-exec
  models:
    strong: gemini-3.1-pro
    weak: gemini-3-flash
  env: {}
