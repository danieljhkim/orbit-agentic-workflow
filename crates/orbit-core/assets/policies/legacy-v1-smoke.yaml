schemaVersion: 1
kind: Policy
metadata:
  name: safe-local-dev
spec:
  description: Legacy v1 policy fixture preserved for schema bump smoke checks
  filesystem:
    allow_write:
      - ./
    deny_write:
      - ~/.ssh
      - ~/.aws
  process:
    allow_commands:
      - make
      - cargo
      - go
      - npm
      - git
  tools:
    allow: []
    deny: []
