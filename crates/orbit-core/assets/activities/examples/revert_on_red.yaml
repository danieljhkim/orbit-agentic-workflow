schemaVersion: 2
kind: Activity
metadata:
  name: revert_on_red
spec:
  type: deterministic
  description: >
    Retired Phase 4 stub. The dispatcher intentionally rejects this action
    instead of returning a skipped-success payload, because automatic
    revert-on-red is not a shipped Orbit behavior. Use an explicit git
    revert/manual incident task until a real deterministic revert action is
    implemented.

    Historical intent: revert a merged commit on `agent-main` when CI goes
    red for that commit and open a follow-up issue. No LLM — deterministic
    git + API actions only.
  input_schema_json:
    type: object
    required: [commit_sha, branch]
    properties:
      commit_sha:
        type: string
      branch:
        type: string
      ci_run_id:
        type: string
      reason:
        type: string
  output_schema_json:
    type: object
    required: [reverted]
    properties:
      reverted:
        type: boolean
      revert_sha:
        type: string
      follow_up_issue:
        type: string
  action: revert_on_red
  config:
    follow_up_issue_label: "incident/ci-revert"
