schemaVersion: 2
kind: Activity
metadata:
  name: agent_review_diff
spec:
  type: agent_loop
  description: >
    Reviewer step for the v2 review↔fix loop construct (§4.2). Consumes the
    current diff plus the reviewer's accumulated Session history and emits a
    structured verdict. Designed to sit inside a `loop:` body with a named
    `session: reviewer` binding so conversation state persists across
    iterations — a precondition for T20260418-0421 Option B adversarial
    independence. Phase 4 preserves that guarantee by pinning `backend: http`
    explicitly (§3.2 item 1: cross-iteration `session:` binding is HTTP-only).

    The reviewer uses a distinct provider identity from the fixer so the two
    loop bodies cannot collude on accepting each other's output.
  input_schema_json:
    type: object
    required: [diff]
    properties:
      diff:
        type: string
      branch:
        type: string
      iteration:
        type: integer
  output_schema_json:
    type: object
    required: [decision, blocking_count]
    properties:
      decision:
        type: string
        enum: [approved, changes_requested, rejected]
      blocking_count:
        type: integer
      findings:
        type: array
        items:
          type: object
  instruction: |
    You are the reviewer in an adversarial review↔fix loop. Read the diff and
    return a structured verdict. Emit `decision: approved` only when you see
    no blocking issues; otherwise emit `changes_requested` with a populated
    `findings` array and a non-zero `blocking_count`. You have access to the
    reviewer Session — use it to track findings already raised so the loop
    converges instead of rediscovering the same issues each iteration.
  tools:
    - fs.read
    - orbit.audit.loop.*
  on_denial: terminate
  max_iterations: 1
  role: reviewer
  backend: http
  provider: claude
  wall_clock_timeout_seconds: 300
