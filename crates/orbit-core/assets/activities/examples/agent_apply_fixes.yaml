schemaVersion: 2
kind: Activity
metadata:
  name: agent_apply_fixes
spec:
  type: agent_loop
  description: >
    Fixer step for the v2 review↔fix loop construct (§4.2). Consumes the
    reviewer's findings plus the current diff and applies changes that address
    the blocking items. Unlike the reviewer, the fixer does NOT bind a
    `session:` — each iteration should approach the findings fresh so the
    loop converges toward a clean diff rather than a stylistic stalemate.
    Without `session:`, §3.2 item 1 does not pin the backend; `backend: auto`
    is permitted and typically resolves to `cli` for cost in local dev and
    `http` in CI.
  input_schema_json:
    type: object
    required: [findings, branch]
    properties:
      findings:
        type: array
        items:
          type: object
      branch:
        type: string
      iteration:
        type: integer
  output_schema_json:
    type: object
    required: [commits_applied]
    properties:
      commits_applied:
        type: integer
      summary:
        type: string
  instruction: |
    Apply the fixes the reviewer requested. Group related changes into a
    single commit with a `fix:` prefix. Do not expand scope beyond the
    findings you were given — out-of-scope changes are noise that stretches
    the loop.
  tools:
    - fs.read
    - proc.spawn
  on_denial: terminate
  max_iterations: 3
  role: implementer
  backend: auto
  provider: claude
  wall_clock_timeout_seconds: 600
