schemaVersion: 2
kind: Activity
metadata:
  name: git_commit
spec:
  type: deterministic
  description: Commit pending shared worktree changes on the active task branch.
  input_schema_json:
    type: object
    properties:
      job_run_id:
        type: string
      completed_task_ids:
        type: array
        items:
          type: string
      scope:
        type: string
        enum: [all, per_task, per_task_finalize]
      workspace_path:
        type: string
  output_schema_json:
    type: object
    properties:
      committed_task_ids:
        type: array
        items:
          type: string
      skipped_task_ids:
        type: array
        items:
          type: string
      committed_files:
        type: array
        items:
          type: string
  action: git_commit
  config: {}
