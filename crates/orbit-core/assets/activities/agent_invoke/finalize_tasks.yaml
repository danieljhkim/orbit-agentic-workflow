schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: finalize_tasks
  spec_type: agent_invoke

  # ---- content ----
  description: Review a completed parallel batch, make any needed follow-up fixes, and run build or test verification across the batch.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are finalizing a completed parallel task batch before serial PR and review steps begin.

    Steps:
    1. Handle the empty-batch case:
       - Call orbit.task.list with batch_id set to input.run_id. If the list is empty,
         exit immediately.

    2. Load task context:
       - For each task returned from the batch query, call orbit.task.show and read:
         title, description, acceptance_criteria, execution_summary, context_files, workspace_path, and repo_root.
       - All tasks share the same workspace_path (the per-run shared worktree on a branch named `orbit/parallel-batch-<run_id>`).

    3. Review the batch as a whole:
       - Review that the tasks are completed.
       - Inspect the combined diff in the shared worktree (on the per-run `orbit/parallel-batch-<run_id>` branch).
       - Look for integration issues, stale assumptions, duplicated fixes, or places where one task now needs a small follow-up because of another task in the same batch.
       - You may revise code directly in the shared worktree needed to meet the acceptance criteria of the tasks.

    4. Pre-review (Arendt Mode):
       - Perform a rigorous semantic audit of each task's changes. Adopt a "rejection-first" mindset: actively look for reasons why the task should NOT be considered complete.
       - Check for "agent-isms": stale file paths (e.g., from renames), temporary debug code, commented-out logic, or leaking mock configurations.
       - Audit the `execution_summary` for every task: it must be a high-signal, concise technical rationale (no conversational filler).
       - Ensure the changes strictly align with the task's intent and architectural direction.
       - If a task fails this pre-review, fix the underlying issues in the codebase and update the task's execution_summary accordingly.

    5. Run verification:
       - In this activity you ARE allowed to run build, test, lint, or validation commands with proc.spawn.
       - Choose the smallest commands that give real confidence for the batch.
       - If verification reveals a fixable issue, fix it before continuing.

    6. Keep task records current:
       - If you materially change a task during this finalization pass, update that task
         execution_summary with orbit.task.update so the task record reflects the final
         state before commit and PR creation.
       - Example: orbit.task.update with input:
         {"id": "<task_id>", "execution_summary": "Fixed integration issue between batch tasks during finalization."}

  # ---- interface ----
  input_schema_json:
    type: object
    properties:
      run_id:
        type: string
        description: Job run ID, used as batch_id to query tasks belonging to this batch.
      base:
        type: string
      parallelism:
        type: integer
        minimum: 1
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-track-issues
    - orbit-execute-task
    - orbit-graph
  tools:
    - orbit.task.list
    - orbit.task.show
    - orbit.task.update
    - orbit.task.add
    - orbit.graph.pack
    - orbit.graph.search
    - orbit.graph.show
    - orbit.graph.overview
    - orbit.graph.refs
    - fs.write
    - fs.delete
    - proc.spawn
    - proc.which
  proc_allowed_programs:
    - cargo
    - make
    - npm
    - npx
    - node
    - sh
    - bash
    - git
    - orbit
