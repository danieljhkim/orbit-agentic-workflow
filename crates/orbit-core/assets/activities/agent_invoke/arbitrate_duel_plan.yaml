schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: arbitrate_duel_plan
  spec_type: agent_invoke

  # ---- content ----
  description: Choose the better of two read-only planning proposals for a single task and return the winning plan.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are the ARBITER in an Orbit planning duel. Your job is to compare the
    two submitted plans, choose the better one, and return the normalized winner.

    Steps:
    1. Load the task:
       - Call orbit.task.show with input: {"id": "<task_id>"} to fetch the task title,
         description, plan, acceptance_criteria, and context_files.

    2. Inspect the two proposals:
       - Compare planner_a_proposal and planner_b_proposal from the current input.
       - Use planner_a_summary and planner_b_summary when present.
       - Treat both proposals as read-only inputs. Do not invent a third plan.

    3. Use the graph surface to verify claims:
       - Prefer orbit.graph.overview, orbit.graph.search, orbit.graph.refs, orbit.graph.show,
         and orbit.graph.pack for spot checks against the codebase.
       - Fall back to fs.read only when the graph does not have enough knowledge.

    4. Decide the winner:
       - Choose the proposal that is more feasible, complete, scoped, and aligned
         with the current codebase.
       - Use the provided `planner_a_*` / `planner_b_*` identity fields to copy
         the winning planner's agent family and model into the output.
       - Return the winning plan as a normalized markdown string, not a verbatim copy
         with obvious defects.

    5. Stay read-only:
       - Do not edit files, update tasks, or open PRs.

    6. Return JSON with:
       - winner_role: "planner_a" or "planner_b"
       - winner_agent_cli: the winning planner's agent CLI family
       - winner_model: the winning planner's model
       - winning_plan: normalized markdown for the chosen proposal
       - arbiter_rationale: short explanation of the choice

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
      - planner_a_proposal
      - planner_b_proposal
    properties:
      task_id:
        type: string
        description: Orbit task ID being arbitrated.
      planner_a_proposal:
        type: string
      planner_b_proposal:
        type: string
      planner_a_summary:
        type: string
      planner_b_summary:
        type: string
      planner_a_agent_cli:
        type: string
      planner_a_model:
        type: string
      planner_b_agent_cli:
        type: string
      planner_b_model:
        type: string
      arbiter_agent_cli:
        type: string
      arbiter_model:
        type: string
  output_schema_json:
    type: object
    required:
      - winner_role
      - winner_agent_cli
      - winner_model
      - winning_plan
      - arbiter_rationale
    properties:
      winner_role:
        type: string
        enum:
          - planner_a
          - planner_b
      winner_agent_cli:
        type: string
      winner_model:
        type: string
      winning_plan:
        type: string
      arbiter_rationale:
        type: string

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-graph
  tools:
    - orbit.task.show
    - orbit.graph.pack
    - orbit.graph.search
    - orbit.graph.show
    - orbit.graph.overview
    - orbit.graph.refs
    - fs.read
