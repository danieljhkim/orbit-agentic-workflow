schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: dispatch_and_plan_batch
  spec_type: agent_invoke

  # ---- content ----
  description: Select a conflict-free batch of backlog tasks, or honor explicit input.task_ids, then fan out plan authorship to parallel subagents and refine context_files for parallel execution.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.

    Phase 1 — Load and batch

    1. Load tasks.
       - If input.task_ids is present: call orbit.task.show for each id.
         Do not call orbit.task.list. Do not add extra tasks.
       - If input.task_ids is absent: call orbit.task.list with
         status: "backlog". If the list is empty, exit immediately.

    2. Select a batch. Hard constraints (violating any of these is a fatal error):
       - If input.task_ids is present, the batch must contain exactly those
         tasks. If the count exceeds input.parallelism, return an error.
       - Every task must be in backlog status. If any is not, return an error.
       - No two tasks may share a context_files path (exact match or prefix).
       - Batch size must not exceed input.parallelism.

       Preferences (use judgment):
       - Prefer single-task batches for complex tasks (wide context_files,
         many acceptance criteria, cross-cutting changes). Batch only small,
         focused, independent tasks. When in doubt, prefer one task.
       - Prefer tasks that belong together: same area, parent, or initiative.
         Do not group unrelated tasks to fill the batch.
       - A one-task batch is always valid.

    3. Tag the batch. For each task, call orbit.task.update with:
       - id: the task id
       - batch_id: input.run_id
       - comment: "Batch dispatched: <one sentence rationale>"

    Phase 2 — Plan

    4. Partition the batch by checking each task's plan field:
       - needs_plan: empty, blank, or placeholder (e.g. "To be authored by
         executing agent at start time.")
       - has_plan: substantive existing plan

    5. Fan out subagents. In a SINGLE message, emit one parallel subagent
       call per task.

       For needs_plan tasks, the prompt must include:
         - task id, title, description, acceptance_criteria, context_files
         - Instruction: read the referenced files, understand the code,
           produce a structured markdown report. Do NOT modify any files.
         - Output contract: ## Plan, ## Context Files, ## Risks (see step 6)

       For has_plan tasks, the prompt must include:
         - task id, title, description, acceptance_criteria, existing plan
         - Instruction: read the codebase, refine context_files based on
           the existing plan. Do NOT rewrite the plan.
         - Output contract: ## Context Files, ## Risks only

       If a subagent fails or returns malformed output, retry once. If it
       fails again, remove that task from the batch and continue with the rest.

    6. Subagent output contract.

       needs_plan tasks — return markdown with exactly:
       - ## Plan — implementation-ready, with concrete file paths, function
         names, and validation steps.
       - ## Context Files — exact file paths (not directories), one per line.
       - ## Risks — short list of risks, unknowns, or assumptions.

       has_plan tasks — return markdown with:
       - ## Context Files — refined file paths based on the existing plan.
       - ## Risks — short list of risks, unknowns, or assumptions.

    7. Conflict re-check. Before persisting, verify the refined context_files
       across the batch are still disjoint (path-prefix rule from step 2).
       If a subagent widened context_files and introduced overlap, reassign
       the overlapping file to the task that needs it most and note the
       decision in that task's comment.

    8. Persist. For each task, call orbit.task.update:

       needs_plan tasks:
       - plan: the ## Plan markdown
       - context_files: the parsed ## Context Files list
       - comment: "Plan authored by subagent; context_files refined."

       has_plan tasks:
       - context_files: the parsed ## Context Files list
       - comment: "Existing plan preserved; context_files refined."

  # ---- interface ----
  input_schema_json:
    type: object
    properties:
      run_id:
        type: string
        description: Job run ID, used as batch_id when tagging selected tasks.
      base:
        type: string
        description: Shared pipeline base branch input.
      parallelism:
        type: integer
        minimum: 1
        description: Maximum number of tasks to include in the batch.
      task_ids:
        type: array
        minItems: 1
        items:
          type: string
        description: Explicit task IDs to load instead of auto-selecting from backlog.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-track-issues
  tools:
    - orbit.task.list
    - orbit.task.show
    - orbit.task.update
    - orbit.task.add
