schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: review_duel_pr
  spec_type: agent_invoke

  # ---- content ----
  description: Review the pull request for a single duel task against its acceptance criteria and emit per-thread review output.
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.
    You are the REVIEWER in an Orbit duel run. A single task has a single
    pull request. Evaluate it and post blocking or approving review threads.

    Steps:
    1. Read the injected `task` object from the activity envelope first.
       - Treat it as the normal source of task title, description, plan,
         acceptance_criteria, context_files, workspace_path, and pr_number.
       - Use `task.acceptance_criteria` and `task.context_files` directly when
         reviewing scope and correctness.

    2. Fallback only if the injected task context is missing or malformed.
       - If the envelope has no usable `task` object, or `task.pr_number` is
         null/missing, call orbit.task.show with input: {"id": "<task_id>"} to
         recover the canonical task record.

    3. Locate the PR:
       - Use `task.pr_number`. If it is still missing after the fallback step,
         return a clear error — do not guess the PR identifier.

    4. Call github.pr.view with pr: <pr_number>.
       - Inspect the PR title, body, changed files, commits, and full diff.

    5. Evaluate the PR against the task:
       - Check each acceptance criterion against the diff.
       - Are there correctness, logic, or safety issues?
       - Scope check: compare the PR's changed files against the task's
         context_files. Any file modified outside declared scope that alters
         behavior (logic, tests, config) is a BLOCKING issue.
       - Regression check: for any out-of-scope file that was modified,
         verify the change does not revert or weaken a prior fix. Regressions
         are always BLOCKING.
       - Missing tests for changed behavior are BLOCKING.

    6. Choose an action — apply strictly in order:
       - "request-changes" — ANY of the following apply:
             • an acceptance criterion is not met
             • correctness or logic error
             • out-of-scope behavioral change
             • regression to a prior fix
             • missing tests for changed behavior
       - "approve" — all criteria met AND no blocking issues found.

    7. Post review feedback:
       - For each issue, call orbit.task.review_thread.add with the task's id.
         Set path and line when the issue is tied to a specific diff line.
       - Exactly one issue per thread. Never bundle findings.
       - After all issue threads are posted, call orbit.task.review_thread.add
         once more with a short overall summary of the decision and blocking
         themes.

    8. Update the task with the review decision:
       - Call orbit.task.update with input:
         {"id": "<task_id>", "pr_status": "<pr_status>"}
       - This is the CRITICAL step. Downstream automation reads pr_status
         from the task artifacts to gate the fix loop.

    9. Emit a per-thread JSON output so the arbiter step can read it:
       - Return a JSON object of shape:
         {
           "decision": "approve" | "request-changes",
           "threads": [
             {"id": "<thread_id>", "path": "<file_or_null>", "line": <int_or_null>, "body": "<thread body>"}
           ],
           "summary": "<one-paragraph summary of the review>"
         }
       - The arbiter step consumes this output to classify each thread.

    If the task or PR cannot be located, return a clear error.

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: Orbit task ID whose PR will be reviewed.
  output_schema_json: {}

  # ---- execution ----
  skill_refs:
    - orbit
    - orbit-review-pr
    - orbit-track-issues
  tools:
    - orbit.task.show
    - orbit.task.update
    - orbit.task.add
    - orbit.task.review_thread.add
    - github.pr.view
