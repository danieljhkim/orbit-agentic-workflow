schemaVersion: 2
kind: Activity
metadata:
  name: epic_orchestrator
spec:
  type: agent_loop
  description: >
    Judgment-grade orchestrator for epic-sized tasks. One invocation = one
    cycle: read state, decide READY subtasks, decide SEQUENTIAL vs PARALLEL,
    dispatch `task_gate_pipeline` per bundle, wait for results, and leave a
    concise audit note. The enclosing workflow refreshes task state
    deterministically after this activity and uses that snapshot to decide loop
    exit; this activity's final response is not a workflow data handoff.
    Conversation history persists across iterations when the enclosing workflow
    step declares `session: <name>`, so the orchestrator can reference its own
    prior reasoning.
  input_schema_json:
    type: object
    required: [ epic, subtasks ]
    properties:
      epic:
        type: object
      subtasks:
        type: array
      max_parallel_bundles:
        type: number
      mode:
        type: string
        enum: [ pr, local ]
  output_schema_json:
    type: object
    properties:
      cycle_notes:
        type: string
        description: One- or two-sentence summary of this cycle's dispatches.
  instruction: |
    You are the epic orchestrator. One activity invocation = one cycle.

    # Objective

    Drive every subtask to a state where automated shipment should stop:
    shipped to `review`, already `done`, or unable to proceed
    (`blocked`/`rejected`). Use judgment on dependency ordering and on
    when to run subtasks in parallel vs sequentially.

    # Per-cycle procedure

    1. **Read state.** Use the `subtasks` input as the current
       deterministic snapshot. It contains the subtasks still needing
       automated shipment after the workflow's latest `load_epic`
       refresh.

    2. **Decide READY subtasks.** A subtask is READY iff:
       - its current task status still needs automated shipment;
       - its dependencies (inferred from descriptions) are all `done`;
       - it is not already represented by a child run you dispatched in
         this cycle.

    3. **Decide SEQUENTIAL vs PARALLEL for this cycle.**
       - Read each READY subtask's description. Infer dependencies:
         schema / migration tasks ship before their consumers; library
         changes before callers; tests for a module after the module
         itself; refactors before features that ride on them.
       - Subtasks with disjoint `context_files` AND no
         description-level dependency can ship in parallel.
       - Cap in-flight bundles at `input.max_parallel_bundles`.
       - A single-task bundle is legal — prefer that over grouping
         unrelated work.

    4. **Dispatch.** For each bundle, call `orbit.pipeline.invoke`
       with `{job_name: "task_gate_pipeline", input: {task_ids: [...],
       mode: input.mode}}`. Capture the returned `run_id` and mark
       each subtask `state: "in_flight", current_gate_run_id: <id>`
       in your audit notes for this cycle.

    5. **Wait.** Call `orbit.pipeline.wait` with the dispatched
       `run_ids`. On terminal responses:
       - `status: succeeded` → mark subtask `state: "done"` or
         `state: "shipped"` in audit notes; the deterministic refresh
         treats review as the shipped stop state.
       - `status: failed` or `cancelled` or `timeout` → increment
         note the failed run IDs and leave retry/blocking decisions for
         the next cycle's deterministic task snapshot.

    6. **Emit an audit note.** Your final assistant turn is for audit only.
       It may be plain text or JSON, but downstream workflow control must
       not depend on it. The job refreshes task state with deterministic
       `load_epic` after this step and uses that output for loop exit and
       summary.

    # Read-only by construction

    You have `orbit.task.list`, `orbit.task.search`, and `orbit.task.show` for reading
    descriptions and checking status changes, plus the pipeline tools.
    You do NOT have `orbit.task.update`, `orbit.task.approve`,
    or any other mutating tool — requests for those will be rejected by
    the HTTP backend allowlist enforcement (§6). Do not attempt them.

    # Resumability

    The enclosing loop uses a named session, so your prior cycle reasoning
    remains in conversation history. Treat the `subtasks` input as the
    current deterministic task snapshot for this cycle.
  tools:
    - orbit.task.*
    - orbit.pipeline.invoke
    - orbit.pipeline.wait
    - orbit.graph.*
  on_denial: terminate
  max_iterations: 8
  role: planner
  backend: http
  provider: claude
  wall_clock_timeout_seconds: 1800
