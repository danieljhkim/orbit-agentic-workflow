schemaVersion: 2
kind: Activity
metadata:
  name: worktree_setup
spec:
  type: deterministic
  description: >
    Create a worktree and branch for one task or a task bundle, stamp the task
    records with batch/workspace metadata, and move them to `in-progress`.
  input_schema_json:
    type: object
    properties:
      task_id:
        type: string
      task_ids:
        type: array
        minItems: 1
        items:
          type: string
      run_id:
        type: string
      base:
        type: string
      base_branch:
        type: string
      base_sync:
        type: string
        enum: [remote, local]
      branch_prefix:
        type: string
  output_schema_json:
    type: object
    properties:
      batch_id:
        type: string
      workspace_path:
        type: string
      head_ref:
        type: string
      base_ref:
        type: string
  action: worktree_setup
  config: {}
