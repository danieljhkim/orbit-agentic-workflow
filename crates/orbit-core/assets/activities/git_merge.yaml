schemaVersion: 2
kind: Activity
metadata:
  name: git_merge
spec:
  type: deterministic
  description: >
    Merge a worktree branch either by fast-forwarding into the base branch or by
    merging the associated GitHub pull request.
  input_schema_json:
    type: object
    properties:
      batch_id:
        type: string
      task_id:
        type: string
      task_ids:
        type: array
        items:
          type: string
      completed_task_ids:
        type: array
        items:
          type: string
      strategy:
        type: string
        enum: [fast_forward, pr_merge]
      base:
        type: string
      workspace_path:
        type: string
  output_schema_json:
    type: object
    properties:
      merged:
        type: boolean
  action: git_merge
  config: {}
