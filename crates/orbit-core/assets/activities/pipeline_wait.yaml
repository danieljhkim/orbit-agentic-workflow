schemaVersion: 2
kind: Activity
metadata:
  name: pipeline_wait
spec:
  type: deterministic
  description: >
    Block until one or more submitted pipeline Runs reach a terminal state, or
    until the wait budget expires. Thin deterministic wrapper around
    `orbit.pipeline.wait` for workflows that dispatch child runs in one step
    and join them later without keeping an agent session open.
  input_schema_json:
    type: object
    required: [run_ids]
    properties:
      run_ids:
        type: array
        items:
          type: string
      timeout_seconds:
        type: number
        minimum: 1
        maximum: 7200
      poll_interval_seconds:
        type: number
        minimum: 1
  output_schema_json:
    type: object
    required: [results]
    properties:
      results:
        type: array
        items:
          type: object
          required: [run_id, status]
          properties:
            run_id:
              type: string
            status:
              type: string
              enum: [succeeded, failed, cancelled, timeout, pending, running]
            finished_at:
              type: string
            pipeline:
              type: object
            error:
              type: string
  action: pipeline_wait
  config: {}
