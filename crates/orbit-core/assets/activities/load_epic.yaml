schemaVersion: 2
kind: Activity
metadata:
  name: load_epic
spec:
  type: deterministic
  description: >
    Materialize the working set for `epic_orchestrator`: the epic task
    itself plus all non-terminal subtasks (reverse-parent lookup).
    Filters out Done / Archived — the orchestrator only needs to drive
    the open subset. The orchestrator reasons over task descriptions
    for dependency ordering, so titles and full descriptions ship in
    the payload.
  input_schema_json:
    type: object
    required: [epic_task_id]
    properties:
      epic_task_id:
        type: string
  output_schema_json:
    type: object
    required: [epic, subtasks]
    properties:
      epic:
        type: object
        required: [id, title, type, status]
        properties:
          id:
            type: string
          title:
            type: string
          description:
            type: string
          type:
            type: string
          status:
            type: string
      subtasks:
        type: array
        items:
          type: object
          required: [id, title, type, status]
          properties:
            id:
              type: string
            title:
              type: string
            description:
              type: string
            type:
              type: string
            status:
              type: string
            context_files:
              type: array
              items:
                type: string
  action: load_epic
  config: {}
