schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: commit_batch_changes
  spec_type: automation

  # ---- content ----
  description: "Stage and commit changes in the shared parallel worktree. Skips silently when clean."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Batch run ID (batch_id). The shared worktree path is resolved from batch tasks.
      workspace_path:
        type: string
        description: Optional explicit workspace path. If omitted, resolved from batch task metadata.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  action: commit_batch_changes
