schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: merge_batch_worktree_into_base
  spec_type: automation

  # ---- content ----
  description: "Fast-forward the requested base branch so it includes the shared batch worktree commit history."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Batch run ID (batch_id). The shared worktree branch is resolved from this run.
      workspace_path:
        type: string
        description: Optional explicit shared worktree path. Resolved automatically when omitted.
      base:
        type: string
        description: Base branch to fast-forward. Defaults to main.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  action: merge_batch_worktree_into_base
