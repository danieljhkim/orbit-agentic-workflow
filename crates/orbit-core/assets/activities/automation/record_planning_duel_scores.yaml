schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: record_planning_duel_scores
  spec_type: automation

  # ---- content ----
  description: "Append one PlanningDuelRun entry to .orbit/scoreboard/duel_plan.json using the arbiter decision, planner proposals, and previously-recorded efficiency metrics."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - job_run_id
      - task_id
      - planner_a_agent_cli
      - planner_a_model
      - planner_b_agent_cli
      - planner_b_model
      - arbiter_agent_cli
      - arbiter_model
      - planner_a_proposal
      - planner_b_proposal
      - winner_role
      - arbiter_rationale
      - roles
    properties:
      job_run_id:
        type: string
      task_id:
        type: string
      planner_a_agent_cli:
        type: string
      planner_a_model:
        type: string
      planner_b_agent_cli:
        type: string
      planner_b_model:
        type: string
      arbiter_agent_cli:
        type: string
      arbiter_model:
        type: string
      planner_a_proposal:
        type: string
      planner_b_proposal:
        type: string
      winner_role:
        type: string
        enum:
          - planner_a
          - planner_b
      arbiter_rationale:
        type: string
      roles:
        type: object
  output_schema_json:
    type: object
    required:
      - run_id
      - recorded
    properties:
      run_id:
        type: string
      recorded:
        type: boolean

  # ---- execution ----
  action: record_planning_duel_scores
