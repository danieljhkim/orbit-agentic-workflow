schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: commit_finalize_artifact_changes
  spec_type: automation

  # ---- content ----
  description: "Commit finalize-only shared-worktree edits that still map cleanly onto batch task artifacts, leaving any unmatched leftovers for the catch-all batch commit."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Batch run ID (batch_id). Used to resolve the shared worktree and the batch tasks.
      workspace_path:
        type: string
        description: Optional explicit shared worktree path. Resolved automatically when omitted.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  action: commit_finalize_artifact_changes
