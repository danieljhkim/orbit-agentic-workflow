schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: record_planning_duel_efficiency
  spec_type: automation

  # ---- content ----
  description: "Query persisted invocation traces for the two planners and the arbiter, then emit per-role efficiency metrics."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
      - run_id
      - planner_a_agent_cli
      - planner_a_model
      - planner_a_activity_id
      - planner_b_agent_cli
      - planner_b_model
      - planner_b_activity_id
      - arbiter_agent_cli
      - arbiter_model
      - arbiter_activity_id
    properties:
      task_id:
        type: string
      run_id:
        type: string
      planner_a_agent_cli:
        type: string
      planner_a_model:
        type: string
      planner_a_activity_id:
        type: string
      planner_b_agent_cli:
        type: string
      planner_b_model:
        type: string
      planner_b_activity_id:
        type: string
      arbiter_agent_cli:
        type: string
      arbiter_model:
        type: string
      arbiter_activity_id:
        type: string
  output_schema_json:
    type: object
    required:
      - task_id
      - job_run_id
      - roles
    properties:
      task_id:
        type: string
      job_run_id:
        type: string
      roles:
        type: object

  # ---- execution ----
  action: record_planning_duel_efficiency
