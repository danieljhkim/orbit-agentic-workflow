schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: select_duel_plan_roles
  spec_type: automation

  # ---- content ----
  description: "Select a random permutation of agent families across the planning duel roles (planner A, planner B, arbiter)."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: Orbit task ID whose implementation plan will be decided by the planning duel.
  output_schema_json:
    type: object
    required:
      - planner_a_agent_cli
      - planner_a_model
      - planner_b_agent_cli
      - planner_b_model
      - arbiter_agent_cli
      - arbiter_model
      - planning_duel_started_at
      - planning_duel_roles
    properties:
      planner_a_agent_cli:
        type: string
        description: Agent CLI family assigned to planner A.
      planner_a_model:
        type: string
        description: Model assigned to planner A.
      planner_b_agent_cli:
        type: string
        description: Agent CLI family assigned to planner B.
      planner_b_model:
        type: string
        description: Model assigned to planner B.
      arbiter_agent_cli:
        type: string
        description: Agent CLI family assigned to the arbiter role.
      arbiter_model:
        type: string
        description: Model assigned to the arbiter role.
      planning_duel_started_at:
        type: string
        description: RFC3339 wall-clock timestamp used later for planning-duel timing.
      planning_duel_roles:
        type: object
        description: Structured view of the three role assignments, mirroring the flat *_agent_cli / *_model fields.

  # ---- execution ----
  action: select_planning_duel_roles
