schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: cleanup_worktree
  spec_type: automation

  # ---- content ----
  description: "Best-effort cleanup for a successful Orbit worktree run. Removes the per-run worktree directory, prunes stale registrations, and deletes the local branch when it can be resolved."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Job run ID used to resolve the worktree when workspace_path is omitted.
      workspace_path:
        type: string
        description: Optional explicit worktree path. When omitted, the automation derives the path from run_id and the branch prefix.
      branch_prefix:
        type: string
        description: Optional single-task branch/worktree prefix such as duel. Used when deriving the worktree path.
  output_schema_json:
    type: object
    required:
      - cleaned_up
      - workspace_path
    properties:
      cleaned_up:
        type: boolean
        description: Always true when the best-effort cleanup step completes.
      workspace_path:
        type: string
        description: Worktree path that was targeted for cleanup.
      branch:
        type: string
        description: Deleted local branch name, when the branch could be resolved before cleanup.

  # ---- execution ----
  action: cleanup_worktree
