schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: check_batch_review_decision
  spec_type: automation

  # ---- content ----
  description: "Gate step: check that all batch tasks have approved pr_status. Succeeds if all approved, fails otherwise."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Batch run ID (batch_id). All batch tasks' review decisions are checked.
  output_schema_json:
    type: object
    properties:
      review_decision:
        type: string
        description: The normalized review decision (APPROVED).
      loop_exit:
        type: boolean
        description: "True when all tasks are approved — signals the review loop to stop."

  # ---- execution ----
  action: check_batch_review_decision
