schema_version: 1
created_by: system
activity:
  id: commit_and_open_batch_pr
  spec_type: automation
  description: "Stage and commit all changes in the shared parallel worktree, then push the branch and open a single PR for the entire batch."
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: "Job run ID, used as batch_id to query tasks belonging to this batch."
      workspace_path:
        type: string
        description: "Path to the shared worktree. Resolved automatically if omitted."
      base:
        type: string
        description: "Branch name the worktree should be on. Defaults to main."
  output_schema_json:
    type: object
    properties: {}
  action: commit_and_open_batch_pr
