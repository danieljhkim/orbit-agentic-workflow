schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: commit_task_artifact_changes
  spec_type: automation

  # ---- content ----
  description: "Create at most one commit per completed task in the shared batch worktree using stored task artifacts for scope and commit text."

  # ---- interface ----
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Batch run ID (batch_id). Used to resolve the shared worktree and the batch tasks.
      workspace_path:
        type: string
        description: Optional explicit shared worktree path. Resolved automatically when omitted.
      completed_task_ids:
        type: array
        items:
          type: string
        description: Optional ordered list of completed task IDs from `parallel_dispatch_tasks`.
  output_schema_json:
    type: object
    properties: {}

  # ---- execution ----
  action: commit_task_artifact_changes
