schema_version: 1

# ---- metadata ----
created_by: system

# ---- activity ----
activity:
  # ---- registration ----
  id: update_knowledge_graph
  spec_type: automation

  # ---- content ----
  description: "Incrementally update the knowledge graph so agents get fresh symbol data."

  # ---- interface ----
  input_schema_json:
    type: object
    properties: {}
  output_schema_json:
    type: object
    required:
      - success
    properties:
      success:
        type: boolean
      exit_code:
        type: integer
      stderr:
        type: string

  # ---- execution ----
  action: update_knowledge_graph
