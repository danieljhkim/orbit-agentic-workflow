schemaVersion: 2
kind: Activity
metadata:
  name: git_push
spec:
  type: deterministic
  description: Push the active worktree branch to the configured remote.
  input_schema_json:
    type: object
    properties:
      job_run_id:
        type: string
      workspace_path:
        type: string
      branch:
        type: string
  output_schema_json:
    type: object
    properties: {}
  action: git_push
  config: {}
