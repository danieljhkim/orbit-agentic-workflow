schemaVersion: 2
kind: Activity
metadata:
  name: list_backlog_tasks
spec:
  type: deterministic
  description: >
    Materialize the current workspace backlog as an ordered task list for
    the auto-pipeline's `dispatch_agent` grouping step. In automatic mode it
    filters to `status: backlog`, excludes `type: friction` (per CLAUDE.md,
    friction is reserved for agent self-reports, not shippable work), and
    drops any backlog parent/subtask group whose `context_files` overlap the
    active task-lock surface from `in-progress` or `review` tasks. Explicit
    `task_ids` input is treated as an override and skips conflict filtering.
    Sorts critical → high → medium → low, then by `created_at` ascending so
    older high-priority work ships first. Caps at `max_tasks` (default 50) to
    keep the agent's context window bounded.
  input_schema_json:
    type: object
    properties:
      max_tasks:
        type: number
        minimum: 1
        maximum: 500
      task_ids:
        type: array
        items:
          type: string
  output_schema_json:
    type: object
    required: [tasks, task_ids, task_count]
    properties:
      task_count:
        type: number
      task_ids:
        type: array
        items:
          type: string
      tasks:
        type: array
        items:
          type: object
          required: [id, title, type, priority, context_files]
          properties:
            id:
              type: string
            title:
              type: string
            type:
              type: string
            priority:
              type: string
            context_files:
              type: array
              items:
                type: string
            parent_id:
              oneOf:
                - type: string
                - type: "null"
  action: list_backlog_tasks
  config: {}
