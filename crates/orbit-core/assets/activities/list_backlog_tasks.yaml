schemaVersion: 2
kind: Activity
metadata:
  name: list_backlog_tasks
spec:
  type: deterministic
  description: >
    Materialize the current workspace backlog as an ordered task list for
    the auto-pipeline. In automatic mode it
    filters to `status: backlog`, excludes `type: friction` (per CLAUDE.md,
    friction is reserved for agent self-reports, not shippable work), and
    drops any backlog parent/subtask group whose `context_files` overlap the
    active task-lock surface from `in-progress` or `review` tasks. Automatic
    mode includes an `excluded` array that attributes those pre-gate lock
    exclusions; it does not report friction filtering or `max_tasks`
    truncation. Explicit `task_ids` input is treated as an override, skips
    conflict filtering, and omits `excluded`.
    Sorts critical → high → medium → low, then by `created_at` ascending so
    older high-priority work ships first. Caps at `max_tasks` (default 50) to
    keep the agent's context window bounded. Also emits conservative singleton
    `bundles` so downstream dispatch can proceed without depending on an
    agent's final response payload.
  input_schema_json:
    type: object
    properties:
      max_tasks:
        type: number
        minimum: 1
        maximum: 500
      task_ids:
        type: array
        items:
          type: string
  output_schema_json:
    type: object
    required: [tasks, task_ids, task_count, bundles]
    properties:
      task_count:
        type: number
      task_ids:
        type: array
        items:
          type: string
      bundles:
        type: array
        items:
          type: array
          items:
            type: string
      tasks:
        type: array
        items:
          type: object
          required: [id, title, type, priority, context_files]
          properties:
            id:
              type: string
            title:
              type: string
            type:
              type: string
            priority:
              type: string
            context_files:
              type: array
              items:
                type: string
            parent_id:
              oneOf:
                - type: string
                - type: "null"
      excluded:
        type: array
        items:
          type: object
          required: [id, reason, conflicts]
          properties:
            id:
              type: string
            reason:
              type: string
              enum: [context_lock_conflict, group_member_conflict]
            conflicts:
              type: array
              items:
                type: object
                required: [requested_file, locking_task_id]
                properties:
                  requested_file:
                    type: string
                  locking_task_id:
                    type: string
  action: list_backlog_tasks
  config: {}
