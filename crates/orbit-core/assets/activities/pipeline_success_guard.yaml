schemaVersion: 2
kind: Activity
metadata:
  name: pipeline_success_guard
spec:
  type: deterministic
  description: >
    Fail the current workflow when one or more child pipeline wait entries did
    not reach `status: succeeded`. Use this after any required cleanup steps
    that still need access to the raw child status.
  input_schema_json:
    type: object
    properties:
      context:
        type: string
      result:
        type: object
        properties:
          status:
            type: string
          run_id:
            type: string
          error:
            type: string
      results:
        type: array
        items:
          type: object
          properties:
            status:
              type: string
            run_id:
              type: string
            error:
              type: string
    anyOf:
      - required: [result]
      - required: [results]
  output_schema_json:
    type: object
    required: [succeeded, checked_count]
    properties:
      succeeded:
        type: boolean
        const: true
      checked_count:
        type: integer
        minimum: 1
  action: pipeline_success_guard
  config: {}
