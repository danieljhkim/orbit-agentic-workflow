schemaVersion: 2
kind: Activity
metadata:
  name: promote_agent_main
spec:
  type: deterministic
  description: >
    Promote a passing `agent-main` commit to the project's integration
    target (typically `main`). Fast-forwards the tracking branch, verifies
    required checks have passed, and records the promotion as an audit
    event. No LLM — this is a git + API surface only, so it declares no
    `backend:` field.

    Used by the T20260418-0421 pipeline as the success-path terminal step
    after per-unit PRs have been reviewed and (optionally) merged into
    `agent-main`. Failure to meet any required-check gate is a hard error,
    not a silent no-op.
  input_schema_json:
    type: object
    required: [target_branch, source_branch]
    properties:
      target_branch:
        type: string
      source_branch:
        type: string
      required_checks:
        type: array
        items:
          type: string
  output_schema_json:
    type: object
    required: [promoted]
    properties:
      promoted:
        type: boolean
      target_sha:
        type: string
      skipped_reason:
        type: string
  action: promote_agent_main
  config:
    default_required_checks:
      - ci/build
      - ci/fmt
