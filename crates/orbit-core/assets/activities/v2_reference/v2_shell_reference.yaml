schemaVersion: 2
kind: Activity
metadata:
  name: v2_shell_reference
spec:
  type: shell
  description: >
    Phase 2 reference for the shell activity type. Exercises the program
    allowlist path in orbit-engine::v2::dispatcher::run_shell — invoking
    `echo` with a literal argument. `allowed_programs` is deliberately
    narrow so the dispatcher rejects any non-`echo` program.
  input_schema_json:
    type: object
    properties: {}
  output_schema_json:
    type: object
    properties:
      program:
        type: string
      args:
        type: array
      status:
        type: string
  program: echo
  args: [hello, v2]
  allowed_programs: [echo]
  timeout_seconds: 10
  expected_exit_codes: [0]
