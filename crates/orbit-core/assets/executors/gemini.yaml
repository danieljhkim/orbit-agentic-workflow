schemaVersion: 2
kind: Executor
metadata:
  name: gemini
spec:
  executor_type: direct_agent
  command: gemini
  args:
    - --approval-mode
    - yolo
    - --sandbox
    - --allowed-mcp-server-names
    - orbit
    - -o
    - json
  stdout_format: envelope
  models:
    strong: gemini-3.1-pro
    weak: gemini-3-flash
  env: {}
