schemaVersion: 2
kind: Executor
metadata:
  name: claude
spec:
  executor_type: direct_agent
  command: claude
  args:
    - -p
    - --permission-mode
    - bypassPermissions
    - --output-format
    - json
    # The dispatcher rewrites this to <claude_state_dir>/<basename> at spawn
    # time so the log lands at a sandbox-allowed path (see T20260505-22).
    - --fallback-model
    - claude-sonnet-4-6
    - --tools
    - default
  stdout_format: envelope
  sandbox: macos-sandbox-exec
  models:
    strong: claude-opus-4-7
    weak: claude-sonnet-4-6
  env: {}
