schemaVersion: 2
kind: Executor
metadata:
  name: claude
spec:
  executor_type: direct_agent
  command: claude
  args:
    - -p
    - --permission-mode
    - bypassPermissions
    - --output-format
    - json
    - --debug-file
    - .orbit/state/logs/claude-debug.log
    - --fallback-model
    - claude-sonnet-4-6
    - --tools
    - Read,Write,Edit,Grep,Glob,Bash,TodoWrite,Agent
  stdout_format: envelope
  models:
    strong: claude-opus-4-7
    weak: claude-sonnet-4-6
  env: {}
