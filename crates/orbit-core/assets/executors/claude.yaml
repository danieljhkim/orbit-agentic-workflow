schemaVersion: 2
kind: Executor
metadata:
  name: claude
spec:
  executor_type: direct_agent
  command: claude
  args:
    - -p
    - --permission-mode
    - bypassPermissions
    - --output-format
    - json
    - --tools
    - default
  stdout_format: envelope
  sandbox: macos-sandbox-exec
  models:
    strong: claude-opus-4-7
    weak: claude-sonnet-4-6
  env: {}
