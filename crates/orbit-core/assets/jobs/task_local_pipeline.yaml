# Task bundle local pipeline.
#
# Failure semantics:
# - `implement_bundle` runs one task at a time in the shared worktree.
# - If `implement_one` fails, pending changes remain in the shared worktree for inspection.
# - If all implementations succeed, `commit` snapshots the bundle branch before merge.
# - Tasks move to `review` only after the full bundle commits and merges cleanly.
#
# Optional review step:
# - `review_bundle` runs after `implement_bundle` when `input.review` is
#   `true` (default `false`). It invokes `agent_review`, which records
#   blocking findings as `ReviewThread`s on the participating tasks via
#   `orbit.task.review_thread.*` and applies fixes in-place. The pipeline
#   does not gate on agent output; unresolved threads remain on the tasks
#   for downstream visibility.

schemaVersion: 2
kind: Job
metadata:
  name: task_local_pipeline
spec:
  state: enabled
  kind: workflow
  max_active_runs: 10
  default_input:
    task_ids: []
    auto_push: false
    base_branch: main
    base_sync: remote
    review: false
  
  steps:
    - id: worktree
      target: activity:worktree_setup
      retry:
        max_attempts: 4
        initial_backoff_ms: 200
        backoff_cap_ms: 2000
        backoff_strategy: exponential
      default_input:
        task_ids: "{{ input.task_ids }}"
        base: "{{ input.base_branch }}"
        base_sync: "{{ input.base_sync }}"

    - id: implement_bundle
      loop:
        items: "{{ input.task_ids }}"
        max_iterations: 256
        steps:
          - id: implement_one
            recovery_activity: step_failure_recovery
            target: activity:agent_implement
            default_input:
              task_id: "{{ item }}"
              workspace_path: "{{ steps.worktree.output.workspace_path }}"

    - id: review_bundle
      when: "{{ input.review }} == true"
      recovery_activity: step_failure_recovery
      target: activity:agent_review
      default_input:
        task_ids: "{{ input.task_ids }}"
        workspace_path: "{{ steps.worktree.output.workspace_path }}"
        base_branch: "{{ input.base_branch }}"

    - id: commit
      recovery_activity: step_failure_recovery
      target: activity:git_commit
      default_input:
        job_run_id: "{{ steps.worktree.output.job_run_id }}"
        scope: all
        workspace_path: "{{ steps.worktree.output.workspace_path }}"

    - id: merge
      recovery_activity: step_failure_recovery
      target: activity:git_merge
      default_input:
        job_run_id: "{{ steps.worktree.output.job_run_id }}"
        base: "{{ input.base_branch }}"
        base_sync: "{{ input.base_sync }}"
        strategy: fast_forward
        workspace_path: "{{ steps.worktree.output.workspace_path }}"

    - id: mark_review
      loop:
        items: "{{ input.task_ids }}"
        max_iterations: 256
        steps:
          - id: mark_review_one
            target: activity:update_task
            default_input:
              task_id: "{{ item }}"
              status: review

    - id: push
      when: "{{ input.auto_push }} == true"
      recovery_activity: step_failure_recovery
      target: activity:git_push
      default_input:
        workspace_path: "{{ steps.worktree.output.workspace_path }}"
        branch: "{{ input.base_branch }}"
