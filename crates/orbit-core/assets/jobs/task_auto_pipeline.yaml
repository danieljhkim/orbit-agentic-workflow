# Auto-dispatch pipeline.
#
# Pulls the workspace backlog and dispatches deterministic singleton bundles
# from `list_backlog`. `list_backlog` pre-filters backlog groups that already
# overlap active task locks, so the gate layer sees fewer predictable
# starvation cases.
#
# Empty-backlog behavior
# - `list_backlog` returns `tasks: []` and `bundles: []`. The fan_out over an
#   empty list is a no-op and the Run succeeds with zero child Runs.
#
# Concurrency cap (AC 7)
# - `fan_out.max_workers` bounds the number of in-flight child gate
#   Runs via a `Semaphore` in `run_fan_out` (orbit-engine). The value
#   is a literal `u32` in the v2 `FanOutBlock` schema — it is NOT a
#   templated expression, so the `input.concurrency` default is a
#   structural placeholder callers can override by forking this YAML.
#   A future amendment to `FanOutBlock` to accept templated numerics
#   would let the top-level `concurrency` input flow through.

schemaVersion: 2
kind: Job
metadata:
  name: task_auto_pipeline
spec:
  state: enabled
  kind: workflow
  max_active_runs: 10
  default_input:
    task_ids: []
    mode: pr
    base_branch: agent-main
    max_bundles: 10
    concurrency: 3
    max_bundle_size: 5
    max_tasks: 50

  steps:
    - id: list_backlog
      target: activity:list_backlog_tasks
      default_input:
        max_tasks: "{{ input.max_tasks }}"
        task_ids: "{{ input.task_ids }}"

    - id: validate_bundles
      target: activity:validate_bundles
      default_input:
        bundles: "{{ steps.list_backlog.output.bundles }}"
        max_bundle_size: "{{ input.max_bundle_size }}"
        known_task_ids: "{{ steps.list_backlog.output.task_ids }}"

    - id: dispatch
      fan_out:
        items: "{{ steps.validate_bundles.output.bundles }}"
        max_workers: 3
        worker:
          id: gate_invoke
          target: activity:invoke_and_wait
          default_input:
            job_name: task_gate_pipeline
            run_input:
              task_ids: "{{ item }}"
              mode: "{{ input.mode }}"
              base_branch: "{{ input.base_branch }}"
      fan_in:
        join:
          mode: all
        collect: gate_results
