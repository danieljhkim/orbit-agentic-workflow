# Task bundle local pipeline.
#
# Mid-bundle failure semantics:
# - `implement_bundle` runs one task at a time in the shared worktree.
# - If `implement_one` fails, earlier commits remain on the bundle branch.
# - Tasks move to `review` only after the full bundle merges cleanly.

schemaVersion: 2
kind: Job
metadata:
  name: task_local_pipeline
spec:
  state: enabled
  kind: workflow
  max_active_runs: 10
  default_input:
    task_ids: []
    auto_push: false
    base_branch: agent-main
  
  steps:
    - id: worktree
      target: activity:worktree_setup
      default_input:
        task_ids: "{{ input.task_ids }}"
        base: "{{ input.base_branch }}"

    - id: implement_bundle
      loop:
        items: "{{ input.task_ids }}"
        max_iterations: 256
        steps:
          - id: implement_one
            target: activity:agent_implement
            default_input:
              task_id: "{{ item }}"
              workspace_path: "{{ steps.worktree.output.workspace_path }}"

    - id: merge
      target: activity:git_merge
      default_input:
        batch_id: "{{ steps.worktree.output.batch_id }}"
        base: "{{ input.base_branch }}"
        strategy: fast_forward
        workspace_path: "{{ steps.worktree.output.workspace_path }}"

    - id: mark_review
      loop:
        items: "{{ input.task_ids }}"
        max_iterations: 256
        steps:
          - id: mark_review_one
            target: activity:update_task
            default_input:
              task_id: "{{ item }}"
              status: review

    - id: push
      when: "{{ input.auto_push == true }}"
      target: activity:git_push
      default_input:
        workspace_path: "{{ steps.worktree.output.workspace_path }}"
        branch: "{{ input.base_branch }}"
