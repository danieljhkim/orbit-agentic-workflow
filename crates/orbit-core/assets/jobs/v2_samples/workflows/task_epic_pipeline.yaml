# Task epic pipeline.
#
# Orchestrator-driven shipment for epic-sized tasks. Use ONLY when the
# epic has multiple subtasks whose ordering (sequential vs parallel)
# requires judgment on task descriptions. For simple bundles, invoke
# `task_gate_pipeline` or `task_auto_pipeline` directly — the epic
# pipeline's orchestrator is premium HTTP and pays for itself only
# across multi-cycle shipments.
#
# Cycle semantics
# - `orchestrate_loop` wraps the `epic_orchestrator` activity. Each
#   iteration is one cycle: read state, decide READY, dispatch bundles,
#   wait, persist.
# - The inner step declares `session: epic_session`, so the agent's
#   conversation history persists across iterations (executor session
#   map, job_v2.rs TargetStep.session). The orchestrator can therefore
#   reference its own prior reasoning.
# - `break_when: "{{ steps.orchestrator_iter.output.all_terminal }} == true"`
#   keys off the flag the agent emits in its final JSON turn each cycle.
# - `max_iterations: 20` is the structural ceiling on cycles — a
#   literal because `LoopBlock.max_iterations` is `u32` (not templated).
#   Callers who need a different ceiling must fork this YAML.
#
# Output
# - `orchestrator_iter.output.final_state` persists the last iteration's
#   snapshot (loop semantics: last write wins on shared pipeline Arc),
#   which the `summarize` step folds into pipeline-level counters.
#
# Auditability (AC 9, 11)
# - Per-iteration agent prompt, response, and tool-call envelope are
#   recoverable via the v2 HTTP audit plumbing (ActivityStarted /
#   ActivityFinished + loop-engine http.* / tool.call.* events linked
#   by `parent_event_id`).
# - Allowlist denials land as `V2AuditEventKind::ToolDenied` envelope
#   events when the agent requests a tool outside the declared set.

schemaVersion: 2
kind: Job
metadata:
  name: task_epic_pipeline
spec:
  state: enabled
  kind: workflow
  max_active_runs: 5
  default_input:
    max_cycles: 20
    max_parallel_bundles: 3
    mode: pr

  steps:
    - id: load_epic
      target: activity:load_epic
      default_input:
        epic_task_id: "{{ input.epic_task_id }}"

    - id: orchestrate_loop
      loop:
        max_iterations: 20
        break_when: "{{ steps.orchestrator_iter.output.all_terminal }} == true"
        steps:
          - id: orchestrator_iter
            session: epic_session
            target: activity:epic_orchestrator
            default_input:
              epic: "{{ steps.load_epic.output.epic }}"
              subtasks: "{{ steps.load_epic.output.subtasks }}"
              max_parallel_bundles: "{{ input.max_parallel_bundles }}"
              mode: "{{ input.mode }}"

    - id: summarize
      target: activity:summarize_epic
      default_input:
        state: "{{ steps.orchestrator_iter.output.final_state }}"
