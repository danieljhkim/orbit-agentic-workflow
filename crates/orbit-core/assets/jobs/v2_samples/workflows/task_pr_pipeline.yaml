# Task(s) PR pipeline with full review-fix loop

schemaVersion: 2
kind: Job
metadata:
  name: task_pipeline
spec:
  state: enabled
  kind: workflow
  max_active_runs: 10
  default_input:
    auto_merge: false
    base_branch: agent-main
  
  steps:
    - id: worktree
      target: activity:worktree_setup
      default_input:
        task_id: "{{ input.task_id }}"
        base_branch: "{{ input.base_branch }}"

    - id: implement
      target: activity:agent_implement
      default_input:
        task_id: "{{ input.task_id }}"
        branch: "{{ steps.worktree.output.branch }}"

    - id: review_fix
      loop:
        max_iterations: 5
        break_when: "{{ steps.review.output.decision == 'approved' }}"
        steps:
          - id: review
            target: activity:agent_review_diff
            session: reviewer
            default_input:
              diff: "{{ steps.implement.output.diff }}"
              branch: "{{ steps.worktree.output.branch }}"
              iteration: "{{ iteration }}"

          - id: fix
            when: "{{ steps.review.output.blocking_count > 0 }}"
            target: activity:agent_apply_fixes
            default_input:
              findings: "{{ steps.review.output.findings }}"
              branch: "{{ steps.worktree.output.branch }}"
              iteration: "{{ iteration }}"

    - id: push
      target: activity:git_push
      default_input:
        branch: "{{ steps.worktree.output.branch }}"

    - id: pr_open
      target: activity:pr_open
      default_input:
        head: "{{ steps.worktree.output.branch }}"
        base: "{{ input.base_branch }}"
        title: "{{ input.title }}"