schemaVersion: 2
kind: Job
metadata:
  name: loop_no_converge
spec:
  state: enabled
  kind: subroutine
  max_active_runs: 1
  steps:
    - id: never_converges
      loop:
        max_iterations: 2
        break_when: "always-no == this-never-matches"
        steps:
          - id: tick
            spec:
              type: shell
              description: tick step — runs every iteration, never converges
              program: sh
              args: [-c, "echo tick"]
              allowed_programs: [sh]
