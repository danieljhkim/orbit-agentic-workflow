schemaVersion: 2
kind: Job
metadata:
  name: tool_denial_no_retry
spec:
  state: enabled
  max_active_runs: 1
  steps:
    - id: denied_call
      retry:
        max_attempts: 3
        initial_backoff_ms: 50
        backoff_cap_ms: 100
        backoff_strategy: exponential
      spec:
        type: agent_loop
        description: >
          Under ORBIT_V2_REPLAY=tool_denial the replay emits a tool_use for
          `fs.write` while the allowlist is `[fs.read]`. The driver surfaces
          `DispatchError::ToolDenied`, which is non-retryable — the retry
          wrapper must skip retry and emit `step.denied` without any
          `step.retry` events for this step.
        instruction: "you are a reviewer"
        tools: [fs.read]
        on_denial: terminate
        max_iterations: 2
        model: replay-model
