schemaVersion: 2
kind: Job
metadata:
  name: parallel_branches
spec:
  state: enabled
  kind: subroutine
  max_active_runs: 1
  steps:
    - id: fanned
      parallel:
        join: { mode: all }
        branches:
          - id: branch_one
            spec:
              type: shell
              description: parallel branch 1
              program: sh
              args: [-c, "echo branch_one"]
              allowed_programs: [sh]
              timeout_seconds: 5
          - id: branch_two
            spec:
              type: shell
              description: parallel branch 2
              program: sh
              args: [-c, "echo branch_two"]
              allowed_programs: [sh]
              timeout_seconds: 5
          - id: branch_three
            spec:
              type: shell
              description: parallel branch 3
              program: sh
              args: [-c, "echo branch_three"]
              allowed_programs: [sh]
              timeout_seconds: 5
