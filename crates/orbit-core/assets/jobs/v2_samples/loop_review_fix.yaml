schemaVersion: 2
kind: Job
metadata:
  name: loop_review_fix
spec:
  state: enabled
  kind: subroutine
  max_active_runs: 1
  steps:
    - id: review_fix
      loop:
        max_iterations: 3
        break_when: "{{ steps.reviewer.output.final_message }} == reviewed: blocking=0"
        steps:
          - id: reviewer
            spec:
              type: agent_loop
              description: >
                Iterative reviewer. Under ORBIT_V2_REPLAY_FIXTURE the fixture
                scripts two iterations: iteration 1 emits a tool_use for
                `time.now` and terminal text "reviewed: blocking=1"; iteration
                2 does the same and emits "reviewed: blocking=0", satisfying
                the outer break_when. The `session: reviewer` binding keeps
                the provider conversation warm across iterations.
              tools: [time.now]
              max_iterations: 4
              on_denial: terminate
              model: replay-model
            session: reviewer
