schemaVersion: 2
kind: Job
metadata:
  name: parallel_branches_failing
spec:
  state: enabled
  kind: subroutine
  max_active_runs: 1
  steps:
    - id: fanned_with_failure
      parallel:
        join: { mode: all }
        branches:
          - id: branch_ok
            spec:
              type: shell
              description: succeeds
              program: sh
              args: [-c, "echo ok"]
              allowed_programs: [sh]
          - id: branch_fail
            spec:
              type: shell
              description: exits 1 to fail the join
              program: sh
              args: [-c, "exit 1"]
              allowed_programs: [sh]
              expected_exit_codes: [0]
