schemaVersion: 2
kind: Job
metadata:
  name: conditional_on_value
spec:
  state: enabled
  kind: subroutine
  max_active_runs: 1
  steps:
    - id: dispatch
      spec:
        type: shell
        description: seeds a pipeline value — echoes a decision from input.
        program: sh
        args: [-c, "echo {{ input.decision }}"]
        allowed_programs: [sh]
    - id: merge
      when: "{{ input.decision }} == approved"
      spec:
        type: shell
        description: only runs when decision is approved
        program: sh
        args: [-c, "echo merged"]
        allowed_programs: [sh]
