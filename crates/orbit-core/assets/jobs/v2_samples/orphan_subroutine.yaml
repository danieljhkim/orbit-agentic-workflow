schemaVersion: 2
kind: Job
metadata:
  name: orphan_subroutine
spec:
  state: enabled
  kind: subroutine
  max_active_runs: 1
  steps:
    - id: no_op
      spec:
        type: shell
        description: simple orphan subroutine used to exercise kind-aware CLI behavior
        program: sh
        args: [-c, "echo orphan-subroutine"]
        allowed_programs: [sh]
