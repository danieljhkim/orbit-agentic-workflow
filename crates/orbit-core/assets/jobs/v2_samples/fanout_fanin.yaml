schemaVersion: 2
kind: Job
metadata:
  name: fanout_fanin
spec:
  state: enabled
  max_active_runs: 1
  steps:
    - id: per_item
      fan_out:
        items: "{{ input.items }}"
        max_workers: 2
        worker:
          id: worker_echo
          spec:
            type: shell
            description: echoes one item string; `{{ input.item }}` is set per-worker.
            program: sh
            args: [-c, "echo processed {{ input.item }}"]
            allowed_programs: [sh]
      fan_in:
        join: { mode: all }
        collect: results
