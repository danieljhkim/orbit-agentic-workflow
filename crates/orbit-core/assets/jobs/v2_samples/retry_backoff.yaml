schemaVersion: 2
kind: Job
metadata:
  name: retry_backoff
spec:
  state: enabled
  max_active_runs: 1
  steps:
    - id: flake_twice
      retry:
        max_attempts: 3
        initial_backoff_ms: 100
        backoff_cap_ms: 500
        backoff_strategy: exponential
      spec:
        type: shell
        description: >
          Fails on the first two attempts (leaves a marker), succeeds on the
          third. Exercises the retry wrapper end-to-end and emits two
          `step.retry` events with doubling-then-capping backoff.
        program: sh
        args:
          - -c
          - |
            marker=/tmp/orbit_retry_flake
            if [ -f "$marker.2" ]; then
              rm -f "$marker" "$marker.2"
              echo converged
              exit 0
            fi
            if [ -f "$marker" ]; then
              touch "$marker.2"
              echo second-attempt-still-failing
              exit 1
            fi
            touch "$marker"
            echo first-attempt-failing
            exit 1
        allowed_programs: [sh]
