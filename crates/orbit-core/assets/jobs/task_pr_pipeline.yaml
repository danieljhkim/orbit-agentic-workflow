# Task bundle PR pipeline.
#
# Mid-bundle failure semantics:
# - `implement_bundle` runs one task at a time in the shared worktree.
# - If `implement_one` fails, earlier commits remain on the bundle branch.
# - Tasks stay `in-progress` until `pr_open` ships the whole bundle to review.

schemaVersion: 2
kind: Job
metadata:
  name: task_pr_pipeline
spec:
  state: enabled
  kind: workflow
  max_active_runs: 10
  default_input:
    task_ids: []
    base_branch: agent-main
    base_sync: remote
    title: null
    body: null
  
  steps:
    - id: worktree
      target: activity:worktree_setup
      default_input:
        task_ids: "{{ input.task_ids }}"
        base: "{{ input.base_branch }}"
        base_sync: "{{ input.base_sync }}"

    - id: implement_bundle
      loop:
        items: "{{ input.task_ids }}"
        max_iterations: 256
        steps:
          - id: implement_one
            recovery_activity: step_failure_recovery
            target: activity:agent_implement
            default_input:
              task_id: "{{ item }}"
              workspace_path: "{{ steps.worktree.output.workspace_path }}"

    - id: push
      recovery_activity: step_failure_recovery
      target: activity:git_push
      default_input:
        workspace_path: "{{ steps.worktree.output.workspace_path }}"

    - id: pr_open
      recovery_activity: step_failure_recovery
      target: activity:pr_open
      default_input:
        batch_id: "{{ steps.worktree.output.batch_id }}"
        base: "{{ input.base_branch }}"
        base_sync: "{{ input.base_sync }}"
        body: "{{ input.body }}"
        completed_task_ids: "{{ input.task_ids }}"
        title: "{{ input.title }}"
        workspace_path: "{{ steps.worktree.output.workspace_path }}"
