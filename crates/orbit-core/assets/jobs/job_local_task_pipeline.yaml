schemaVersion: 1

# ---- job ----
job:
  # ---- registration ----
  job_id: job_local_task_pipeline
  state: enabled

  # ---- execution ----
  # Lightweight local-only pipeline. Plans, implements, and commits without
  # requiring gh or any GitHub operations. Users review diffs locally and
  # push when ready.
  max_active_runs: 1
  default_input:
    base: main
    parallelism: 4
  steps:
    # 1. Select a conflict-free batch, author plans, refine context_files.
    - target_type: activity
      target_id: dispatch_and_plan_batch
      agent_cli: claude
      model: opus
      timeout_seconds: 2400

    # 2. Snapshot batch state for audit trail.
    - target_type: activity
      target_id: snapshot_batch_state
      condition: on_success
      timeout_seconds: 15

    # 3. Launch parallel workers in the shared worktree.
    - target_type: activity
      target_id: parallel_dispatch_tasks
      condition: on_success
      timeout_seconds: 7200

    # 4. Agent verifies and wraps up (runs always, even on worker failure).
    - target_type: activity
      target_id: finalize_tasks
      agent_cli: gemini
      condition: always
      timeout_seconds: 3600

    # 5. Commit all changes on main (no PR).
    - target_type: activity
      target_id: commit_batch_changes
      condition: on_success
      timeout_seconds: 300
