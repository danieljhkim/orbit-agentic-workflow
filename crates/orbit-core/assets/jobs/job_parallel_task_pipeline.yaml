schemaVersion: 1

# ---- job ----
job:
  # ---- registration ----
  job_id: job_parallel_task_pipeline
  state: enabled

  # ---- execution ----
  # Orchestrates one agent-selected batch using a shared worktree on main.
  # Workers implement changes directly in the shared directory with file-level locking.
  # After all workers finish, an agent-based finalize step verifies, diagnoses, and
  # fixes any issues. On success, a single commit and PR are created from main.
  max_active_runs: 1
  default_input:
    base: main
    parallelism: 4
  steps:
    # 1. Select a conflict-free batch, author plans, refine context_files.
    - target_type: activity
      target_id: dispatch_and_plan_batch
      agent_cli: claude
      model: opus
      timeout_seconds: 2400

    # 2. Snapshot batch state for audit trail.
    - target_type: activity
      target_id: snapshot_batch_state
      condition: on_success
      timeout_seconds: 15

    # 3. Launch parallel workers in the shared worktree.
    - target_type: activity
      target_id: parallel_dispatch_tasks
      condition: on_success
      timeout_seconds: 7200

    # 4. Finalize: agent verifies, diagnoses, and fixes any issues.
    - target_type: activity
      target_id: finalize_tasks
      agent_cli: gemini
      condition: always
      timeout_seconds: 3600

    # 5. Commit all changes and open a single PR from main.
    - target_type: activity
      target_id: commit_and_open_batch_pr
      condition: on_success
      timeout_seconds: 300

    # 6. Review cycle: review, gate, fix loop, merge.
    - target_type: job
      target_id: job_batch_review_cycle
      condition: on_success
      timeout_seconds: 7200
