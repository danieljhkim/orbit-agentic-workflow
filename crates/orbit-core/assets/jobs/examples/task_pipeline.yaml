schemaVersion: 2
kind: Job
metadata:
  name: task_pipeline
spec:
  state: enabled
  kind: workflow
  max_active_runs: 1
  default_input:
    auto_merge: false
  # Sequential pipeline — v2 top-level `steps:` execute in order, each
  # waiting for the previous to complete. One worktree + one branch + one
  # PR per invocation. Callers running multiple units invoke this job once
  # per unit; no fan-out inside the pipeline itself.
  steps:
    - id: worktree
      target: activity:worktree_setup
      default_input:
        task_id: "{{ input.task_id }}"
        base_branch: agent-main

    - id: implement
      target: activity:agent_implement
      default_input:
        task_id: "{{ input.task_id }}"
        workspace_path: "{{ steps.worktree.output.workspace_path }}"

    # Review↔fix collapsed into one loop: per §4.2. Reviewer holds the
    # Session across iterations; fixer does not. §3.2 item 1 pins the
    # reviewer to `backend: http` — agent_review_diff declares that
    # explicitly. The fixer is `backend: auto`.
    - id: review_fix
      loop:
        max_iterations: 5
        break_when: "{{ steps.review.output.decision }} == approved"
        steps:
          - id: review
            target: activity:agent_review_diff
            session: reviewer
            default_input:
              diff: "{{ steps.implement.output.diff }}"
              branch: "{{ steps.worktree.output.head_ref }}"
              iteration: "{{ iteration }}"

          - id: fix
            when: "{{ steps.review.output.blocking_count }} != 0"
            target: activity:agent_apply_fixes
            default_input:
              findings: "{{ steps.review.output.findings }}"
              branch: "{{ steps.worktree.output.head_ref }}"
              iteration: "{{ iteration }}"

    - id: push
      target: activity:git_push
      default_input:
        workspace_path: "{{ steps.worktree.output.workspace_path }}"
        branch: "{{ steps.worktree.output.head_ref }}"

    - id: pr_open
      target: activity:pr_open
      default_input:
        job_run_id: "{{ steps.worktree.output.job_run_id }}"
        base: agent-main
        title: "{{ input.title }}"
        workspace_path: "{{ steps.worktree.output.workspace_path }}"

    # auto_merge is opt-in per AC — default `false` at the job level keeps
    # PRs open for human review.
    - id: merge
      when: "{{ input.auto_merge }} == true"
      target: activity:git_merge
      default_input:
        job_run_id: "{{ steps.worktree.output.job_run_id }}"
        base: agent-main
        strategy: pr_merge

    # Retired/fenced example terminal. `promote_agent_main` intentionally
    # fails loudly until real integration-branch promotion ships; model
    # supported git flow with git_merge/git_push/pr_open instead.
    - id: promote
      when: "{{ input.auto_merge }} == true"
      target: activity:promote_agent_main
      default_input:
        target_branch: main
        source_branch: agent-main

    # Retired/fenced example safety valve. Guarded off by default and
    # intentionally rejected by the dispatcher until real revert-on-red
    # behavior ships.
    - id: revert_on_failure
      when: "false"
      target: activity:revert_on_red
      default_input:
        commit_sha: "{{ input.failure_commit }}"
        branch: agent-main
