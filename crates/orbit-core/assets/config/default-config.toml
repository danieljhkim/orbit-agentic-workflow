[execution.env]
inherit = false
# Baseline env vars passed to agent subprocesses.
# User-specific vars (GITHUB_TOKEN, ANTHROPIC_API_KEY, etc.) are opt-in — add them as needed.
pass = [
    "HOME",
    "PATH",
    "CODEX_HOME",
    "TMPDIR",
    "USER",
    "__CF_USER_TEXT_ENCODING",  # macOS: required by CoreFoundation
]

[execution.codex]
sandbox = "workspace-write"
# Optional: enable escalation requests for workflows that legitimately need approval.
# approval_policy = "on-request"

[task.approval]
required_for_agent = true
delegate_approval = true

[scoring]
enabled = true

[graph]
editing = false

[workflow]
# Default base branch for `orbit run ship`, `ship-auto`, and `duel-plan`.
# Override per-invocation with `--base <branch>`. The Orbit repo itself uses
# this two-branch pattern: `main` is the release/production branch, and
# `agent-main` is the dev integration branch where task PRs land — set
# `base_branch = "agent-main"` for the same layout in your own repo.
base_branch = "main"

# [agent.<role>] — per-role agent settings written by `orbit init`.
#
# Roles: reviewer, implementer, planner. Each table accepts:
#   provider — claude | codex | gemini | ollama | openai_compat
#   backend  — cli | http
#   model    — provider-specific model name (e.g. claude-opus-4-7, gpt-5.5)
#
# `orbit init` collects these interactively and rewrites this file. Edit the
# values below, or re-run `orbit init --force` to start fresh.
#
# [agent.reviewer]
# provider = "claude"
# backend = "cli"
# model = "claude-opus-4-7"
#
# [agent.implementer]
# provider = "codex"
# backend = "cli"
# model = "gpt-5.5"
#
# [agent.planner]
# provider = "claude"
# backend = "cli"
# model = "claude-opus-4-7"
