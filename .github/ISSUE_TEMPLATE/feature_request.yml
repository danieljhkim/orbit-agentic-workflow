name: Feature request
description: Propose a new capability or a meaningful change to existing behavior.
title: "[feature] <short summary>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, skim `CONTRIBUTING.md` and `ARCHITECTURE.md` to make
        sure the proposal fits the project's scope and crate boundaries. For
        purely internal refactors, prefer filing an Orbit task directly.

  - type: textarea
    id: motivation
    attributes:
      label: Problem / motivation
      description: What is the user (or operator, or agent) trying to do that Orbit makes hard or impossible today? Concrete scenarios are stronger than abstract wishes.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How could Orbit address this? Sketch the UX, command, or API surface. Don't worry about implementation detail — focus on the contract.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one is better. Include workarounds that exist today.

  - type: dropdown
    id: crates
    attributes:
      label: Affected crate(s)
      description: Best guess at where the change would land. Select "Other / not sure" if unclear.
      multiple: true
      options:
        - orbit-agent
        - orbit-cli
        - orbit-common
        - orbit-core
        - orbit-search
        - orbit-search-companion
        - orbit-engine
        - orbit-exec
        - orbit-knowledge
        - orbit-mcp
        - orbit-policy
        - orbit-registry
        - orbit-store
        - orbit-tools
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links to prior art, related Orbit task IDs, sketches, or any other context.
