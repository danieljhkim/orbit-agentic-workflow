name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runs_on: macos-15
          - target: x86_64-apple-darwin
            runs_on: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            runs_on: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runs_on: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-05-07)
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-release-
            ${{ runner.os }}-${{ runner.arch }}-cargo-release-

      - name: Build release binary
        shell: bash
        run: |
          cargo build -p orbit-cli --release --locked --target "${{ matrix.target }}"
          "./target/${{ matrix.target }}/release/orbit" --version

      - name: Package tarball
        shell: bash
        run: |
          ASSET="orbit-${{ matrix.target }}.tar.gz"
          tar -czf "$ASSET" -C "target/${{ matrix.target }}/release" orbit
          ls -lh "$ASSET"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.target }}
          path: orbit-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      darwin_arm_asset: ${{ steps.metadata.outputs.darwin_arm_asset }}
      darwin_arm_sha: ${{ steps.metadata.outputs.darwin_arm_sha }}
      darwin_intel_asset: ${{ steps.metadata.outputs.darwin_intel_asset }}
      darwin_intel_sha: ${{ steps.metadata.outputs.darwin_intel_sha }}
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          ls -lh dist
          (
            cd dist
            sha256sum orbit-*.tar.gz | sort > orbit-checksums.txt
          )
          cat dist/orbit-checksums.txt

      - name: Capture release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DARWIN_ARM_ASSET="orbit-aarch64-apple-darwin.tar.gz"
          DARWIN_INTEL_ASSET="orbit-x86_64-apple-darwin.tar.gz"
          DARWIN_ARM_SHA="$(awk '$2 == "'"$DARWIN_ARM_ASSET"'" { print $1 }' dist/orbit-checksums.txt)"
          DARWIN_INTEL_SHA="$(awk '$2 == "'"$DARWIN_INTEL_ASSET"'" { print $1 }' dist/orbit-checksums.txt)"

          [ -n "$DARWIN_ARM_SHA" ]
          [ -n "$DARWIN_INTEL_SHA" ]

          {
            echo "version=$VERSION"
            echo "darwin_arm_asset=$DARWIN_ARM_ASSET"
            echo "darwin_arm_sha=$DARWIN_ARM_SHA"
            echo "darwin_intel_asset=$DARWIN_INTEL_ASSET"
            echo "darwin_intel_sha=$DARWIN_INTEL_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/orbit-aarch64-apple-darwin.tar.gz
            dist/orbit-aarch64-unknown-linux-gnu.tar.gz
            dist/orbit-x86_64-apple-darwin.tar.gz
            dist/orbit-x86_64-unknown-linux-gnu.tar.gz
            dist/orbit-checksums.txt
          generate_release_notes: true

  publish-npm:
    name: Publish @orbit-tools/cli to npm
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version from tag
        shell: bash
        working-directory: plugin/npm
        run: |
          set -euo pipefail
          VERSION="${{ needs.publish-release.outputs.version }}"
          [ -n "$VERSION" ] || { echo "missing version"; exit 1; }
          npm version --no-git-tag-version --allow-same-version "$VERSION"
          jq '.version' package.json

      - name: Publish
        shell: bash
        working-directory: plugin/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --access public --provenance

  bump-homebrew-tap:
    name: Update Homebrew tap
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: danieljhkim/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update formula
        shell: bash
        run: |
          VERSION="${{ needs.publish-release.outputs.version }}"
          ARM_ASSET="${{ needs.publish-release.outputs.darwin_arm_asset }}"
          ARM_SHA="${{ needs.publish-release.outputs.darwin_arm_sha }}"
          INTEL_ASSET="${{ needs.publish-release.outputs.darwin_intel_asset }}"
          INTEL_SHA="${{ needs.publish-release.outputs.darwin_intel_sha }}"
          BASE_URL="https://github.com/danieljhkim/orbit/releases/download/v${VERSION}"
          FORMULA="tap/Formula/orbit.rb"

          mkdir -p tap/Formula
          cat > "$FORMULA" <<RUBY
          class Orbit < Formula
            desc "Local-first agentic workflow engine for agent-driven software delivery"
            homepage "https://github.com/danieljhkim/orbit"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE_URL}/${ARM_ASSET}"
                sha256 "${ARM_SHA}"
              end

              on_intel do
                url "${BASE_URL}/${INTEL_ASSET}"
                sha256 "${INTEL_SHA}"
              end
            end

            def install
              odie "Orbit Homebrew releases currently support macOS only. Use install.sh on Linux." if OS.linux?
              bin.install "orbit"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/orbit --version")
            end
          end
          RUBY

          cat "$FORMULA"

      - name: Commit and push tap update
        shell: bash
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/orbit.rb

          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi

          git commit -m "orbit v${{ needs.publish-release.outputs.version }}"
          git push

  smoke-install-macos:
    name: Smoke test installer on macOS arm64
    needs: publish-release
    runs-on: macos-15
    steps:
      - name: Run installer
        shell: bash
        env:
          INSTALL_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/install.sh
        run: |
          set -euo pipefail
          INSTALL_DIR="$RUNNER_TEMP/orbit/bin"
          curl -sSfL "$INSTALL_URL" | ORBIT_INSTALL_DIR="$INSTALL_DIR" ORBIT_VERSION="${GITHUB_REF_NAME}" sh
          export PATH="$INSTALL_DIR:$PATH"
          orbit --version

  smoke-install-ubuntu:
    name: Smoke test installer on Ubuntu 22.04
    needs: publish-release
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
    steps:
      - name: Install prerequisites
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl tar

      - name: Run installer
        shell: bash
        env:
          INSTALL_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/install.sh
        run: |
          set -euo pipefail
          INSTALL_DIR="/tmp/orbit/bin"
          curl -sSfL "$INSTALL_URL" | ORBIT_INSTALL_DIR="$INSTALL_DIR" ORBIT_VERSION="${GITHUB_REF_NAME}" sh
          export PATH="$INSTALL_DIR:$PATH"
          orbit --version
