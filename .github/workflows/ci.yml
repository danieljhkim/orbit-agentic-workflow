name: CI

on:
  push:
    branches: [main, agent-main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NEXTEST_VERSION: 0.9.136
  NEXTEST_LINUX_SHA256: a098eed56f2dd88c7fdca1e554a6b99fa1ffbd2a7a1c41b865700112981f6f52

jobs:
  ci:
    name: Check / Clippy / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-05-07)
        with:
          components: rustfmt, clippy

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        run: |
          set -euo pipefail
          cargo_bin="${CARGO_HOME:-$HOME/.cargo}/bin"
          archive="$(mktemp)"
          mkdir -p "$cargo_bin"
          curl -LsSf "https://get.nexte.st/${NEXTEST_VERSION}/linux" -o "$archive"
          echo "${NEXTEST_LINUX_SHA256}  ${archive}" | sha256sum -c -
          tar zxf "$archive" -C "$cargo_bin"
          rm -f "$archive"
          cargo nextest --version

      - name: Run CI guardrails
        run: ./scripts/ci-guardrails.sh

      - name: Create orbit task on CI failure
        if: failure() && github.event_name == 'pull_request'
        env:
          WORKFLOW: ${{ format('{0}', github.workflow) }}
          PR_NUMBER: ${{ format('{0}', github.event.pull_request.number) }}
          BRANCH: ${{ format('{0}', github.head_ref) }}
          SHA: ${{ format('{0}', github.sha) }}
          RUN_ID: ${{ format('{0}', github.run_id) }}
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"
          payload="$(jq -n \
            --arg title "CI failure: $WORKFLOW on PR #$PR_NUMBER" \
            --arg description "## Problem\nCI failed on PR #$PR_NUMBER (\`$BRANCH\`).\n\nCommit: \`$SHA\`\nRun: $run_url" \
            --arg branch "$BRANCH" \
            '{
              title: $title,
              description: $description,
              acceptance_criteria: ["CI passes on branch \($branch)"],
              context: ".github/workflows/ci.yml",
              workspace: ".",
              priority: "high",
              type: "bug"
            }'
          )"
          cargo run -p orbit-cli --bin orbit -- tool run orbit.task.add --input "$payload"
