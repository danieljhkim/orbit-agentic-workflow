name: smoke-plugin-install

# Exercises the /plugin install orbit chain end-to-end against the
# published @orbit-tools/cli@latest and the latest GitHub Release tag.
# Catches drift between npm registry, plugin manifest, and release assets.

on:
  schedule:
    # Mondays 12:00 UTC. Cheap weekly heartbeat that fails loudly if a
    # release ever leaves the chain in a broken state.
    - cron: "0 12 * * 1"
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Run plugin install smoke
        shell: bash
        run: ./scripts/smoke-plugin-install.sh
