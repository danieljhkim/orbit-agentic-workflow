task_id: trace-policy-denial-wiring
class: trace
difficulty: medium

commit_sha: 9d42ccea

prompt: |
  In the Orbit workspace at this commit, answer two questions about the
  tool-denial audit wiring. Be precise; do not guess.

  A. List every source file that CONSTRUCTS a
     `LoopAuditEvent::PolicyDenial { ... }` value (i.e. emits or synthesizes
     the event — not files that only pattern-match on it to read a field).
     Give workspace-relative paths.

  B. List every type in the workspace that implements the `AuditSink` trait,
     with the workspace-relative path of the `impl` block and the type name.

  Format your answer as:

  ## A. PolicyDenial constructors
  - <path>: <short note on what that site does>
  ...

  ## B. AuditSink implementors
  - <path>: <TypeName>
  ...

oracle:
  grep:
    must_include:
      # A — both production construction sites
      - "crates/orbit-agent/src/loop_engine/agent_loop.rs"
      - "crates/orbit-engine/src/activity_job/tool_enforcement.rs"
      # B — all four AuditSink impl types (names are distinctive, hard to
      # hallucinate in combination)
      - "NullSink"
      - "InMemorySink"
      - "JsonlFileSink"
      - "EnforcedAuditSink"
      # B — the file that hosts three of the four impls
      - "crates/orbit-agent/src/loop_engine/audit/mod.rs"
    must_not_include:
      # Common drift targets — if any of these show up, the agent
      # matched docs / benchmarks / skills instead of source.
      - "benchmarks/graph/"
      - "README.md"
      - ".orbit/resources/"
      - "AGENTS.md"
      - "CLAUDE.md"
      # Observer-only sites that READ PolicyDenial in a `match` or
      # `if let` — the prompt explicitly excludes these.
      - "examples/tool_allowlist.rs"
      - "examples/v2_runtime_smoke.rs"
