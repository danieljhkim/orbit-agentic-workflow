task_id: locate-v2-runtime-host-trait
class: locate
difficulty: easy

commit_sha: 9d42ccea

prompt: |
  Find the `V2RuntimeHost` trait DEFINITION in the Orbit workspace
  (not an impl, not a doc mention). Report:

  - The workspace-relative path to the file that declares the trait.
  - The crate name that owns that file.
  - The `pub trait V2RuntimeHost` signature line (or a verbatim quote
    containing that string).

  Note: there is a file named `v2_host.rs` that contains an `impl
  V2RuntimeHost for ...` block — that is NOT where the trait is defined.

oracle:
  grep:
    must_include:
      - "crates/orbit-engine/src/activity_job/dispatcher.rs"
      - "orbit-engine"
      - "pub trait V2RuntimeHost"
    must_not_include:
      # The impl-host file (common confusion target named after the trait).
      - "crates/orbit-core/src/runtime/v2_host.rs"
      # Example impls — not the definition.
      - "examples/v2_runtime_smoke.rs"
      - "examples/v2_job_runtime_smoke.rs"
      - "examples/v2_cli_backend_smoke.rs"
      - "examples/v2_name_resolution_smoke.rs"
      # Design docs mention the trait but are not the definition.
      - "docs/design/"
