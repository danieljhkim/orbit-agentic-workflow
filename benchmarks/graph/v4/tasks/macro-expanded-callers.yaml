task_id: macro-expanded-callers
class: precision-gap
difficulty: hard

mode: synthetic
synthetic_code_path: benchmarks/graph/v4/_fixture_code/macro_expanded_callers.rs
hybrid_eligible: true

prompt: |
  In `benchmarks/graph/v4/_fixture_code/macro_expanded_callers.rs`, find
  every function that calls `BenchDerivedStruct::default()`. The struct
  derives `Default` via `#[derive(Default)]` — the `default()` impl is
  generated by the macro at compile time.

  Functions that construct `BenchDerivedStruct` via explicit field-init
  syntax (e.g. `BenchDerivedStruct { name: ..., count: ... }`) without
  calling `default()` are NOT in the answer.

  Output JSON with this exact shape:
    {"answer": ["<function_name>", ...], "excluded": ["<function_name>", ...]}

oracle:
  structured:
    item_kind: symbol_name
    scoring: exact_set
    case_sensitive: false
    ground_truth:
      answer:
        - site_one
        - site_two
        - site_three
      excluded_acceptable:
        - site_distractor
    deny_list:
      - pattern: distractor
        reason: site_distractor uses explicit field-init, not default()

notes:
  - "Expected-fail sentinel for the parser-vs-macro question. Graph indexes source AST, not macro-expanded AST, so it sees the call-sites of `default()` (those are in source) but cannot see the `impl Default for BenchDerivedStruct { fn default() -> Self }` body (that is generated by `#[derive(Default)]`)."
  - "Caveat: graph's `callers` BFS is by simple name (`default`). Without file-path scoping, it would return thousands of callers across production code where `Default::default()` is used. The prompt explicitly scopes to this synthetic file; the oracle also enforces that via the deny_list and the exact_set scoring."
  - "Treat this fixture as a known-loss baseline against which future macro-expansion work in orbit-knowledge can be measured."
