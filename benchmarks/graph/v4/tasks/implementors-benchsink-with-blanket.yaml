task_id: implementors-benchsink-with-blanket
class: graph-strength
difficulty: medium

mode: synthetic
synthetic_code_path: benchmarks/graph/v4/_fixture_code/implementors_benchsink_with_blanket.rs
hybrid_eligible: true

prompt: |
  In `benchmarks/graph/v4/_fixture_code/implementors_benchsink_with_blanket.rs`,
  enumerate every type that implements the `BenchAuditSink` trait. Include
  blanket impls (e.g. `impl<T: ...> BenchAuditSink for Wrapper<T>`) and
  feature-gated impls (e.g. `#[cfg(feature = "...")] impl BenchAuditSink for X`).

  Output JSON with this exact shape:
    {"answer": ["<TypeName>", ...], "excluded": ["<TypeName>", ...]}
  where each entry is the bare type name (no module prefix). For generic
  blanket impls, use the type with generic parameter, e.g. `BenchWrapper<T>`.

oracle:
  structured:
    item_kind: symbol_name
    scoring: exact_set
    case_sensitive: false
    ground_truth:
      answer:
        - BenchNullSink
        - BenchInMemorySink
        - BenchWrapper<T>
        - BenchFeatureSink
      excluded_acceptable:
        - BenchUnrelatedType
    deny_list:
      - pattern: Unrelated
        reason: BenchUnrelatedType has no BenchAuditSink impl

notes:
  - "Graph capability check: orbit.graph.implementors should return all 4 impls. Verified empirically with the trait_selector for BenchAuditSink."
  - "Caveat: graph reports `is_blanket: false` even for the actual blanket impl on BenchWrapper<T>; the field doesn't reliably detect blanket impls. Agent answers should still include the blanket type regardless of how graph labels it."
