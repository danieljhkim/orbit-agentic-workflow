task_id: construct-vs-match-benchevent-distinct
class: precision-gap
difficulty: medium

mode: synthetic
synthetic_code_path: benchmarks/graph/v4/_fixture_code/construct_vs_match_benchevent_distinct.rs
hybrid_eligible: true

prompt: |
  In `benchmarks/graph/v4/_fixture_code/construct_vs_match_benchevent_distinct.rs`,
  find every function that CONSTRUCTS a `BenchAuditEvent::CallReturned`
  variant. Construction includes:
    - direct struct-literal: `BenchAuditEvent::CallReturned { ... }`
    - calling the builder helper `BenchAuditEvent::call_returned(...)`
    - nested constructors (the variant wrapped inside another type)
    - imported variant: `use ...::CallReturned; CallReturned { ... }`

  Functions that only DESTRUCTURE the variant (match arms, `if let`,
  pattern bindings) are NOT constructors and must be excluded. Functions
  that only mention the type in a signature without constructing the
  variant are also excluded.

  Output JSON with this exact shape:
    {"answer": ["<function_name>", ...], "excluded": ["<function_name>", ...]}

oracle:
  structured:
    item_kind: symbol_name
    scoring: exact_set
    case_sensitive: false
    ground_truth:
      answer:
        - construct_direct
        - construct_via_builder
        - construct_nested
        - construct_imported
      excluded_acceptable:
        - match_call_returned
        - if_let_call_returned
        - type_only_distractor
    deny_list:
      - pattern: match_
        reason: match_* functions destructure, not construct
      - pattern: if_let_
        reason: if_let_* functions destructure, not construct
      - pattern: type_only_
        reason: type_only_* functions never construct the variant

notes:
  - "Precision-gap probe. Graph's BFS-by-name doesn't distinguish construction sites from match sites — both reference the variant name `CallReturned`. The agent must read source to disambiguate."
  - "Variant name `CallReturned` is intentionally distinct from production `LoopAuditEvent::ToolCallResult` to avoid name-collision pollution."
