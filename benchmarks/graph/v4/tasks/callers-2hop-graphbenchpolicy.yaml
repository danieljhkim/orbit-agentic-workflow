task_id: callers-2hop-graphbenchpolicy
class: graph-strength
difficulty: medium

mode: synthetic
synthetic_code_path: benchmarks/graph/v4/_fixture_code/callers_2hop_graphbenchpolicy.rs
hybrid_eligible: true

prompt: |
  In `benchmarks/graph/v4/_fixture_code/callers_2hop_graphbenchpolicy.rs`,
  find every function that transitively calls `GraphBenchPolicy::lookup_rule`
  via exactly 2 hops. That is: a function that calls another function that
  itself calls `GraphBenchPolicy::lookup_rule`.

  Direct callers (functions that call `lookup_rule` themselves) are NOT
  part of the answer. Functions that read the policy state but never reach
  `lookup_rule` (directly or transitively) are also NOT part of the answer.

  Output JSON with this exact shape:
    {"answer": ["<function_name>", ...], "excluded": ["<function_name>", ...]}
  where each entry is the bare function name (no module prefix).

oracle:
  structured:
    item_kind: symbol_name
    scoring: exact_set
    case_sensitive: false
    ground_truth:
      answer:
        - level2_alpha_consumer
        - level2_beta_consumer
        - level2_combined
      excluded_acceptable:
        - level1_lookup_alpha
        - level1_lookup_beta
        - level1_lookup_gamma
        - level2_distractor_no_resolve
    deny_list:
      - pattern: level1_
        reason: level-1 callers are direct, not 2-hop
      - pattern: distractor
        reason: distractor functions never reach lookup_rule

notes:
  - "Graph capability check: orbit.graph.callers with depth=2 should return 6 results (3 d1 + 3 d2). The agent must filter to just d2 callers."
  - "The synthetic method name `lookup_rule` (renamed from `resolve`) avoids name-collision pollution from production `*::resolve` methods. See METHOD.md §Synthetic-vs-production name isolation."
