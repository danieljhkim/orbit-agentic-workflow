task_id: locate-loopaudit-variants
class: locate
difficulty: easy

commit_sha: 7df885db

prompt: |
  The enum `LoopAuditEvent` is defined in
  `crates/orbit-agent/src/loop_engine/audit/mod.rs`.

  List every VARIANT NAME of that enum, alphabetically sorted, one per
  line. Variant names only — do NOT include field lists, doc comments, or
  surrounding syntax. Do NOT paraphrase or abbreviate; use the exact
  PascalCase identifier from the enum declaration.

  Format:

  - VariantOne
  - VariantTwo
  - ...

oracle:
  grep:
    must_include:
      # All 8 variants of LoopAuditEvent at SHA 7df885db.
      - "HttpRequest"
      - "HttpResponse"
      - "IterationBoundary"
      - "PolicyDenial"
      - "SessionClose"
      - "SessionSpawn"
      - "ToolCallRequested"
      - "ToolCallResult"
    must_not_include:
      # Names that a grep-only agent searching for "LoopAuditEvent" might
      # mistakenly return — these are SIBLING types in the same module,
      # not variants of the enum.
      - "AuditSink"
      - "NullSink"
      - "InMemorySink"
      - "JsonlFileSink"
      - "UsageSnapshot"
      # Common drift targets.
      - "benchmarks/graph/"
      - "README.md"
      - ".orbit/resources/"
