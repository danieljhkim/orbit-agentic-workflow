task_id: trace-v2runtime-production-impls
class: trace
difficulty: medium

commit_sha: 9d42ccea

prompt: |
  List every PRODUCTION implementation of the `V2RuntimeHost` trait in the
  Orbit workspace. A production impl is one whose source file lives under
  `crates/<name>/src/` — exclude anything under `examples/`, `tests/`, and
  `benches/`.

  For each production implementor, report:

  - The implementing type name.
  - The workspace-relative path to the file containing the `impl` block.

  Format your answer as a bulleted list, one line per production impl:

  - `<path>`: `<TypeName>`

  Do NOT list example impls. Do NOT list the trait definition site. Do
  NOT enumerate the example type names in a summary sentence — a simple
  count ("N example impls were excluded") is fine if you want to note
  them, but do not name them.

oracle:
  grep:
    must_include:
      # The one production implementor at this commit.
      - "OrbitRuntime"
      - "crates/orbit-core/src/runtime/v2_host.rs"
    must_not_include:
      # Example impl type names — listing any is a filter failure.
      - "EchoHost"
      - "StubHost"
      - "PipelineHost"
      - "ScriptHost"
      - "NullCliHost"
      # Example impl file paths — same failure mode, path form.
      - "examples/v2_runtime_smoke.rs"
      - "examples/v2_job_runtime_smoke.rs"
      - "examples/v2_cli_backend_smoke.rs"
      - "examples/v2_name_resolution_smoke.rs"
      # Trait definition site — this is not an impl.
      - "crates/orbit-engine/src/activity_job/dispatcher.rs"
