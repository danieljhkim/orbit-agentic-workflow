task_id: impact-scope-strategy-callsites
class: impact
difficulty: medium

commit_sha: 9d42ccea

prompt: |
  List every Rust source file in the Orbit workspace that contains at least
  one token of the form `ScopeStrategy::<Variant>` — where `<Variant>` is
  one of the four variants of the `ScopeStrategy` enum (`WorkspaceOnly`,
  `GlobalOnly`, `MergeByKey`, `WorkspaceReplaces`).

  The file that DEFINES the enum also counts if it names variants via the
  `ScopeStrategy::` prefix (e.g. inside a `match` expression on a value
  of that type).

  Ignore:
  - Files where the variant words appear only in doc comments, README
    prose, or design docs (no `ScopeStrategy::` prefix).
  - Files that use the bare variant identifiers without the enum prefix.
  - `CLAUDE.md` and any file under `docs/`.

  Report workspace-relative paths as a bulleted list. Then state the exact
  count of files you found on a separate line, like: `Total: N files.`

oracle:
  grep:
    must_include:
      - "crates/orbit-store/src/scope.rs"
      - "crates/orbit-store/src/backend/file_backends.rs"
      - "crates/orbit-store/src/backend/sqlite_backends.rs"
      - "crates/orbit-store/src/file/skill_store.rs"
      - "Total: 4"
    must_not_include:
      # Doc-comment trap: mentions `MergeByKey` in a rustdoc comment but
      # never uses `ScopeStrategy::` — a naive `rg WorkspaceOnly|MergeByKey`
      # drags it in.
      - "crates/orbit-core/src/runtime/mod.rs"
      # Design-doc and top-level drift targets.
      - "CLAUDE.md"
      - "docs/design/"
      - "benchmarks/graph/"
      # Two files that use the bare variant identifiers (not under
      # `ScopeStrategy::`) and so do not satisfy the prompt.
      - "crates/orbit-common/src/types/activity_job/catalog.rs"
      - "crates/orbit-common/src/types/activity_job/audit_envelope.rs"
      - "crates/orbit-store/src/file/job_store/paths.rs"
