task_id: deps-orbit-knowledge-consumers
class: deps
difficulty: easy

commit_sha: 9d42ccea

prompt: |
  Which workspace crates declare a DIRECT dependency on the
  `orbit-knowledge` crate in their own `Cargo.toml`? A direct dependency
  is an entry in `[dependencies]`, `[dev-dependencies]`, or
  `[build-dependencies]` of that crate's `Cargo.toml`.

  Do NOT list the workspace root `Cargo.toml` — it declares
  `orbit-knowledge` as a workspace MEMBER (under `[workspace] members`),
  which is not a dependency.

  Report as a bulleted list, one entry per consuming crate:

  - `<crate_name>` — `<workspace-relative Cargo.toml path>`

  Then state the exact count on its own line: `Total: N crates.`

oracle:
  grep:
    must_include:
      # The two real consumers.
      - "orbit-tools"
      - "orbit-cli"
      - "crates/orbit-tools/Cargo.toml"
      - "crates/orbit-cli/Cargo.toml"
      - "Total: 2"
    must_not_include:
      # Hallucinated consumers — these crates exist but do not depend
      # directly on orbit-knowledge. Their Cargo.toml paths should not
      # appear in the answer.
      - "crates/orbit-engine/Cargo.toml"
      - "crates/orbit-core/Cargo.toml"
      - "crates/orbit-mcp/Cargo.toml"
      - "crates/orbit-store/Cargo.toml"
      - "crates/orbit-agent/Cargo.toml"
      - "crates/orbit-common/Cargo.toml"
      - "crates/orbit-policy/Cargo.toml"
      - "crates/orbit-exec/Cargo.toml"
      # Drift targets for agents who wandered into unrelated files.
      - "benchmarks/graph/"
      - "docs/design/"
