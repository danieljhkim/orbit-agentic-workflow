task_id: impact-tool-context-struct-literals
class: impact
difficulty: medium

commit_sha: 7df885db

prompt: |
  The struct `ToolContext` is defined in `crates/orbit-tools/src/lib.rs`.

  Suppose you are refactoring `ToolContext` — for example, to reorder,
  rename, or add a required field. You need the set of production source
  files that will require corresponding changes because they CONSTRUCT a
  `ToolContext` via struct-literal syntax: either `ToolContext { ... }`
  directly, or `...ToolContext::default()` in a struct-update position that
  accompanies an explicit field list.

  Constraints on the answer:

  1. Only PRODUCTION code — files under `crates/<name>/src/**`. EXCLUDE
     anything under `crates/<name>/examples/`, `crates/<name>/tests/`,
     `benches/`, or similar non-production paths.
  2. Only struct-literal construction sites. Plain `ToolContext::default()`
     calls (without an accompanying struct-literal field list) are NOT in
     scope, because they do not reference individual fields. Function
     signatures, type annotations, doc comments, and `use` imports are also
     NOT in scope.
  3. The file that DEFINES `ToolContext` (`crates/orbit-tools/src/lib.rs`)
     is NOT a construction site — it is the definition — and must be
     excluded.

  Format your answer as a bulleted list of workspace-relative paths, one
  per bullet, sorted alphabetically.

oracle:
  grep:
    must_include:
      # Five production struct-literal construction sites verified at SHA
      # 7df885db.
      - "crates/orbit-core/src/command/tool.rs"
      - "crates/orbit-core/src/runtime/pipeline.rs"
      - "crates/orbit-core/src/runtime/v2_host.rs"
      - "crates/orbit-engine/src/executor/automation/planning_duel/artifacts.rs"
      - "crates/orbit-engine/src/executor/automation/pr.rs"
    must_not_include:
      # Struct-literal sites in examples — excluded by the
      # production-only constraint. These are the sharpest grep-trap
      # false positives: `rg 'ToolContext\s*\{'` returns them alongside
      # the production hits, and a naive filter by `crates/` won't
      # distinguish `src/` from `examples/`.
      - "crates/orbit-agent/examples/tool_allowlist.rs"
      - "crates/orbit-engine/examples/v2_runtime_smoke.rs"
      - "crates/orbit-engine/examples/v2_job_runtime_smoke.rs"
      - "crates/orbit-engine/examples/v2_name_resolution_smoke.rs"
      - "crates/orbit-engine/examples/v2_cli_backend_smoke.rs"
      # Common drift targets.
      - "benchmarks/graph/"
      - "CLAUDE.md"
      - ".orbit/resources/"
      # Note: the definition site `crates/orbit-tools/src/lib.rs` is
      # NOT in must_not_include — a correct IMPACT answer may
      # legitimately reference the definition for context. The oracle
      # enforces production-only by excluding example files, which is
      # the real grep trap.
