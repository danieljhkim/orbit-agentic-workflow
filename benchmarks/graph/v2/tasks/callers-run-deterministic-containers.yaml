task_id: callers-run-deterministic-containers
class: trace
difficulty: medium

commit_sha: 7df885db

prompt: |
  In the Orbit workspace at this commit, answer the following question about
  the `V2RuntimeHost` trait.

  The trait `V2RuntimeHost` is defined in
  `crates/orbit-engine/src/activity_job/dispatcher.rs` and has a method
  `run_deterministic`.

  List every Rust function IN `crates/orbit-engine/src/` (production code
  only — exclude examples/, tests, and any file whose path contains
  `/tests/`) that DIRECTLY invokes `<receiver>.run_deterministic(...)` in
  its body. For each such call site, give:

    - the workspace-relative file path
    - the NAME of the containing function (the `fn <name>(` that the call
      sits inside)

  Format your answer as a markdown list:

  - `<path>`: `<containing_fn_name>`

  One bullet per call site. If a function contains multiple call sites, list
  it once per call.

oracle:
  grep:
    must_include:
      # The 5 direct-caller containing functions.
      - "run_workspace_command"
      - "persist_runner_artifacts"
      - "load_task"
      - "load_task_artifacts"
      # The file that hosts the `V2RuntimeHost` trait def AND a free function
      # also named `run_deterministic` that invokes the trait method. The
      # fixture must mention this file at least once (the free function is
      # a direct caller).
      - "crates/orbit-engine/src/activity_job/dispatcher.rs"
      - "crates/orbit-engine/src/activity_job/groundhog.rs"
    must_not_include:
      # Sibling functions in the same files that do NOT call run_deterministic.
      # A grep-only agent that lists every `fn` name near a matched line is
      # likely to include these as noise.
      - "run_agent_loop_activity"
      - "build_attempt_spec"
      - "load_chronicle"
      - "load_state"
      - "verify_checkpoint"
      # Drift targets — the answer is a PRODUCTION-code audit; any of these
      # paths appearing means the agent pulled from examples / tests / docs.
      - "crates/orbit-engine/examples/"
      - "benchmarks/graph/"
      - "README.md"
      - "CLAUDE.md"
      - ".orbit/resources/"
