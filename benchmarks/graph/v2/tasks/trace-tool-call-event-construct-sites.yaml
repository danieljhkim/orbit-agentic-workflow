task_id: trace-tool-call-event-construct-sites
class: trace
difficulty: medium

commit_sha: 7df885db

prompt: |
  In the Orbit workspace at this commit, answer the following question about
  the `LoopAuditEvent` enum in `crates/orbit-agent/src/loop_engine/audit/mod.rs`.

  List every source file that CONSTRUCTS either a
  `LoopAuditEvent::ToolCallRequested { ... }` or a
  `LoopAuditEvent::ToolCallResult { ... }` value.

  A "construction" is a site that SYNTHESIZES the enum value — typically
  inside a `sink.emit(&LoopAuditEvent::ToolCallRequested { ... })` or
  similar. Pattern-matching or destructuring (e.g. inside a `match` arm,
  `if let`, or `filter_map` closure) is NOT construction; files that only
  pattern-match on these variants must be EXCLUDED from the answer.

  Give workspace-relative paths, one per bullet:

  ## Construct sites
  - <path>: <short note on which variant(s) it constructs and what the site does>

oracle:
  grep:
    must_include:
      # Only one file constructs these two variants in the entire workspace.
      - "crates/orbit-agent/src/loop_engine/agent_loop.rs"
    must_not_include:
      # Destructure/pattern-match sites that grep will return as false
      # positives. The prompt explicitly excludes these; their presence in
      # the answer means the agent did not distinguish construction from
      # pattern-matching.
      - "crates/orbit-engine/src/activity_job/tool_enforcement.rs"
      - "crates/orbit-engine/examples/v2_job_runtime_smoke.rs"
      # A third concrete grep false positive: this file constructs OTHER
      # LoopAuditEvent variants (SessionSpawn / SessionClose), so a
      # grep-agent that broadens the search to `LoopAuditEvent::` or
      # `sink.emit(&LoopAuditEvent` would include this path even though
      # it does NOT construct ToolCallRequested or ToolCallResult.
      - "crates/orbit-agent/src/loop_engine/session.rs"
      # Common drift targets.
      - "benchmarks/graph/"
      - "README.md"
      - "CLAUDE.md"
      - ".orbit/resources/"
