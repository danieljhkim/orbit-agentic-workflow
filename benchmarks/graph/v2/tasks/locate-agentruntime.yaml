task_id: locate-agentruntime
class: locate
difficulty: easy

commit_sha: 9d42ccea

prompt: |
  Where is the `AgentRuntime` trait defined in this repo, and what types
  implement it? Answer with the trait's workspace-relative file path and
  a bulleted list of every implementor as `<TypeName>` — `<impl file
  path>`.

oracle:
  grep:
    must_include:
      - "crates/orbit-agent/src/runtime/runtime_trait.rs"
      - "ClaudeRuntime"
      - "CodexRuntime"
      - "GeminiRuntime"
      - "MockAgentRuntime"
      - "OllamaRuntime"
    must_not_include:
      # Hallucinated / historical names that are not impls at this commit.
      - "HttpAgentRuntime"
      - "AnthropicRuntime"
      - "OpenAIRuntime"
      # Drift targets for agents who wandered into docs / benchmarks.
      - "docs/design/"
      - "benchmarks/graph/"
      - "CLAUDE.md"
