[workspace]
members = [
  "orbit-agent",
  "orbit-cli",
  "orbit-core",
  "orbit-types",
  "orbit-store",
  "orbit-policy",
  "orbit-exec",
  "orbit-tools",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.5", features = ["derive"] }
jsonschema = { version = "0.18", default-features = false }
notify = "6"
rusqlite = { version = "0.31", features = ["bundled", "chrono"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
thiserror = "2"
toml = "0.8"
wait-timeout = "0.2"
